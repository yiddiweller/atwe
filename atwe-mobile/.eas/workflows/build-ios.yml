# Atwe iOS — build in the cloud and ship to TestFlight, no Mac required.
# Auto-ships: every push to the working branch builds + submits automatically,
# so the founder just taps "Update" in TestFlight. (Also runnable manually from
# the Expo dashboard: Workflows → Run workflow.) To avoid burning build minutes,
# pushes are batched — one push per shippable chunk.
name: Build and submit iOS

on:
  push:
    branches:
      - claude/claude-md-docs-cajkf9

jobs:
  build:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production
  submit:
    name: Submit to TestFlight
    needs: [build]
    type: submit
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build.outputs.build_id }}
