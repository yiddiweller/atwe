<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>atwi.ai — Ask anything</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #f0efed;
    --text-muted: #8a8a8f;
    --text-dim: #4a4a52;
    --accent: #e8e0d0;
    --accent-dim: rgba(232,224,208,0.08);
    --accent-glow: rgba(232,224,208,0.04);
    --user-bubble: #1e1e24;
    --ai-bubble: transparent;
    --input-bg: #16161a;
    --sans: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 14px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.65; }

  .app { display: grid; grid-template-columns: 220px 1fr; height: 100vh; overflow: hidden; }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 14px;
    gap: 6px;
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 8px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--text);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; fill: var(--bg); }
  .logo-name { font-size: 14px; font-weight: 600; letter-spacing: 0.01em; color: var(--text); }
  .logo-tld { color: var(--text-muted); font-weight: 400; }

  .new-chat {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    background: var(--accent-dim);
    border: 1px solid var(--border-hover);
    color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    margin-bottom: 8px;
  }
  .new-chat:hover { background: rgba(232,224,208,0.13); border-color: rgba(255,255,255,0.18); }
  .new-chat svg { width: 14px; height: 14px; stroke: var(--text); stroke-width: 2; fill: none; flex-shrink: 0; }

  .sidebar-label { font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 12px; margin-top: 6px; }

  .history-item {
    padding: 8px 12px; border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text-muted); cursor: pointer;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-item:hover { background: var(--surface2); color: var(--text); }
  .history-item.active { background: var(--surface2); color: var(--text); }

  .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 14px; }
  .user-row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer;
    transition: background 0.12s;
  }
  .user-row:hover { background: var(--surface2); }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border-hover); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--text-muted); flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-plan { font-size: 11px; color: var(--text-dim); }

  .main { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

  .topbar {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .model-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: var(--radius-pill);
    border: 1px solid var(--border); background: var(--surface2);
    font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .model-pill:hover { border-color: var(--border-hover); color: var(--text); }
  .model-pill svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; }
  .model-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

  .topbar-actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.12s, border-color 0.12s; color: var(--text-muted);
  }
  .icon-btn:hover { background: var(--surface2); border-color: var(--border-hover); color: var(--text); }
  .icon-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; }

  .chat-area { flex: 1; overflow-y: auto; padding: 32px 0; scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

  .messages { max-width: 720px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; gap: 28px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 0; padding: 40px 24px; text-align: center; }
  .empty-logo { width: 48px; height: 48px; border-radius: 13px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .empty-logo svg { width: 24px; height: 24px; fill: var(--text); }
  .empty-title { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--text-muted); max-width: 340px; line-height: 1.6; margin-bottom: 32px; }

  .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 520px; }
  .suggestion {
    padding: 14px 16px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    text-align: left; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    font-family: var(--sans);
  }
  .suggestion:hover { border-color: var(--border-hover); background: var(--surface2); }
  .suggestion-icon { font-size: 18px; margin-bottom: 8px; }
  .suggestion-text { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.4; }
  .suggestion-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .message { display: flex; gap: 14px; align-items: flex-start; }
  .message.user { flex-direction: row-reverse; }

  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; margin-top: 1px; }
  .msg-avatar.ai { background: var(--text); color: var(--bg); font-size: 10px; border-radius: 8px; }
  .msg-avatar.user-av { background: var(--surface2); border: 1px solid var(--border-hover); color: var(--text-muted); }

  .msg-content { max-width: 84%; }
  .message.user .msg-content { display: flex; justify-content: flex-end; flex-direction: column; align-items: flex-end; }

  .bubble { padding: 13px 17px; border-radius: var(--radius); font-size: 14.5px; line-height: 1.7; }
  .bubble.ai { color: var(--text); padding-left: 0; }
  .bubble.user { background: var(--user-bubble); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); }

  .msg-meta { font-size: 11px; color: var(--text-dim); margin-top: 6px; display: flex; gap: 8px; }
  .message.user .msg-meta { justify-content: flex-end; }

  .copy-btn {
    background: none; border: none; cursor: pointer; color: var(--text-dim);
    font-size: 11px; font-family: var(--sans); padding: 0;
    transition: color 0.12s;
  }
  .copy-btn:hover { color: var(--text-muted); }

  .typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

  .input-wrap { flex-shrink: 0; padding: 16px 24px 22px; }
  .input-box {
    max-width: 720px; margin: 0 auto;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    transition: border-color 0.15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .input-box:focus-within { border-color: var(--border-hover); }

  textarea {
    background: none; border: none; outline: none; resize: none;
    color: var(--text); font-family: var(--sans); font-size: 14.5px; line-height: 1.6;
    width: 100%; min-height: 24px; max-height: 180px; overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-dim); }

  .input-actions { display: flex; align-items: center; justify-content: space-between; }
  .input-hints { display: flex; gap: 6px; }
  .hint-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--text-muted); font-family: var(--sans); font-size: 12px;
    cursor: pointer; transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .hint-btn:hover { background: var(--surface2); border-color: var(--border-hover); color: var(--text); }
  .hint-btn svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2; fill: none; }

  .send-btn {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--text); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; stroke: var(--bg); stroke-width: 2.2; fill: none; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .suggestions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><path d="M8 1L2 4.5v7L8 15l6-3.5v-7L8 1zm0 2.2l4 2.3v4.6L8 12.8 4 10.1V5.5l4-2.3z"/></svg>
      </div>
      <div>
        <div class="logo-name">atwi<span class="logo-tld">.ai</span></div>
      </div>
    </div>
    <button class="new-chat" onclick="newChat()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New conversation
    </button>
    <div class="sidebar-label">Recent</div>
    <div class="history-item active">What is machine learning?</div>
    <div class="history-item">Summarize this document</div>
    <div class="history-item">Help with my email draft</div>
    <div class="history-item">Explain quantum computing</div>
    <div class="history-item">Compare cloud providers</div>
    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="avatar">Y</div>
        <div>
          <div class="user-name">You</div>
          <div class="user-plan">Free plan</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="model-pill">
        <div class="model-dot"></div>
        atwi Standard
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Share">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div id="emptyState" class="empty-state">
        <div class="empty-logo">
          <svg viewBox="0 0 24 24"><path d="M12 2L3 6.5v11L12 22l9-4.5v-11L12 2zm0 3.3l6 3V15l-6 3-6-3V8.3l6-3z"/></svg>
        </div>
        <div class="empty-title">Ask me anything</div>
        <div class="empty-sub">Your AI assistant for smart, instant answers — built for the way your business thinks.</div>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion('What is the difference between machine learning and AI?')">
            <div class="suggestion-icon">🧠</div>
            <div class="suggestion-text">Explain a concept</div>
            <div class="suggestion-sub">What is machine learning?</div>
          </button>
          <button class="suggestion" onclick="sendSuggestion('Help me write a professional email to a client about a project delay.')">
            <div class="suggestion-icon">✉️</div>
            <div class="suggestion-text">Draft an email</div>
            <div class="suggestion-sub">For any professional situation</div>
          </button>
          <button class="suggestion" onclick="sendSuggestion('Summarize the key points about building a great company culture.')">
            <div class="suggestion-icon">📋</div>
            <div class="suggestion-text">Summarize a topic</div>
            <div class="suggestion-sub">Get the key points fast</div>
          </button>
          <button class="suggestion" onclick="sendSuggestion('What are the best practices for onboarding new employees in 2024?')">
            <div class="suggestion-icon">💼</div>
            <div class="suggestion-text">Business advice</div>
            <div class="suggestion-sub">Strategy, HR, operations</div>
          </button>
        </div>
      </div>
      <div class="messages" id="messages" style="display:none;"></div>
    </div>

    <div class="input-wrap">
      <div class="input-box">
        <textarea id="userInput" placeholder="Ask anything…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-actions">
          <div class="input-hints">
            <button class="hint-btn">
              <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              Attach
            </button>
            <button class="hint-btn">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Context
            </button>
          </div>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('emptyState');
const chatArea = document.getElementById('chatArea');

let hasMessages = false;

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim();
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function showMessages() {
  if (!hasMessages) {
    emptyState.style.display = 'none';
    messagesEl.style.display = 'flex';
    hasMessages = true;
  }
}

function addMessage(text, role) {
  showMessages();
  const el = document.createElement('div');
  el.className = `message ${role}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = `msg-avatar ${role === 'ai' ? 'ai' : 'user-av'}`;
  avatarEl.textContent = role === 'ai' ? '✦' : 'Y';

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  contentEl.appendChild(bubble);

  if (role === 'ai') {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const now = new Date();
    meta.innerHTML = `<span>${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span><button class="copy-btn" onclick="copyText(this, \`${text.replace(/`/g, '\\`')}\`)">Copy</button>`;
    contentEl.appendChild(meta);
  }

  el.appendChild(avatarEl);
  el.appendChild(contentEl);
  messagesEl.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  showMessages();
  const el = document.createElement('div');
  el.className = 'message ai';
  el.id = 'typingIndicator';
  el.innerHTML = `<div class="msg-avatar ai">✦</div><div class="msg-content"><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  messagesEl.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

async function sendMessage(prefill) {
  const text = prefill || input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage(text, 'user');
  addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a helpful AI assistant for atwi.ai. Answer clearly and concisely. Be friendly and professional.',
        messages: [{ role: 'user', content: text }]
      })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.map(b => b.text || '').join('') || 'Sorry, I could not get a response right now.';
    addMessage(reply, 'ai');
  } catch (err) {
    removeTyping();
    addMessage('Something went wrong. Please try again.', 'ai');
  }
}

function sendSuggestion(text) {
  sendMessage(text);
}

function newChat() {
  messagesEl.innerHTML = '';
  messagesEl.style.display = 'none';
  emptyState.style.display = 'flex';
  hasMessages = false;
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
}
</script>
</body>
</html>
