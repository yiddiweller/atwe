<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#000000" />
  <title>Atwe</title>
  <link rel="icon" href="/favicon.png" />
  <style>
    :root{ --accent:#0A84FF; }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{
      background:#000;color:#fff;min-height:100dvh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
      display:flex;align-items:center;justify-content:center;
      padding:max(28px,env(safe-area-inset-top)) 22px max(28px,env(safe-area-inset-bottom));
      overflow:hidden;-webkit-font-smoothing:antialiased;
    }
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(55% 45% at 50% 42%,rgba(14,165,233,.08),transparent 70%);}
    .view{position:relative;z-index:1;width:100%;max-width:340px;text-align:center;
      display:none;flex-direction:column;align-items:center;animation:fade .45s cubic-bezier(.22,.61,.36,1);}
    .view.on{display:flex;}
    @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

    /* ── View 1: small clickable mark + a single line ── */
    .logo{background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
      width:58px;height:58px;border-radius:50%;transition:transform .25s cubic-bezier(.22,.61,.36,1);outline:none;}
    .logo img{width:100%;height:100%;object-fit:contain;display:block;
      filter:drop-shadow(0 4px 22px rgba(14,165,233,.25));}
    .logo:hover{transform:scale(1.06);}
    .logo:active{transform:scale(.93);}
    .logo:focus-visible{box-shadow:0 0 0 2px rgba(14,165,233,.55);}
    .unavail{font-size:16px;font-weight:700;color:#fff;margin-top:22px;letter-spacing:-.02em;}
    .unavail-sub{font-size:13px;font-weight:400;color:rgba(255,255,255,.36);margin-top:8px;}

    /* ── View 2: "Enter your code" + boxes ── */
    .ttl{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-bottom:24px;}
    .code-row{display:flex;gap:10px;justify-content:center;width:100%;}
    .code-box{flex:1;min-width:0;max-width:52px;aspect-ratio:1/1;background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14);border-radius:14px;color:#fff;font-size:22px;font-weight:600;
      text-align:center;outline:none;padding:0;font-family:inherit;-moz-appearance:textfield;
      transition:border-color .15s ease,background .15s ease;}
    .code-box::-webkit-outer-spin-button,.code-box::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .code-box:focus{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.09);}
    .code-row.code-ok .code-box{border-color:rgba(48,209,88,.95);background:rgba(48,209,88,.12);}
    .code-row.code-bad .code-box{border-color:rgba(255,69,58,.95);background:rgba(255,69,58,.14);}
    .code-row.shake{animation:shake .5s cubic-bezier(.36,.07,.19,.97);}
    @keyframes shake{
      0%,100%{transform:translateX(0);}
      13%{transform:translateX(-10px);} 26%{transform:translateX(9px);}
      39%{transform:translateX(-7px);} 52%{transform:translateX(6px);}
      65%{transform:translateX(-4px);} 78%{transform:translateX(3px);} 91%{transform:translateX(-1px);}
    }
    .back{margin-top:26px;background:none;border:none;color:rgba(255,255,255,.32);font-size:20px;line-height:1;
      cursor:pointer;font-family:inherit;padding:8px 14px;transition:color .15s ease;}
    .back:hover{color:rgba(255,255,255,.7);}
  </style>
</head>
<body>
  <!-- View 1: just the mark + one line -->
  <div class="view on" id="vMsg">
    <button class="logo" id="logoBtn" aria-label="Enter access code"><img src="/logo-mark.png" alt="Atwe" /></button>
    <div class="unavail">Atwe is currently unavailable</div>
    <div class="unavail-sub">Please check back soon.</div>
  </div>

  <!-- View 2: enter your code -->
  <div class="view" id="vCode">
    <div class="ttl">Enter your code</div>
    <div class="code-row" id="codeRow"></div>
    <button class="back" id="backBtn" aria-label="Back">&larr;</button>
  </div>

  <script>
    var LEN = 4, boxes = [], busy = false;
    var vMsg = document.getElementById('vMsg');
    var vCode = document.getElementById('vCode');
    var row = document.getElementById('codeRow');

    fetch('/api/site/status', { headers: { Accept: 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (!d.locked || d.allowed) { location.replace('/'); return; }
        LEN = Math.max(4, Math.min(10, d.codeLength || 4));
        buildBoxes();
      })
      .catch(function () { buildBoxes(); });

    function buildBoxes() {
      row.innerHTML = ''; boxes = [];
      for (var i = 0; i < LEN; i++) {
        var b = document.createElement('input');
        b.type = 'tel'; b.inputMode = 'numeric'; b.maxLength = 1;
        b.className = 'code-box'; b.autocomplete = 'one-time-code';
        b.setAttribute('aria-label', 'Digit ' + (i + 1));
        bind(b, i); row.appendChild(b); boxes.push(b);
      }
    }

    function bind(b, i) {
      b.addEventListener('input', function () {
        if (busy) return;
        b.value = b.value.replace(/[^0-9]/g, '').slice(0, 1);
        row.classList.remove('code-bad');
        if (b.value && i < LEN - 1) boxes[i + 1].focus();
        if (collect().length === LEN) submit();
      });
      b.addEventListener('keydown', function (e) {
        if (busy) { e.preventDefault(); return; }
        if (e.key === 'Backspace' && !b.value && i > 0) { boxes[i - 1].focus(); boxes[i - 1].value = ''; e.preventDefault(); }
        if (e.key === 'ArrowLeft' && i > 0) boxes[i - 1].focus();
        if (e.key === 'ArrowRight' && i < LEN - 1) boxes[i + 1].focus();
      });
      b.addEventListener('paste', function (e) {
        e.preventDefault();
        var t = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, LEN);
        for (var j = 0; j < t.length && i + j < LEN; j++) boxes[i + j].value = t[j];
        boxes[Math.min(i + t.length, LEN - 1)].focus();
        if (collect().length === LEN) submit();
      });
    }

    function collect() { return boxes.map(function (b) { return b.value; }).join(''); }

    function submit() {
      if (busy) return;
      busy = true;
      fetch('/api/site/unlock', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: collect() }),
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
        .then(function (res) {
          if (res.ok && res.d.ok) {
            row.classList.add('code-ok');                // turn green, then enter
            setTimeout(function () { location.replace('/'); }, 600);
            return;
          }
          fail();
        })
        .catch(fail);
    }

    function fail() {
      row.classList.add('code-bad', 'shake');
      setTimeout(function () { row.classList.remove('shake'); }, 520);
      setTimeout(function () {
        boxes.forEach(function (b) { b.value = ''; });
        row.classList.remove('code-bad');
        busy = false;
        if (boxes[0]) boxes[0].focus();
      }, 700);
    }

    document.getElementById('logoBtn').addEventListener('click', function () {
      vMsg.classList.remove('on'); vCode.classList.add('on');
      setTimeout(function () { if (boxes[0]) boxes[0].focus(); }, 120);
    });
    document.getElementById('backBtn').addEventListener('click', function () {
      vCode.classList.remove('on'); vMsg.classList.add('on');
      row.classList.remove('code-bad', 'code-ok'); busy = false;
      boxes.forEach(function (b) { b.value = ''; });
    });
  </script>
</body>
</html>
