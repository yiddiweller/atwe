<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<title>Atwe — Admin</title>
<link rel="icon" type="image/png" sizes="any" href="/favicon.png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#000000; --bg-1:#080808; --bg-2:#0d0d0d;
    --s1:#141414; --s2:#1a1a1a; --s3:#222222; --s4:#2c2c2c;
    --b1:rgba(255,255,255,.05); --b2:rgba(255,255,255,.08); --b3:rgba(255,255,255,.14);
    --t1:#ffffff; --t2:#a3a3a3; --t3:#6b6b6b; --t4:#474747;
    --accent:#0ea5e9; --accent-dim:rgba(14,165,233,.12); --accent-mid:rgba(14,165,233,.22);
    --green:#22c55e; --red:#ef4444;
    --r-sm:9px; --r-md:13px; --r-lg:18px; --r-pill:9999px;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--t1);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
    padding:max(20px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(28px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));
  }
  button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;}
  input{font-family:inherit;}
  .wrap{max-width:1000px;margin:0 auto;}

  /* ── Header ── */
  header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img.mark{width:24px;height:24px;object-fit:contain;display:block;}
  .brand img.word{height:17px;width:auto;display:block;}
  .brand .tag{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);
    background:var(--accent-dim);border:1px solid var(--accent-mid);padding:3px 9px;border-radius:var(--r-pill);}
  .back{color:var(--t2);text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border:1px solid var(--b2);
    border-radius:var(--r-pill);transition:all .15s var(--ease);white-space:nowrap;}
  .back:hover{color:var(--t1);border-color:var(--b3);background:var(--s1);}

  /* ── Stat cards ── */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
  .stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:16px 18px;}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-.03em;}
  .stat .l{color:var(--t3);font-size:12px;font-weight:500;margin-top:2px;}

  /* ── Toolbar ── */
  .toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
  .toolbar input{flex:1;min-width:0;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);
    color:var(--t1);padding:11px 16px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .toolbar input:focus{border-color:var(--b3);}
  .toolbar input::placeholder{color:var(--t4);}
  .refresh{background:var(--s1);color:var(--t2);border:1px solid var(--b2);border-radius:var(--r-pill);
    padding:11px 16px;font-size:13px;font-weight:600;transition:all .15s var(--ease);white-space:nowrap;}
  .refresh:hover{color:var(--t1);border-color:var(--b3);}

  /* ── User list (cards) ── */
  .users{display:flex;flex-direction:column;gap:8px;}
  .u-card{display:flex;align-items:center;gap:13px;background:var(--s1);border:1px solid var(--b1);
    border-radius:var(--r-md);padding:13px 15px;cursor:pointer;transition:border-color .15s var(--ease),background .15s var(--ease);}
  .u-card:hover{border-color:var(--b3);background:var(--s2);}
  .avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#0ea5e9,#06b6d4);}
  .avatar.has-img{background-size:cover;background-position:center;color:transparent;}
  /* AtChat activity */
  .ac-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 14px;}
  .ac-stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:11px 8px;text-align:center;}
  .ac-stat-card .n{font-size:19px;font-weight:800;letter-spacing:-.02em;}
  .ac-stat-card .l{font-size:10.5px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .turn-box{display:flex;align-items:flex-start;gap:12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:14px 16px;}
  .turn-dot{width:11px;height:11px;border-radius:50%;margin-top:4px;flex:0 0 auto;box-shadow:0 0 0 4px rgba(255,255,255,.04);}
  .turn-name{font-weight:700;font-size:14.5px;}
  .turn-sub{font-size:12.5px;color:var(--t3);margin-top:3px;line-height:1.4;}
  .turn-urls{font-size:11.5px;color:var(--t3);margin-top:5px;font-family:ui-monospace,SFMono-Regular,monospace;word-break:break-all;}
  .ac-apost{border:1px solid var(--b1);border-radius:var(--r-md);background:var(--s1);padding:11px 13px;margin-bottom:7px;}
  .ac-apost .b{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;color:var(--t1);}
  .ac-apost img{display:block;margin-top:7px;max-width:180px;max-height:180px;border-radius:10px;}
  .ac-apost .m{font-size:11.5px;color:var(--t3);margin-top:6px;}
  .u-main{flex:1;min-width:0;}
  .u-name{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-email{font-size:12.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-pills{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .u-meta{display:flex;gap:20px;flex-shrink:0;text-align:right;}
  .u-meta .mv{font-size:13px;font-weight:600;}
  .u-meta .mk{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;}
  .chev{color:var(--t4);flex-shrink:0;}
  .chev svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;}

  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:capitalize;}
  .pill.pro{background:var(--accent-dim);color:var(--accent);}
  .pill.free{background:var(--s3);color:var(--t3);}
  .pill.admin{background:rgba(34,197,94,.14);color:var(--green);}
  .pill.sale{background:rgba(34,197,94,.14);color:var(--green);text-transform:none;}

  .empty{text-align:center;padding:54px 20px;color:var(--t3);font-size:14px;}

  /* ── Tab nav (segmented control) ── */
  .tabs{display:inline-flex;gap:2px;margin-bottom:22px;max-width:100%;background:var(--s1);border:1px solid var(--b1);
    border-radius:13px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{background:none;border:none;color:var(--t2);font-size:13.5px;font-weight:600;padding:8px 17px;
    border-radius:9px;white-space:nowrap;transition:background .15s var(--ease),color .15s var(--ease);}
  .tab:hover{color:var(--t1);}
  .tab.active{background:var(--s3);color:var(--t1);box-shadow:0 1px 2px rgba(0,0,0,.35);}

  /* ── Overview ── */
  .ov-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .ov-title{font-size:20px;font-weight:800;letter-spacing:-.03em;}
  .ov-section{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin:4px 2px 11px;}
  .ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .ov-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:15px 16px;
    display:flex;flex-direction:column;gap:12px;transition:border-color .15s var(--ease),background .15s var(--ease);}
  .ov-card:hover{border-color:var(--b3);background:var(--s2);}
  .ov-ic{width:34px;height:34px;border-radius:10px;background:var(--accent-dim);color:var(--accent);
    display:flex;align-items:center;justify-content:center;}
  .ov-ic svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;}
  .ov-ic.green{background:rgba(34,197,94,.14);color:var(--green);}
  .ov-ic.amber{background:rgba(245,158,11,.15);color:#f59e0b;}
  .ov-ic.red{background:rgba(239,68,68,.13);color:var(--red);}
  .ov-card .n{font-size:25px;font-weight:800;letter-spacing:-.03em;line-height:1;}
  .ov-card .l{font-size:12px;color:var(--t3);font-weight:500;margin-top:5px;}

  /* ── Username locks ── */
  .lock-form{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .lock-form input{flex:1;min-width:130px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);
    color:var(--t1);padding:11px 16px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .lock-form input:focus{border-color:var(--b3);}
  .lock-form input::placeholder{color:var(--t4);}
  .lock-form .act{border-radius:var(--r-pill);}
  .lock-item{display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--b1);
    border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;}
  .lock-main{flex:1;min-width:0;}
  .lock-name{font-size:14.5px;font-weight:600;}
  .lock-date{font-size:11.5px;color:var(--t3);white-space:nowrap;}
  .tiers{display:flex;flex-direction:column;gap:2px;margin:6px 0 4px;}
  .tier{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--b1);cursor:pointer;font-size:14px;}
  .tier:last-child{border-bottom:none;}
  .tier input{width:18px;height:18px;accent-color:var(--accent, #6366f1);flex:0 0 auto;cursor:pointer;}
  .tier > span:first-of-type{flex:1;min-width:0;}
  .tier .tc{font-size:12px;color:var(--t3);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .tier .tc.warn{color:#f59e0b;font-weight:600;}
  #lockSearch,#lockBulk{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-md);color:var(--t1);padding:11px 14px;font-size:14px;outline:none;font-family:inherit;}
  #lockSearch:focus,#lockBulk:focus{border-color:var(--b3);}
  #lockSearch::placeholder,#lockBulk::placeholder{color:var(--t4);}
  .act.ghost{background:transparent;border:1px solid var(--b2);color:var(--t2);}

  /* ── Traffic analytics ── */
  .tf-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .tf-ranges{display:inline-flex;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-pill);padding:3px;}
  .tf-r{background:transparent;border:none;color:var(--t2);padding:8px 16px;font-size:13.5px;font-weight:600;border-radius:var(--r-pill);cursor:pointer;transition:.15s var(--ease);}
  .tf-r.on{background:var(--accent, #6366f1);color:#fff;}
  .tf-live{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--t2);font-weight:600;}
  .tf-dot{width:8px;height:8px;border-radius:50%;background:var(--green,#22c55e);box-shadow:0 0 0 4px rgba(34,197,94,.16);animation:tfpulse 2s ease-in-out infinite;}
  @keyframes tfpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .tf-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .tf-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:16px 18px;}
  .tf-cl{font-size:12.5px;color:var(--t3);margin-bottom:8px;}
  .tf-cv{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;}
  .tf-cd{font-size:12.5px;margin-top:8px;font-weight:600;}
  .tf-cd.up{color:var(--green,#22c55e);} .tf-cd.down{color:var(--red,#ef4444);} .tf-cd.flat,.tf-cd.muted{color:var(--t3);font-weight:500;}
  .tf-chart{display:flex;align-items:flex-end;gap:3px;height:160px;padding-top:8px;}
  .tf-bar{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;cursor:default;}
  .tf-barfill{width:100%;max-width:34px;background:linear-gradient(180deg,var(--accent,#6366f1),color-mix(in srgb,var(--accent,#6366f1) 55%,transparent));border-radius:5px 5px 2px 2px;transition:height .3s var(--ease),filter .15s;}
  .tf-bar:hover .tf-barfill{filter:brightness(1.25);}
  .tf-barlbl{font-size:10.5px;color:var(--t3);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .tf-locs{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
  .tf-loc{display:flex;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid var(--b1);font-size:13.5px;}
  .tf-loc:last-child{border-bottom:none;}
  .tf-loc-n{flex:0 0 auto;min-width:96px;font-weight:600;}
  .tf-loc-bar{flex:1;height:7px;background:var(--b1);border-radius:4px;overflow:hidden;}
  .tf-loc-bar > div{height:100%;background:var(--accent,#6366f1);border-radius:4px;}
  .tf-loc-v{flex:0 0 auto;color:var(--t2);font-variant-numeric:tabular-nums;font-weight:600;}

  /* ── Site lock ── */
  .site-status{display:flex;align-items:center;gap:9px;font-size:14px;background:var(--bg-2);
    border:1px solid var(--b1);border-radius:var(--r-md);padding:13px 15px;margin-bottom:18px;}
  .site-status .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .site-status .dot.green{background:var(--green);box-shadow:0 0 0 4px rgba(34,197,94,.14);}
  .site-status .dot.red{background:var(--red);box-shadow:0 0 0 4px rgba(239,68,68,.14);}
  .site-status .dot.amber{background:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,.16);}
  .site-row{display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .srt{font-size:14px;font-weight:600;}
  .srs{font-size:12px;color:var(--t3);margin-top:2px;}
  .switch{position:relative;width:50px;height:30px;border-radius:999px;background:var(--s3);border:1px solid var(--b2);
    cursor:pointer;flex:0 0 auto;transition:background .18s var(--ease),border-color .18s var(--ease);padding:0;}
  .switch span{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .2s cubic-bezier(.22,.61,.36,1);}
  .switch.on{background:var(--red);border-color:var(--red);}
  .switch.on span{transform:translateX(20px);}
  .switch.demo.on{background:#f59e0b;border-color:#f59e0b;}
  .switch.busy{opacity:.55;pointer-events:none;}
  .dur-row{display:flex;gap:8px;flex-wrap:wrap;}
  .dur{background:var(--s1);border:1px solid var(--b2);color:var(--t1);border-radius:var(--r-pill);
    padding:10px 16px;font-size:13px;font-weight:600;transition:all .15s var(--ease);}
  .dur:hover{border-color:var(--b3);background:var(--s2);}
  .dur.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .code-show{display:flex;align-items:center;gap:12px;background:var(--bg-2);border:1px solid var(--b1);
    border-radius:var(--r-md);padding:16px 18px;margin-bottom:14px;}
  .code-show #codeText{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:30px;font-weight:800;
    letter-spacing:.18em;color:var(--accent);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .copy{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-mid);border-radius:var(--r-pill);
    padding:8px 15px;font-size:12.5px;font-weight:700;transition:all .15s var(--ease);flex:0 0 auto;}
  .copy:hover{background:var(--accent-mid);}
  .len-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .len-l{font-size:13px;color:var(--t2);font-weight:600;}
  .len-d{font-size:12.5px;color:var(--t3);}
  .len-n{font-size:16px;font-weight:800;min-width:18px;text-align:center;}
  .stp{width:30px;height:30px;border-radius:8px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);
    font-size:18px;font-weight:700;line-height:1;transition:all .15s var(--ease);}
  .stp:hover:not(:disabled){border-color:var(--b3);background:var(--s3);}
  .stp:disabled{opacity:.35;cursor:default;}
  .custom-row{display:flex;gap:8px;}
  .custom-row input{flex:1;min-width:0;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);
    color:var(--t1);padding:11px 16px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .custom-row input:focus{border-color:var(--b3);}
  .custom-row input::placeholder{color:var(--t4);}

  /* ── Broadcast + support ── */
  .panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:16px;margin-bottom:22px;}
  .panel h3{font-size:14.5px;font-weight:700;margin-bottom:3px;}
  .panel .sub{color:var(--t3);font-size:12.5px;margin-bottom:12px;}
  .bc-box textarea,.bc-box input{width:100%;background:var(--bg-2);border:1px solid var(--b2);border-radius:var(--r-sm);color:var(--t1);
    padding:12px 14px;font-size:14px;font-family:inherit;line-height:1.5;outline:none;transition:border-color .15s var(--ease);}
  .bc-box textarea{resize:vertical;min-height:84px;}
  .bc-box input{margin-bottom:8px;font-weight:600;}
  .bc-box textarea:focus,.bc-box input:focus{border-color:var(--b3);}
  .bc-box textarea::placeholder,.bc-box input::placeholder{color:var(--t4);font-weight:400;}
  .bc-row{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-top:10px;}
  .bc-row .ct{color:var(--t4);font-size:12px;margin-right:auto;}
  .send-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r-pill);padding:10px 20px;font-size:13.5px;font-weight:700;transition:all .15s var(--ease);}
  .send-btn:hover{background:#0284c7;}
  .send-btn:disabled{opacity:.5;}
  .sup-item{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:14px 15px;margin-bottom:8px;}
  .sup-top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
  .sup-from{font-size:13.5px;font-weight:600;}
  .sup-email{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sup-date{font-size:11.5px;color:var(--t4);margin-left:auto;white-space:nowrap;flex-shrink:0;}
  .sup-msg{font-size:13.5px;line-height:1.55;color:var(--t1);white-space:pre-wrap;word-break:break-word;}
  .sup-acts{display:flex;gap:8px;margin-top:10px;}
  .auto-flag{font-size:11px;font-weight:700;color:#b45309;background:rgba(245,158,11,.16);padding:1px 8px;border-radius:8px;margin-left:6px;}
  .sla-badge{font-size:11px;font-weight:700;color:#16a34a;background:rgba(34,197,94,.14);padding:1px 8px;border-radius:8px;margin-left:6px;}
  .sla-badge.soon{color:#b45309;background:rgba(245,158,11,.16);}
  .sla-badge.over{color:#dc2626;background:rgba(239,68,68,.16);}

  /* ── Modal ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:none;align-items:flex-start;justify-content:center;padding:max(28px,env(safe-area-inset-top)) 16px 28px;
    overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;z-index:50;animation:fade .2s var(--ease);}
  .overlay.show{display:flex;}

<script>
let token = localStorage.getItem('atwe_token');

// "Back to app" should leave the admin subdomain for the main app.
(function setBackLink(){
  const link = document.getElementById('backLink');
  if (location.hostname.startsWith('admin.')) {
    link.href = location.protocol + '//' + location.hostname.replace(/^admin\./, '') + '/';
  }
})();

function notify(msg){
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove('show'), 2600);
}

async function api(method, path, body){
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error(data.error || ('Request failed (' + res.status + ')'));
    err.status = res.status;
    throw err;
  }
  return data;
}

function esc(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#96;');
}
function initial(name){ return (String(name || '?').trim()[0] || '?').toUpperCase(); }
function avatarHtml(u, cls){
  cls = cls || 'avatar';
  if (u && u.avatar) return `<div class="${cls} has-img" style="background-image:url('${u.avatar}')"></div>`;
  return `<div class="${cls}">${esc(initial(u && u.name))}</div>`;
}

function fmtDate(d){
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
  catch (e) { return '—'; }
}
function fmtDateTime(d){
  if (!d) return '—';
  try { return new Date(d).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
  catch (e) { return '—'; }
}
function ago(d){
  if (!d) return 'never';
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 2592000) return Math.floor(s/86400) + 'd ago';
  return fmtDate(d);
}
// Messages store content as a string or an array of blocks (text + image).
function msgText(content){
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) return content.map(b => b.type === 'image' ? '🖼️ [image]' : (b.text || '')).join(' ').trim();
  return '';
}

function gate(html){
  document.getElementById('content').innerHTML = '<div class="empty">' + html + '</div>';
  document.getElementById('stats').innerHTML = '';
  document.getElementById('tabs').style.display = 'none';
}

// The admin subdomain is its own origin, so it has its own sign-in.
function showLogin(msg){
  document.getElementById('stats').innerHTML = '';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div class="login">
      <img src="/logo-mark.png" alt="Atwe"/>
      <h2>Admin sign in</h2>
      <p>Sign in with an account that has admin access.</p>
      <label for="le">Email</label>
      <input id="le" type="email" autocomplete="email" placeholder="you@company.com"/>
      <label for="lp">Password</label>
      <input id="lp" type="password" autocomplete="current-password" placeholder="••••••••"/>
      <div class="err" id="lerr">${msg ? esc(msg) : ''}</div>
      <button id="lbtn">Sign in</button>
    </div>`;
  const submit = () => doAdminLogin();
  document.getElementById('lbtn').onclick = submit;
  document.getElementById('lp').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  document.getElementById('le').focus();
}

async function doAdminLogin(){
  const email = document.getElementById('le').value.trim();
  const password = document.getElementById('lp').value;
  const err = document.getElementById('lerr');
  const btn = document.getElementById('lbtn');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Enter your email and password.'; return; }
  btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign in failed.');
    if (!data.user || !data.user.is_admin) throw new Error('This account does not have admin access.');
    token = data.token;
    localStorage.setItem('atwe_token', token);
    load();
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
  }
}

let USERS = [];
let FILTER = '';
let VIEW = 'overview';

async function load(){
  if (!token) { showLogin(); return; }
  try {
    const { users } = await api('GET', '/api/admin/users');
    USERS = users || [];
    renderView();
  } catch (e) {
    if (e.status === 403) { token = null; localStorage.removeItem('atwe_token'); showLogin('That account does not have admin access.'); }
    else if (e.status === 401) { token = null; localStorage.removeItem('atwe_token'); showLogin('Your session has expired — please sign in.'); }
    else gate(esc(e.message));
  }
}

// Tab router. render() re-renders whatever view is active (used after mutations).
function switchTab(v){ VIEW = v; renderView(); }
function render(){ renderView(); }
function renderView(){
  const tabs = document.getElementById('tabs');
  tabs.style.display = '';
  tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.v === VIEW));
  if (VIEW === 'users') renderUsersView();
  else if (VIEW === 'traffic') renderTrafficView();
  else if (VIEW === 'site') renderSiteView();
  else if (VIEW === 'usernames') renderUsernamesView();
  else if (VIEW === 'posts') renderPostsView();
  else if (VIEW === 'support') renderSupportView();
  else if (VIEW === 'reports') renderReportsView();
  else if (VIEW === 'disputes') renderDisputesView();
  else if (VIEW === 'circles') renderCirclesView();
  else if (VIEW === 'feed') renderFeedSignalsView();
  else renderOverviewView();
}

function tfNum(n){ return (n||0).toLocaleString(); }
function tfChange(cur, prev){
  if (!prev) return cur > 0 ? { txt: '▲ new', cls: 'up' } : { txt: '—', cls: 'flat' };
  const d = Math.round((cur - prev) / prev * 100);
  if (d > 0) return { txt: '▲ ' + d + '%', cls: 'up' };
  if (d < 0) return { txt: '▼ ' + Math.abs(d) + '%', cls: 'down' };
  return { txt: 'no change', cls: 'flat' };
}
function tfBucketLabel(iso, bucket){
  const d = new Date(iso);
  if (bucket === 'hour') return String(d.getHours()).padStart(2,'0');
  if (bucket === 'day') return d.toLocaleDateString(undefined, { weekday: 'short' });
  if (bucket === 'month') return d.toLocaleDateString(undefined, { month: 'short' });
  return '';

function renderTraffic(){
  const t = TRAFFIC; if (!t) return;
  const live = document.getElementById('tfLive');
  if (live) live.innerHTML = `<span class="tf-dot"></span>${tfNum(t.live)} online now`;
  const vc = tfChange(t.totals.views, t.previous.views), uc = tfChange(t.totals.visitors, t.previous.visitors);
  const rangeLabel = { today: 'today', week: 'the last 7 days', year: 'the last year' }[t.range];
  const max = Math.max(1, ...t.trend.map(b => b.views));
  const bars = t.trend.map(b => {
    const h = Math.max(2, Math.round(b.views / max * 100));
    return `<div class="tf-bar" title="${tfNum(b.views)} views · ${tfNum(b.visitors)} visitors"><div class="tf-barfill" style="height:${h}%"></div><span class="tf-barlbl">${tfBucketLabel(b.bucket, t.bucket)}</span></div>`;
  }).join('');
  const maxC = Math.max(1, ...t.countries.map(c => c.views));
  const countryRows = t.countries.length ? t.countries.map(c => `
    <div class="tf-loc"><span class="tf-loc-n">${esc(c.country)}</span>
      <div class="tf-loc-bar"><div style="width:${Math.round(c.views / maxC * 100)}%"></div></div>
      <span class="tf-loc-v">${tfNum(c.views)}</span></div>`).join('') : '<div class="empty">No location data yet.</div>';
  const cityRows = t.cities.length ? t.cities.map(c => `
    <div class="tf-loc"><span class="tf-loc-n">${esc(c.city)}${c.country ? `<span class="muted">, ${esc(c.country)}</span>` : ''}</span>
      <span class="tf-loc-v">${tfNum(c.views)}</span></div>`).join('') : '<div class="empty">No city data yet.</div>';
  const geoNote = t.geoEnabled ? '' : '<div class="muted" style="margin-top:8px;">Location lookup is off — set <code>GEOIP_URL</code> (or unset <code>GEOIP_DISABLED</code>) to break traffic down by place.</div>';
  document.getElementById('tfBody').innerHTML = `
    <div class="tf-cards">
      <div class="tf-card"><div class="tf-cl">Views · ${rangeLabel}</div><div class="tf-cv">${tfNum(t.totals.views)}</div><div class="tf-cd ${vc.cls}">${vc.txt} <span class="muted">vs previous</span></div></div>
      <div class="tf-card"><div class="tf-cl">Unique visitors</div><div class="tf-cv">${tfNum(t.totals.visitors)}</div><div class="tf-cd ${uc.cls}">${uc.txt} <span class="muted">vs previous</span></div></div>
      <div class="tf-card"><div class="tf-cl">All-time views</div><div class="tf-cv">${tfNum(t.allTime.views)}</div><div class="tf-cd muted">${tfNum(t.allTime.visitors)} visitors total</div></div>
    </div>
    <div class="panel"><h3>Views · ${rangeLabel}</h3><div class="tf-chart">${bars}</div></div>
    <div class="tf-locs">
      <div class="panel"><h3>Top countries</h3>${countryRows}${geoNote}</div>
      <div class="panel"><h3>Top cities</h3>${cityRows}</div>
    </div>`;
}

        <span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${esc(u.plan)}</span>
        ${u.is_admin ? '<span class="pill admin">admin</span>' : ''}
        ${u.verified ? '<span class="pill pro">verified</span>' : (u.verify_requested_at ? '<span class="pill admin">pending</span>' : '')}
        ${u.account_type === 'business' ? (u.business_verify_status === 'verified' ? '<span class="pill pro">biz ✓</span>' : u.business_verify_status === 'pending' ? '<span class="pill admin">biz pending</span>' : '<span class="pill">business</span>') : ''}
      </div>
      <div class="u-meta">
        <div><div class="mv">${u.chat_count || 0}</div><div class="mk">Chats</div></div>
        <div><div class="mv">${u.last_login_at ? ago(u.last_login_at) : 'never'}</div><div class="mk">Last seen</div></div>
      </div>
      <div class="chev"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`).join('');

  const el = document.getElementById('userList');
  if (el) el.innerHTML = cards || `<div class="empty">${q ? 'No matches.' : 'No users yet.'}</div>`;
}

/* ─── User detail modal (info + their chats) ─── */
function closeModal(){ document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
const modalOpen = () => document.getElementById('modal').classList.contains('show');

document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.getElementById('chatOverlay').addEventListener('click', e => { if (e.target.id === 'chatOverlay') closeChat(); });
// Esc closes the message screen first (it sits on top), then the user modal.
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (chatOpen()) closeChat();
  else if (modalOpen()) closeModal();
});

async function openUser(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const card = document.getElementById('modalCard');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  card.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>${esc(u.name)}</h2>
        <div class="u-email">${esc(u.email)}</div>
      </div>
      <button class="close-x" onclick="closeModal()">&times;</button>
    </div>
    <div class="meta-grid">
      <div class="m"><span class="k">Plan</span><span class="v"><span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${esc(u.plan)}</span></span></div>
      <div class="m"><span class="k">Role</span><span class="v">${u.is_admin ? '<span class="pill admin">admin</span>' : 'User'}</span></div>
      <div class="m"><span class="k">Email verified</span><span class="v">${u.email_verified ? 'Yes' : 'No'}</span></div>
      <div class="m"><span class="k">Verified badge</span><span class="v">${u.verified ? '<span class="pill pro">verified</span>' : (u.verify_requested_at ? '<span class="pill admin">pending</span>' : 'No')}</span></div>
      <div class="m"><span class="k">Chats</span><span class="v">${u.chat_count || 0}</span></div>
      <div class="m"><span class="k">Joined</span><span class="v">${fmtDate(u.created_at)}</span></div>
      <div class="m"><span class="k">Last login</span><span class="v">${u.last_login_at ? fmtDateTime(u.last_login_at) : 'never'}</span></div>
    </div>
    <div class="acts">
      <button class="act" onclick="togglePlan(${u.id})">${u.plan === 'pro' ? 'Downgrade to Free' : 'Upgrade to Pro'}</button>
      <button class="act" onclick="openChat(${u.id})">Message${u.unread_msgs ? ` <span class="u-badge" style="margin-left:4px;">${u.unread_msgs}</span>` : ''}</button>
      <button class="act" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Revoke admin' : 'Make admin'}</button>
      <button class="act" onclick="toggleVerified(${u.id})">${u.email_verified ? 'Mark email unverified' : 'Mark email verified'}</button>
      <button class="act${u.verified ? '' : (u.verify_requested_at ? ' accent' : '')}" onclick="toggleBadge(${u.id})">${u.verified ? 'Revoke verified badge' : (u.verify_requested_at ? 'Approve verification' : 'Grant verified badge')}</button>
      ${u.account_type === 'business' ? `<button class="act${u.business_verify_status === 'pending' ? ' accent' : ''}" onclick="setBizVerify(${u.id}, '${u.business_verify_status === 'verified' ? 'none' : 'verified'}')">${u.business_verify_status === 'verified' ? 'Revoke business verification' : (u.business_verify_status === 'pending' ? 'Approve business verification' : 'Verify business')}</button>` : ''}
      <button class="act danger" onclick="removeUser(${u.id})">Delete user</button>
    </div>
    <div class="section-h">AtChat${u.username ? ` · <span style="color:var(--accent);">@${esc(u.username)}</span>` : ''}</div>
    <div id="userAtchat"><div class="muted" style="padding:6px 0;">Loading activity…</div></div>
    <div class="section-h" style="margin-top:20px;">Conversations</div>
    <div id="userChats"><div class="muted" style="padding:6px 0;">Loading chats…</div></div>`;

  loadAtchatActivity(id);
  try {
    const { chats } = await api('GET', '/api/admin/users/' + id + '/chats');
    renderUserChats(chats || []);
  } catch (e) {
    const el = document.getElementById('userChats');
    if (el) el.innerHTML = '<div class="muted">Could not load chats: ' + esc(e.message) + '</div>';
  }
}

async function loadAtchatActivity(id){
  const el = document.getElementById('userAtchat');
  try {
    const d = await api('GET', '/api/admin/users/' + id + '/atchat');
    if (!d.user.username) { el.innerHTML = '<div class="muted" style="padding:6px 0;">This user has not set up AtChat yet.</div>'; return; }
    const s = d.stats;
    const cards = [
      ['Followers', s.followers], ['Following', s.following], ['Posts', s.posts], ['Groups', s.groups],
      ['DM people', s.dm_people], ['DMs sent', s.dm_sent], ['Group msgs', s.group_sent],
    ].map(([l, n]) => `<div class="ac-stat-card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
    const posts = d.posts.length
      ? d.posts.map(p => `<div class="ac-apost">${p.body ? `<div class="b">${esc(p.body)}</div>` : ''}${p.image ? `<img src="${p.image}" alt="" onclick="window.open(this.src,'_blank')"/>` : ''}<div class="m">${fmtDateTime(p.created_at)} · ♥ ${p.likes}</div></div>`).join('')
      : '<div class="muted" style="padding:4px 0;">No posts yet.</div>';
    el.innerHTML = `<div class="ac-stats">${cards}</div>
      <div class="section-h" style="padding-top:2px;">Public posts</div>${posts}
      <div class="muted" style="margin-top:6px;font-size:11.5px;">Private DMs and group messages are not shown.</div>`;
  } catch (e) {
    el.innerHTML = '<div class="muted">Could not load AtChat activity: ' + esc(e.message) + '</div>';
  }
}

/* ─── Messages screen (Apple Messages-style, its own overlay) ─── */
let DM = { id: null, messages: [] };

const chatOpen = () => document.getElementById('chatOverlay').classList.contains('show');

async function openChat(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  DM = { id, messages: [] };
  clearChatImage();
  document.getElementById('chatInput').value = '';
  document.getElementById('chatAvatar').textContent = initial(u.name);
  document.getElementById('chatName').textContent = u.name;
  document.getElementById('chatEmail').textContent = u.email;
  document.getElementById('chatScroll').innerHTML = '<div class="chat-empty">Loading…</div>';
  document.getElementById('chatOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('chatInput')?.focus(), 250);
  try {
    const { messages } = await api('GET', '/api/admin/users/' + id + '/messages');
    DM.messages = messages || [];
    renderChat();
    // Opening the thread clears the unread reply badge for this user.
    if (u.unread_msgs) { u.unread_msgs = 0; renderList(); }
  } catch (e) {
    document.getElementById('chatScroll').innerHTML = '<div class="chat-empty">Could not load messages: ' + esc(e.message) + '</div>';
  }
}

function closeChat(){
  document.getElementById('chatOverlay').classList.remove('show');
  // The user modal is still open underneath; restore its scroll lock state.
  document.body.style.overflow = modalOpen() ? 'hidden' : '';
}

function renderChat(){
  const el = document.getElementById('chatScroll');
  if (!el) return;
  if (!DM.messages.length) {
    el.innerHTML = '<div class="chat-empty">No messages yet.<br/>Say hello below.</div>';
    return;
  }
  const SIX_MIN = 6 * 60 * 1000;
  let html = '';
  let lastT = 0, lastDay = '';
  DM.messages.forEach((m, i) => {
    const t = new Date(m.created_at).getTime();
    const day = fmtDate(m.created_at);
    if (day !== lastDay) { html += `<div class="chat-day">${esc(day)}</div>`; lastDay = day; }
    // A bigger gap (or sender switch) starts a fresh group; the last bubble of a
    // group gets the rounded "tail" corner, iMessage-style.
    const prev = DM.messages[i - 1];
    const next = DM.messages[i + 1];
    const grouped = prev && prev.sender === m.sender && (t - lastT) < SIX_MIN;
    const endsGroup = !next || next.sender !== m.sender || (new Date(next.created_at).getTime() - t) >= SIX_MIN;
    const cls = (m.sender === 'admin' ? 'admin' : 'user') + (grouped ? '' : ' gap') + (endsGroup ? ' tail' : '');
    const img = m.image ? `<img class="dm-img" src="${m.image}" alt="" onclick="window.open(this.src,'_blank')"/>` : '';
    const txt = m.body ? esc(m.body) : '';
    const bcls = 'dm-msg' + (m.image && !m.body ? ' photo' : '') + (m.image && m.body ? ' has-cap' : '');
    html += `<div class="dm-row ${cls}"><div class="${bcls}">${img}${txt}</div></div>`;
    lastT = t;
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

/* Pending photo attachment for the admin composer. */
let _chatImg = null;
function onChatFile(e){
  const file = e.target.files[0];
  e.target.value = '';
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 18 * 1024 * 1024) { notify('That image is too large (max 18 MB).'); return; }
  downscaleImage(file, dataUrl => {
    _chatImg = dataUrl;
    document.getElementById('chatImgThumb').src = dataUrl;
    document.getElementById('chatImgPrev').classList.add('show');
  });
}
function clearChatImage(){
  _chatImg = null;
  document.getElementById('chatImgPrev').classList.remove('show');
  document.getElementById('chatImgThumb').src = '';
}
// Read + downscale an image file to a compact JPEG data URL.
function downscaleImage(file, cb){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 1400;
      let w = img.width, h = img.height;
      if (w > max || h > max){ const r = Math.min(max / w, max / h); w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { cb(c.toDataURL('image/jpeg', 0.82)); }
      catch (e) { cb(ev.target.result); }
    };
    img.onerror = () => cb(ev.target.result);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function sendChat(){
  const inp = document.getElementById('chatInput');
  const btn = document.getElementById('chatSend');
  if (!inp || !DM.id) return;
  const body = inp.value.trim();
  if (!body && !_chatImg) { inp.focus(); return; }
  btn.disabled = true;
  try {
    const { message } = await api('POST', '/api/admin/users/' + DM.id + '/messages', { body, image: _chatImg });
    DM.messages.push(message);
    inp.value = ''; autosizeChat(); clearChatImage();
    renderChat();
  } catch (e) {
    notify(e.message);
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

// Auto-grow the composer; Enter sends, Shift+Enter makes a new line.
function autosizeChat(){
  const inp = document.getElementById('chatInput');
  if (!inp) return;
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
}
document.addEventListener('input', e => { if (e.target && e.target.id === 'chatInput') autosizeChat(); });
document.addEventListener('keydown', e => {
  if (!(e.target && e.target.id === 'chatInput')) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

function renderUserChats(chats){
  const el = document.getElementById('userChats');
  if (!el) return;
  if (!chats.length) { el.innerHTML = '<div class="muted" style="padding:6px 0;">No conversations yet.</div>'; return; }
  el.innerHTML = chats.map(c => `
    <div class="chat-item">
      <div class="chat-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="ct">${esc(c.title || 'Untitled chat')}</span>
        <span class="muted">${(c.messages || []).length} msgs · ${ago(c.updated_at)}</span>
      </div>
      <div class="chat-body">
        ${(c.messages || []).map(m => `
          <div class="bubble ${m.role === 'assistant' ? 'assistant' : 'user'}">
            <div class="role">${m.role === 'assistant' ? 'Atwe' : 'User'}</div>
            <div class="text">${esc(msgText(m.content)) || '[empty]'}</div>
          </div>`).join('') || '<div class="muted">No messages.</div>'}
      </div>
    </div>`).join('');
}

async function togglePlan(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const plan = u.plan === 'pro' ? 'free' : 'pro';
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { plan }); merge(user); notify('Plan updated to ' + plan + '.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function toggleAdmin(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { is_admin: !u.is_admin }); merge(user); notify('Access updated.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function toggleVerified(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { email_verified: !u.email_verified }); merge(user); notify('Email status updated.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
// Approve / revoke the X-style verified badge. Either way clears the pending request.
async function toggleBadge(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { verified: !u.verified }); merge(user); notify(user.verified ? 'User verified.' : 'Verification removed.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
// Approve / revoke a business account's verification.
async function setBizVerify(id, status){
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { businessVerifyStatus: status }); merge(user); notify(status === 'verified' ? 'Business verified.' : 'Business verification removed.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function removeUser(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  if (!confirm('Delete ' + u.email + '? This permanently removes their account, chats and projects.')) return;
  try { await api('DELETE', '/api/admin/users/' + id); USERS = USERS.filter(x => x.id !== id); closeModal(); render(); notify('User deleted.'); }
  catch (e) { notify(e.message); }
}

function merge(user){
  const i = USERS.findIndex(x => x.id === user.id);
  if (i >= 0) USERS[i] = { ...USERS[i], ...user };
  render();
}

// Export the current users list to a CSV download (client-side).
function exportUsersCsv(){
  if (!USERS.length) { notify('No users to export.'); return; }
  const cols = ['id', 'name', 'email', 'username', 'plan', 'is_admin', 'email_verified', 'chat_count', 'created_at', 'last_login_at'];
  const cell = (v) => {
    const s = v == null ? '' : String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const rows = [cols.join(',')].concat(USERS.map(u => cols.map(c => cell(u[c])).join(',')));
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'atwe-users-' + new Date().toISOString().slice(0, 10) + '.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  notify('Exported ' + USERS.length + ' users.');
}
