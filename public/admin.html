/* ─── Ads review queue ─── */
let ADSA = null, ADSA_FILTER = '';
let SPON = null, SPON_FILTER = '', SPON_Q = '', _sponSearchT = null;
const AD_LABEL = { requested: 'In review', approved: 'Approved', active: 'Active', paused: 'Paused', rejected: 'Rejected', completed: 'Ended' };
const SPON_LABEL = { active: 'Active', paused: 'Paused', ended: 'Ended' };
function renderAdsAdminView(){
  document.getElementById('stats').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div class="tf-head"><div class="tf-ranges" id="adFilters"></div>
      <button class="tf-r" style="background:var(--accent,var(--accent));color:#fff;border-color:transparent;" onclick="openAdCreate()">+ New ad</button></div>
    <div id="adsBody"><div class="empty">Loading…</div></div>
    <div class="panel" style="margin-top:22px;">
      <h3>Sponsored listings</h3>
      <div class="sub">Seller-run marketplace CPC campaigns (self-serve — not a review queue). Search or filter, then pause/end an abusive one.</div>
      <div class="tf-head">
        <div class="tf-ranges" id="sponFilters"></div>
        <input class="in" id="sponSearchIn" placeholder="Search seller or listing…" style="max-width:240px;" oninput="sponSearchDebounced(this.value)"/>
      </div>
      <div id="sponBody"><div class="empty">Loading…</div></div>
    </div>`;
  loadAdsAdmin();
  loadSponsored();
}
async function loadAdsAdmin(){
  try { ADSA = await api('GET', '/api/admin/ads' + (ADSA_FILTER ? '?status=' + ADSA_FILTER : '')); renderAdsAdmin(); }
  catch (e){ document.getElementById('adsBody').innerHTML = '<div class="empty">' + esc(e.message) + '</div>'; }
}
function setAdFilter(s){ ADSA_FILTER = s; loadAdsAdmin(); }
function renderAdsAdmin(){
  const d = ADSA; if (!d) return;
  const counts = d.counts || {};
  const filters = [['','All'],['requested','In review'],['approved','Approved'],['active','Active'],['rejected','Rejected']];
  document.getElementById('adFilters').innerHTML = filters.map(([v,l]) => `<button class="tf-r ${ADSA_FILTER===v?'on':''}" onclick="setAdFilter('${v}')">${l}${v && counts[v] ? ' ('+counts[v]+')' : ''}</button>`).join('');
  document.getElementById('adsBody').innerHTML = d.ads.length ? d.ads.map(adRow).join('') : '<div class="empty">No ads here.</div>';
}
function adRow(a){
  const thumb = a.media ? (a.mediaKind==='video' ? `<video class="ad-thumb" src="${a.media}" muted></video>` : `<img class="ad-thumb" src="${a.media}" alt=""/>`) : '<span class="ad-thumb"></span>';
  const who = a.advertiserName ? esc(a.advertiserName) + (a.advertiserHandle ? ' @'+esc(a.advertiserHandle) : '') : (a.contactEmail ? esc(a.contactEmail) : 'Atwe');
  const live = a.status==='active' || a.status==='completed';
  const perf = live ? `${(a.impressions||0).toLocaleString()} views · ${(a.clicks||0).toLocaleString()} clicks · ${a.ctr||0}% CTR` : `$${(a.amountCents/100).toFixed(2)} · ${a.days}d`;
  let acts = '';
  if (a.status==='requested') acts = `<button class="ok" onclick="adAct(${a.id},'approve')">Approve</button><button class="warn" onclick="adReject(${a.id})">Reject</button>`;
  else if (a.status==='active') acts = `<button onclick="adAct(${a.id},'pause')">Pause</button>`;
  else if (a.status==='paused') acts = `<button class="ok" onclick="adAct(${a.id},'resume')">Resume</button>`;
  acts += `<button onclick="adOpen('${esc(a.destUrl)}')">Open link</button><button class="warn" onclick="adDelete(${a.id})">Delete</button>`;
  return `<div class="ad-row">${thumb}<div class="ad-main"><div class="ad-title">${esc(a.sponsorName)}${a.title ? ' — ' + esc(a.title) : ''}</div>
    <div class="ad-sub"><span class="ad-badge adb-${a.status}">${AD_LABEL[a.status]||a.status}</span>${who} · ${perf}</div>
    ${a.body ? `<div class="ad-sub">${esc(a.body)}</div>` : ''}
    <div class="ad-sub">→ ${esc(a.destUrl)}</div>
    ${a.reviewNote ? `<div class="ad-sub" style="color:var(--red,var(--red))">${esc(a.reviewNote)}</div>` : ''}
    <div class="ad-acts">${acts}</div></div></div>`;
}
async function adAct(id, action){ try { await api('POST', '/api/admin/ads/' + id + '/' + action); notify('Done.'); loadAdsAdmin(); if (VIEW==='revenue') loadRevenue(); } catch (e){ notify(e.message); } }
function adReject(id){ const note = prompt('Reason for rejection (optional — shown to the advertiser):') || ''; api('POST', '/api/admin/ads/' + id + '/reject', { note }).then(() => { notify('Ad rejected.'); loadAdsAdmin(); }).catch(e => notify(e.message)); }
async function adDelete(id){ if (!confirm('Delete this ad permanently?')) return; try { await api('DELETE', '/api/admin/ads/' + id); notify('Deleted.'); loadAdsAdmin(); } catch (e){ notify(e.message); } }
function adOpen(url){ window.open(url, '_blank', 'noopener'); }

/* ─── Sponsored listings (product_ads) — post-hoc moderation ─── */
async function loadSponsored(){
  try {
    const qs = []; if (SPON_FILTER) qs.push('status=' + SPON_FILTER); if (SPON_Q) qs.push('q=' + encodeURIComponent(SPON_Q));
    SPON = await api('GET', '/api/admin/product-ads' + (qs.length ? '?' + qs.join('&') : ''));
    renderSponsored();
  } catch (e) { const el = document.getElementById('sponBody'); if (el) el.innerHTML = '<div class="empty">' + esc(e.message) + '</div>'; }
}
function sponSearchDebounced(v){ SPON_Q = v.trim(); clearTimeout(_sponSearchT); _sponSearchT = setTimeout(loadSponsored, 300); }
function setSponFilter(s){ SPON_FILTER = s; loadSponsored(); }
function renderSponsored(){
  const d = SPON; if (!d) return;
  const counts = d.counts || {};
  const filters = [['', 'All'], ['active', 'Active'], ['paused', 'Paused'], ['ended', 'Ended']];
  document.getElementById('sponFilters').innerHTML = filters.map(([v, l]) => `<button class="tf-r ${SPON_FILTER===v?'on':''}" onclick="setSponFilter('${v}')">${l}${v && counts[v] ? ' (' + counts[v] + ')' : ''}</button>`).join('');
  document.getElementById('sponBody').innerHTML = d.campaigns.length ? d.campaigns.map(sponRow).join('') : '<div class="empty">No sponsored campaigns match.</div>';
}
function sponRow(a){
  const thumb = a.productImage ? `<img class="ad-thumb" src="${a.productImage}" alt=""/>` : '<span class="ad-thumb"></span>';
  const who = esc(a.sellerName || 'Seller') + (a.sellerUsername ? ' @' + esc(a.sellerUsername) : '');
  const perf = `${(a.impressions||0).toLocaleString()} views · ${(a.clicks||0).toLocaleString()} clicks · ${a.ctr||0}% CTR · $${(a.totalSpentCents/100).toFixed(2)} total`;
  let acts = '';
  if (a.status === 'active') acts = `<button onclick="sponAct(${a.id},'pause')">Pause</button>`;
  else if (a.status === 'paused') acts = `<button class="ok" onclick="sponAct(${a.id},'resume')">Resume</button>`;
  if (a.status !== 'ended') acts += `<button class="warn" onclick="sponAct(${a.id},'end')">End</button>`;
  return `<div class="ad-row">${thumb}<div class="ad-main"><div class="ad-title">${esc(a.productName || 'Listing')}</div>
    <div class="ad-sub"><span class="ad-badge adb-${a.status==='active'?'active':a.status==='paused'?'paused':'completed'}">${SPON_LABEL[a.status]||a.status}</span>${who} · ${perf}</div>
    <div class="ad-sub">Bid $${(a.bidCents/100).toFixed(2)} · Budget $${(a.dailyBudgetCents/100).toFixed(2)}/day${a.keywords ? ' · Keywords: ' + esc(a.keywords) : ' · Auto-target'}</div>
    <div class="ad-acts">${acts}</div></div></div>`;
}
async function sponAct(id, action){ try { await api('POST', '/api/admin/product-ads/' + id + '/' + action); notify('Done.'); loadSponsored(); } catch (e){ notify(e.message); } }

// Admin posts an ad directly (goes live immediately).
let _adcMedia = '', _adcKind = 'image';
function openAdCreate(){
  _adcMedia = ''; _adcKind = 'image';
  const card = document.getElementById('modalCard');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  card.innerHTML = `
    <div class="modal-head"><div><h2>New ad</h2><div class="u-email">Publishes to the feed immediately</div></div><button class="close-x" onclick="closeModal()">&times;</button></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <input class="in" id="adc-sponsor" placeholder="Business / sponsor name" maxlength="60"/>
      <input class="in" id="adc-title" placeholder="Headline (optional)" maxlength="120"/>
      <input class="in" id="adc-body" placeholder="Description (optional)" maxlength="300"/>
      <input class="in" id="adc-cta" placeholder="Button text (e.g. Shop now)" maxlength="40"/>
      <input class="in" id="adc-url" placeholder="Destination link (https://…)"/>
      <input class="in" id="adc-days" type="number" min="1" placeholder="Days to run (e.g. 7)" value="7"/>
      <input class="in" id="adc-amt" type="number" min="0" step="0.01" placeholder="Amount paid (optional, $ — logs to revenue)"/>
      <button class="tf-r" onclick="document.getElementById('adc-file').click()" id="adcPick">Add image or video</button>
      <input type="file" id="adc-file" accept="image/*,video/*" style="display:none" onchange="adcPick(this)"/>
      <div id="adcPreview"></div>
    </div>
    <div class="acts" style="margin-top:14px;"><button class="btn primary" onclick="adcSubmit()">Publish ad</button></div>`;
}
function adcPick(input){
  const f = input.files && input.files[0]; if (!f) return;
  _adcKind = (f.type || '').startsWith('video') ? 'video' : 'image';
  const r = new FileReader();
  r.onload = () => { if (typeof r.result !== 'string' || r.result.length > 3600000) { notify('Too large (max ~3.5MB).'); return; } _adcMedia = r.result; document.getElementById('adcPreview').innerHTML = _adcKind==='video' ? `<video src="${_adcMedia}" muted loop autoplay playsinline style="width:100%;border-radius:10px;"></video>` : `<img src="${_adcMedia}" style="width:100%;border-radius:10px;"/>`; document.getElementById('adcPick').textContent = 'Change media'; };
  r.readAsDataURL(f);
}
async function adcSubmit(){
  const g = id => document.getElementById(id).value.trim();
  if (!g('adc-sponsor')) return notify('Add a sponsor name.');
  if (!g('adc-url')) return notify('Add a destination link.');
  if (!_adcMedia) return notify('Add an image or video.');
  const payload = { sponsorName: g('adc-sponsor'), title: g('adc-title'), body: g('adc-body'), ctaLabel: g('adc-cta'), destUrl: g('adc-url'), days: parseInt(g('adc-days'),10) || 7, amountCents: Math.round((parseFloat(g('adc-amt')) || 0) * 100), media: _adcMedia, mediaKind: _adcKind };
  try { await api('POST', '/api/admin/ads', payload); closeModal(); notify('Ad published.'); loadAdsAdmin(); } catch (e){ notify(e.message); }
}

/* ─── Support inbox + broadcast ─── */
let SUPPORT = [];
function renderSupportView(){
  document.getElementById('stats').innerHTML = '';
  // The "Email everyone" broadcast is a superadmin-only power (the route is
  // requireAdmin), so a scoped support agent sees only the request inbox.
  const broadcast = ME.superadmin ? `
    <div class="panel bc-box">
      <h3>Email everyone</h3>
      <div class="sub">Emails every user a branded message from team@atwe.com, and drops it in their Atwe inbox.</div>
      <input id="bcSubject" maxlength="160" placeholder="Subject (e.g. What's new in Atwe)" />
      <textarea id="bcInput" maxlength="4000" placeholder="Write your message to all users…"></textarea>
      <div class="bc-row"><span class="ct" id="bcCount">0 / 4000</span><button class="send-btn" id="bcSend" onclick="sendBroadcast()">Send to all</button></div>
    </div>` : '';
  document.getElementById('content').innerHTML = broadcast + `
    <div class="ov-section">Support requests</div>
    <div id="supList"><div class="empty">Loading…</div></div>`;
  const inp = document.getElementById('bcInput');
  if (inp) inp.addEventListener('input', () => { document.getElementById('bcCount').textContent = inp.value.length + ' / 4000'; });
  loadSupport();
}
async function loadSupport(){
  try { const { requests } = await api('GET', '/api/admin/support'); SUPPORT = requests || []; renderSupportList(); }
  catch (e) { const el = document.getElementById('supList'); if (el) el.innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}
function renderSupportList(){
  const el = document.getElementById('supList'); if (!el) return;
  if (!SUPPORT.length) { el.innerHTML = '<div class="empty">No support requests.</div>'; return; }
  el.innerHTML = SUPPORT.map(r => `
    <div class="sup-item">
      <div class="sup-top">
        <span class="sup-from">${esc(r.user_name || 'Guest')}${r.user_username ? ' · @' + esc(r.user_username) : ''}</span>
        <span class="sup-email">${esc(r.email)}</span>
        <span class="sup-date">${fmtDateTime(r.created_at)}</span>
      </div>
      <div class="sup-msg">${esc(r.message)}</div>
      <div class="sup-acts">
        <a class="act" href="mailto:${esc(r.email)}">Reply by email</a>
        ${r.user_id ? `<button class="act" onclick="messageFromSupport(${r.user_id})">Message in app</button>` : ''}
        <button class="act danger" onclick="dismissSupport(${r.id})">Dismiss</button>
      </div>
    </div>`).join('');
}
async function sendBroadcast(){
  const inp = document.getElementById('bcInput'), btn = document.getElementById('bcSend');
  const subj = document.getElementById('bcSubject');
  const body = (inp.value || '').trim();
  const subject = (subj.value || '').trim();
  if (!body) { inp.focus(); return; }
  if (!confirm('Send this to every user — email + in-app inbox?')) return;
  btn.disabled = true;
  try {
    const { sent, emailing } = await api('POST', '/api/admin/broadcast', { body, subject });
    inp.value = ''; subj.value = ''; document.getElementById('bcCount').textContent = '0 / 4000';
    notify('Sent to ' + sent + ' inbox' + (sent === 1 ? '' : 'es') + (emailing ? ' · emailing ' + emailing : '') + '.');
  } catch (e) { notify(e.message); } finally { btn.disabled = false; }
}
async function dismissSupport(id){
  if (!confirm('Dismiss this support request?')) return;
  try { await api('DELETE', '/api/admin/support/' + id); SUPPORT = SUPPORT.filter(r => r.id !== id); renderSupportList(); notify('Dismissed.'); }
  catch (e) { notify(e.message); }
}
// Jump from a support request straight into the in-app message thread.
function messageFromSupport(userId){
  if (!USERS.find(x => x.id === userId)) { notify('Open the Users tab to message this person.'); return; }
  openChat(userId);
}

/* ─── Reports ─── */
let REPORTS = [];
let REP_SEL = new Set();
async function renderReportsView(){
  document.getElementById('stats').innerHTML = '';
  REP_SEL = new Set();
  document.getElementById('content').innerHTML = `
    <div class="ov-section" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <span>Open reports</span>
      <label class="rep-selall"><input type="checkbox" id="repAll" onchange="repSelectAll(this.checked)"> Select all</label>
    </div>
    <div id="repBulkBar" class="rep-bulk hidden"></div>
    <div id="repList"><div class="empty">Loading…</div></div>`;
  try { const { reports } = await api('GET', '/api/admin/reports'); REPORTS = reports || []; renderReportList(); }
  catch (e) { const el = document.getElementById('repList'); if (el) el.innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}
function renderReportList(){
  const el = document.getElementById('repList'); if (!el) return;
  if (!REPORTS.length) { el.innerHTML = '<div class="empty">No open reports.</div>'; renderRepBulk(); return; }
  el.innerHTML = REPORTS.map(r => `
    <div class="sup-item${REP_SEL.has(r.id)?' sel':''}">
      <div class="sup-top">
        <label class="rep-check"><input type="checkbox" ${REP_SEL.has(r.id)?'checked':''} onchange="repToggle(${r.id},this.checked)"></label>
        <span class="sup-from">${esc(r.target_type)} · ${esc(r.target_label || '(removed)')}${r.auto ? ' <span class="auto-flag">🤖 Auto-flagged</span>' : ''}</span>
        <span class="sup-email">${r.target_username ? '@' + esc(r.target_username) + ' · ' : ''}reported by ${r.auto ? 'Atwe moderation' : (r.reporter_username ? '@' + esc(r.reporter_username) : 'a user')}</span>
        <span class="sup-date">${fmtDateTime(r.created_at)}</span>
      </div>
      <div class="sup-msg"><b>${esc(r.reason || 'other')}</b>${r.note ? ' — ' + esc(r.note) : ''}</div>
      <div class="sup-acts">
        ${r.target_type === 'user' ? `<button class="act" onclick="openUser(${r.target_id})">View user</button>` : ''}
        ${r.target_type !== 'user' ? `<button class="act danger" onclick="resolveReport(${r.id}, true)">Remove item</button>` : ''}
        <button class="act" onclick="resolveReport(${r.id}, false)">Resolve</button>
        <button class="act" onclick="dismissReport(${r.id})">Dismiss</button>
      </div>
    </div>`).join('');
  renderRepBulk();
}
function repToggle(id, on){ if (on) REP_SEL.add(id); else REP_SEL.delete(id); renderReportList(); }
function repSelectAll(on){ REP_SEL = on ? new Set(REPORTS.map(r=>r.id)) : new Set(); renderReportList(); }
function renderRepBulk(){
  const bar = document.getElementById('repBulkBar'); if (!bar) return;
  const n = REP_SEL.size;
  if (!n) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = `<span><b>${n}</b> selected</span><div class="rep-bulk-acts"><button class="act" onclick="bulkReports('resolved',false)">Resolve</button><button class="act danger" onclick="bulkReports('resolved',true)">Resolve &amp; remove items</button><button class="act" onclick="bulkReports('dismissed',false)">Dismiss</button></div>`;
}
async function bulkReports(status, removeTarget){
  const ids = [...REP_SEL];
  if (!ids.length) return;
  if (removeTarget && !confirm('Remove the reported items for ' + ids.length + ' report(s)? This deletes posts/jobs/listings.')) return;
  try {
    const r = await api('PATCH', '/api/admin/reports', { ids, status, removeTarget });
    REPORTS = REPORTS.filter(x => !REP_SEL.has(x.id)); REP_SEL = new Set();
    const chk = document.getElementById('repAll'); if (chk) chk.checked = false;
    renderReportList(); notify(r.count + ' report' + (r.count===1?'':'s') + ' ' + status + '.');
  } catch (e){ notify(e.message); }
}
async function resolveReport(id, removeTarget){
  if (removeTarget && !confirm('Remove the reported item? This deletes it.')) return;
  try { await api('PATCH', '/api/admin/reports/' + id, { status: 'resolved', removeTarget: !!removeTarget }); REPORTS = REPORTS.filter(r => r.id !== id); renderReportList(); notify(removeTarget ? 'Item removed.' : 'Resolved.'); }
  catch (e) { notify(e.message); }
}
async function dismissReport(id){

let DM = { id: null, messages: [] };

const chatOpen = () => document.getElementById('chatOverlay').classList.contains('show');

async function openChat(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  DM = { id, messages: [] };
  clearChatImage();
  document.getElementById('chatInput').value = '';
  document.getElementById('chatAvatar').textContent = initial(u.name);
  document.getElementById('chatName').textContent = u.name;

  try {

    DM.messages = messages || [];
    renderChat();

    if (u.unread_msgs) { u.unread_msgs = 0; renderList(); }
  } catch (e) {

function closeChat(){
  document.getElementById('chatOverlay').classList.remove('show');
  // The user modal is still open underneath; restore its scroll lock state.
  document.body.style.overflow = modalOpen() ? 'hidden' : '';
}

function renderChat(){
  const el = document.getElementById('chatScroll');
  if (!el) return;
  if (!DM.messages.length) {
    el.innerHTML = '<div class="chat-empty">No messages yet.<br/>Say hello below.</div>';
    return;
  }
  const SIX_MIN = 6 * 60 * 1000;
  let html = '';
  let lastT = 0, lastDay = '';
  DM.messages.forEach((m, i) => {
    const t = new Date(m.created_at).getTime();
    const day = fmtDate(m.created_at);
    if (day !== lastDay) { html += `<div class="chat-day">${esc(day)}</div>`; lastDay = day; }
    // A bigger gap (or sender switch) starts a fresh group; the last bubble of a
    // group gets the rounded "tail" corner, iMessage-style.
    const prev = DM.messages[i - 1];
    const next = DM.messages[i + 1];
    const grouped = prev && prev.sender === m.sender && (t - lastT) < SIX_MIN;
    const endsGroup = !next || next.sender !== m.sender || (new Date(next.created_at).getTime() - t) >= SIX_MIN;
    const cls = (m.sender === 'admin' ? 'admin' : 'user') + (grouped ? '' : ' gap') + (endsGroup ? ' tail' : '');
    const img = m.image ? `<img class="dm-img" src="${m.image}" alt="" onclick="window.open(this.src,'_blank')"/>` : '';
    const txt = m.body ? esc(m.body) : '';
    const bcls = 'dm-msg' + (m.image && !m.body ? ' photo' : '') + (m.image && m.body ? ' has-cap' : '');
    html += `<div class="dm-row ${cls}"><div class="${bcls}">${img}${txt}</div></div>`;
    lastT = t;
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

/* Pending photo attachment for the admin composer. */
let _chatImg = null;
function onChatFile(e){
  const file = e.target.files[0];
  e.target.value = '';
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 18 * 1024 * 1024) { notify('That image is too large (max 18 MB).'); return; }
  downscaleImage(file, dataUrl => {
    _chatImg = dataUrl;
    document.getElementById('chatImgThumb').src = dataUrl;
    document.getElementById('chatImgPrev').classList.add('show');
  });
}
function clearChatImage(){
  _chatImg = null;
  document.getElementById('chatImgPrev').classList.remove('show');
  document.getElementById('chatImgThumb').src = '';
}
// Read + downscale an image file to a compact JPEG data URL.
function downscaleImage(file, cb){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 1400;
      let w = img.width, h = img.height;
      if (w > max || h > max){ const r = Math.min(max / w, max / h); w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { cb(c.toDataURL('image/jpeg', 0.82)); }
      catch (e) { cb(ev.target.result); }
    };
    img.onerror = () => cb(ev.target.result);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function sendChat(){
  const inp = document.getElementById('chatInput');
  const btn = document.getElementById('chatSend');
  if (!inp || !DM.id) return;
  const body = inp.value.trim();
  if (!body && !_chatImg) { inp.focus(); return; }
  btn.disabled = true;
  try {
    const { message } = await api('POST', '/api/admin/users/' + DM.id + '/messages', { body, image: _chatImg });
    DM.messages.push(message);
    inp.value = ''; autosizeChat(); clearChatImage();
    renderChat();
  } catch (e) {
    notify(e.message);
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

// Auto-grow the composer; Enter sends, Shift+Enter makes a new line.
function autosizeChat(){
  const inp = document.getElementById('chatInput');
  if (!inp) return;
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
}
document.addEventListener('input', e => { if (e.target && e.target.id === 'chatInput') autosizeChat(); });
document.addEventListener('keydown', e => {
  if (!(e.target && e.target.id === 'chatInput')) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

function renderUserChats(chats){
  const el = document.getElementById('userChats');
  if (!el) return;
  if (!chats.length) { el.innerHTML = '<div class="muted" style="padding:6px 0;">No conversations yet.</div>'; return; }
  el.innerHTML = chats.map(c => `
    <div class="chat-item">
      <div class="chat-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="ct">${esc(c.title || 'Untitled chat')}</span>
        <span class="muted">${(c.messages || []).length} msgs · ${ago(c.updated_at)}</span>
      </div>
      <div class="chat-body">
        ${(c.messages || []).map(m => `
          <div class="bubble ${m.role === 'assistant' ? 'assistant' : 'user'}">
            <div class="role">${m.role === 'assistant' ? 'Atwe' : 'User'}</div>
            <div class="text">${esc(msgText(m.content)) || '[empty]'}</div>
          </div>`).join('') || '<div class="muted">No messages.</div>'}
      </div>
    </div>`).join('');
}

async function togglePlan(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const plan = u.plan === 'pro' ? 'free' : 'pro';
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { plan }); merge(user); notify('Plan updated to ' + plan + '.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function toggleAdmin(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const grant = !u.is_admin;
  if (grant && !confirm('Grant ' + u.email + ' full admin access? They\'ll be able to see and manage every account, message, and payment on the platform.')) return;
  if (!grant && !confirm('Revoke ' + u.email + '\'s admin access?')) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { is_admin: grant }); merge(user); notify('Access updated.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function toggleVerified(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { email_verified: !u.email_verified }); merge(user); notify('Email status updated.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
// Approve / revoke the X-style verified badge. Either way clears the pending request.
async function toggleBadge(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { verified: !u.verified }); merge(user); notify(user.verified ? 'User verified.' : 'Verification removed.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
// Approve / revoke a business account's verification.
async function setBizVerify(id, status){
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { businessVerifyStatus: status }); merge(user); notify(status === 'verified' ? 'Business verified.' : 'Business verification removed.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
// Suspend (temporary), ban (permanent), or reinstate an account. The account + its
// content stay; the person is locked out and their live sessions are dropped.
async function setUserStatus(id, status){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const body = { status };
  if (status === 'banned') {
    if (!confirm('Ban ' + u.email + '? They\'ll be locked out permanently and signed out everywhere. Their content stays (use Delete to remove it).')) return;
    body.reason = prompt('Reason for the ban (shown to them at login, optional):', '') || '';
  } else if (status === 'suspended') {
    const days = prompt('Suspend for how many days?', '7');
    if (days === null) return;
    body.days = Math.max(1, parseInt(days, 10) || 7);
    body.reason = prompt('Reason for the suspension (optional):', '') || '';
  }
  try {
    const { user } = await api('POST', '/api/admin/users/' + id + '/status', body);
    merge({ ...user, status: user.status, status_reason: user.status_reason, suspended_until: user.suspended_until });
    notify(status === 'active' ? 'Account reinstated.' : (status === 'banned' ? 'Account banned.' : 'Account suspended.'));
    if (modalOpen()) openUser(id);
  } catch (e) { notify(e.message); }
}
// Freeze / unfreeze a wallet — a money-only fraud hold (blocks outgoing money; the
// account still works otherwise). Distinct from suspend/ban.
async function setWalletFreeze(id, frozen){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const body = { frozen };
  if (frozen) {
    if (!confirm('Freeze ' + u.email + '\'s wallet? They won\'t be able to send money, cash out, or pay from balance until you unfreeze. Incoming money still lands.')) return;
    body.reason = prompt('Reason (shown to them, optional):', '') || '';
  }
  try {
    const { user } = await api('POST', '/api/admin/users/' + id + '/wallet-freeze', body);
    merge({ ...user, wallet_frozen: user.wallet_frozen, wallet_frozen_reason: user.wallet_frozen_reason });
    notify(frozen ? 'Wallet frozen.' : 'Wallet unfrozen.');
    if (modalOpen()) openUser(id);
  } catch (e) { notify(e.message); }
}
// "View as user" — a logged, time-boxed support impersonation. Opens the app in a
// new tab signed in AS the member (money/email/delete disabled, 45-min token).
async function impersonateUser(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  if (!confirm('Open ' + (u.username ? '@'+u.username : u.email) + '\'s account to reproduce an issue?\n\nThis is fully logged. Money transfers, email changes and account deletion are disabled while you view it.')) return;
  const reason = prompt('Reason (recorded — e.g. a ticket number):', '') || '';
  try {
    const r = await api('POST', '/api/admin/users/' + id + '/impersonate', { reason });
    if (r.appUrl) { window.open(r.appUrl, '_blank', 'noopener'); notify('Opened ' + (r.target && r.target.name ? r.target.name : 'the member') + '\'s account in a new tab.'); }
  } catch (e){ notify(e.message); }
}
async function removeUser(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  if (!confirm('Delete ' + u.email + '? This permanently removes their account, chats and projects.')) return;
  try { await api('DELETE', '/api/admin/users/' + id); USERS = USERS.filter(x => x.id !== id); closeModal(); render(); notify('User deleted.'); }
  catch (e) { notify(e.message); }
}

function merge(user){
  const i = USERS.findIndex(x => x.id === user.id);
  if (i >= 0) USERS[i] = { ...USERS[i], ...user };
  render();
}

// Export the current users list to a CSV download (client-side).
function exportUsersCsv(){
  if (!USERS.length) { notify('No users to export.'); return; }
  const cols = ['id', 'name', 'email', 'username', 'plan', 'is_admin', 'email_verified', 'chat_count', 'created_at', 'last_login_at'];
  const cell = (v) => {
    const s = v == null ? '' : String(v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const rows = [cols.join(',')].concat(USERS.map(u => cols.map(c => cell(u[c])).join(',')));
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'atwe-users-' + new Date().toISOString().slice(0, 10) + '.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  notify('Exported ' + USERS.length + ' users.');
}
