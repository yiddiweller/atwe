<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atwe — Admin</title>
<style>
  :root {
    --bg: #0a0a0b; --panel: #141416; --panel2: #1c1c1f;
    --border: #2a2a2e; --t1: #f5f5f7; --t2: #a0a0a8; --t3: #6a6a72;
    --accent: #6d8bff; --danger: #ff5d5d; --green: #46d18a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--t1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding: 32px 20px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; flex-wrap: wrap; gap: 12px; }
  .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .brand span { color: var(--accent); }
  .sub { color: var(--t3); font-size: 13px; margin-top: 2px; }
  .back { color: var(--t2); text-decoration: none; font-size: 13px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 9px; }
  .back:hover { color: var(--t1); border-color: var(--t3); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .stat-row { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; flex: 1; min-width: 120px; }
  .stat .n { font-size: 24px; font-weight: 700; }
  .stat .l { color: var(--t3); font-size: 12px; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  th { color: var(--t3); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  .email { color: var(--t2); font-size: 12.5px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.pro { background: rgba(109,139,255,0.16); color: var(--accent); }
  .pill.free { background: var(--panel2); color: var(--t3); }
  .pill.admin { background: rgba(70,209,138,0.16); color: var(--green); }
  .acts { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  button.act { background: var(--panel2); color: var(--t1); border: 1px solid var(--border); border-radius: 8px; padding: 6px 11px; font-size: 12px; cursor: pointer; }
  button.act:hover { border-color: var(--t3); }
  button.act.danger:hover { border-color: var(--danger); color: var(--danger); }
  .msg { text-align: center; padding: 60px 20px; color: var(--t2); }
  .msg a { color: var(--accent); }
  .notif { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--panel2); border: 1px solid var(--border); color: var(--t1); padding: 11px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all .25s; pointer-events: none; }
  .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 640px) {
    th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">atwe<span>.ai</span> admin</div>
      <div class="sub">User &amp; access management</div>
    </div>
    <a class="back" href="/">← Back to app</a>
  </header>

  <div class="stat-row" id="stats"></div>
  <div class="card"><div id="content"><div class="msg">Loading…</div></div></div>
</div>
<div class="notif" id="notif"></div>

<script>
const token = localStorage.getItem('atwe_token');

function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove('show'), 2600);
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
  return data;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  try { return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
  catch { return ''; }
}

function gate(html) {
  document.getElementById('content').innerHTML = '<div class="msg">' + html + '</div>';
  document.getElementById('stats').innerHTML = '';
}

let USERS = [];

async function load() {
  if (!token) { gate('You are not signed in. <a href="/">Go to the app</a> and sign in first.'); return; }
  try {
    const { users } = await api('GET', '/api/admin/users');
    USERS = users || [];
    render();
  } catch (e) {
    if (/admin access/i.test(e.message)) gate('Your account does not have admin access.');
    else if (/authentication/i.test(e.message)) gate('Your session has expired. <a href="/">Sign in again</a>.');
    else gate(esc(e.message));
  }
}

function render() {
  const total = USERS.length;
  const pro = USERS.filter(u => u.plan === 'pro').length;
  const admins = USERS.filter(u => u.is_admin).length;
  const chats = USERS.reduce((s, u) => s + (u.chat_count || 0), 0);
  document.getElementById('stats').innerHTML = [
    ['Users', total], ['Pro', pro], ['Admins', admins], ['Chats', chats],
  ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

  const rows = USERS.map(u => `
    <tr data-id="${u.id}">
      <td>
        <div>${esc(u.name)}</div>
        <div class="email">${esc(u.email)}</div>
      </td>
      <td>
        <span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${u.plan}</span>
        ${u.is_admin ? '<span class="pill admin">admin</span>' : ''}
      </td>
      <td>${u.chat_count || 0}</td>
      <td>${fmtDate(u.created_at)}</td>
      <td>
        <div class="acts">
          <button class="act" onclick="togglePlan(${u.id})">${u.plan === 'pro' ? 'Set Free' : 'Set Pro'}</button>
          <button class="act" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Revoke admin' : 'Make admin'}</button>
          <button class="act danger" onclick="removeUser(${u.id})">Delete</button>
        </div>
      </td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <table>
      <thead><tr><th>User</th><th>Plan</th><th>Chats</th><th>Joined</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" class="msg">No users yet.</td></tr>'}</tbody>
    </table>`;
}

async function togglePlan(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  const plan = u.plan === 'pro' ? 'free' : 'pro';
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { plan }); merge(user); notify('Plan updated.'); }
  catch (e) { notify(e.message); }
}

async function toggleAdmin(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { is_admin: !u.is_admin }); merge(user); notify('Access updated.'); }
  catch (e) { notify(e.message); }
}

async function removeUser(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  if (!confirm('Delete ' + u.email + '? This removes their account, chats and projects.')) return;
  try { await api('DELETE', '/api/admin/users/' + id); USERS = USERS.filter(x => x.id !== id); render(); notify('User deleted.'); }
  catch (e) { notify(e.message); }
}

function merge(user) {
  const i = USERS.findIndex(x => x.id === user.id);
  if (i >= 0) USERS[i] = { ...USERS[i], ...user };
  render();
}

load();
</script>
</body>
</html>
