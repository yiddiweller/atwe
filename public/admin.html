<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<title>Atwe — Admin</title>
<link rel="icon" type="image/png" sizes="any" href="/favicon.png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  .hidden{display:none!important;}
  :root{
    /* Same color law as the main app: black / white / blue + a little grey;
       green/red/yellow are functional signals only. */
    --bg:#000000; --bg-1:#0B0B0D; --bg-2:#141416;
    --s1:#0B0B0D; --s2:#141416; --s3:#1C1C1E; --s4:#242426;
    --b1:rgba(255,255,255,.05); --b2:rgba(255,255,255,.08); --b3:rgba(255,255,255,.14);
    --divider:#3A3A3C;
    --t1:#ffffff; --t2:#8E8E93; --t3:#6E6E73; --t4:#48484A;
    --text-black:#1D1D1F;
    --accent:#0A84FF; --accent-dim:rgba(10,132,255,.12); --accent-mid:rgba(10,132,255,.22);
    --accent-tint:#DBE9FF;
    --green:#30D158; --green-edge:#66D98F; --green-tint:#E6FFEF;
    --red:#FF453A; --red-edge:#FF6B60; --red-tint:#FFEAEA;
    --amber:#FFCC00; --amber-edge:#FFE066;
    --r-sm:9px; --r-md:13px; --r-lg:18px; --r-pill:9999px;
    --ease:cubic-bezier(.22,.68,0,1);
  }
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--t1);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  /* Signed-out (login / gate / PIN lock): center the card in the full viewport, both axes */
  body:not(.authed) .main{align-items:center;justify-content:center;}
  body:not(.authed) .main-inner{max-width:520px;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);}
  button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;}
  input{font-family:inherit;}
  .wrap{max-width:1000px;margin:0 auto;}

  /* ── App shell: fixed left sidebar + scrolling main ── */
  .shell{display:flex;min-height:100vh;align-items:stretch;}
  .sidebar{
    flex:0 0 250px;width:250px;position:sticky;top:0;align-self:flex-start;
    height:100vh;overflow:hidden;
    background:var(--bg-1);border-right:1px solid var(--b1);
    display:flex;flex-direction:column;
    padding:calc(18px + env(safe-area-inset-top)) 14px 14px;
  }
  nav#tabs::-webkit-scrollbar{width:7px;}
  nav#tabs::-webkit-scrollbar-thumb{background:var(--s3);border-radius:9px;}
  nav#tabs::-webkit-scrollbar-track{background:transparent;}
  /* Brand — compact mark + wordmark */
  .brand{display:flex;align-items:center;gap:9px;padding:2px 8px 4px;margin-bottom:6px;}
  .brand img.mark{width:22px;height:22px;object-fit:contain;display:block;}
  .brand img.word{height:15px;width:auto;object-fit:contain;display:block;}
  .brand .tag{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);
    background:var(--accent-dim);border:1px solid var(--accent-mid);padding:2px 7px;border-radius:var(--r-pill);}
  /* Vertical nav */
  nav#tabs{display:flex;flex-direction:column;gap:1px;flex:1;min-height:0;margin-top:4px;
    overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--s3) transparent;
    padding-right:2px;}
  .nav-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t4);
    padding:0 10px;margin:15px 0 5px;}
  .nav-label:first-of-type{margin-top:6px;}
  .tab{position:relative;display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    background:none;border:none;color:var(--t2);font-size:13.5px;font-weight:500;line-height:1;
    padding:9px 11px 9px 13px;border-radius:9px;white-space:nowrap;
    transition:background .13s var(--ease),color .13s var(--ease);}
  .tab:hover{background:var(--s1);color:var(--t1);}
  .tab.active{background:var(--s2);color:var(--t1);font-weight:600;}
  .tab.active::before{content:"";position:absolute;left:2px;top:50%;transform:translateY(-50%);
    width:3px;height:16px;border-radius:2px;background:var(--accent);}
  /* Sidebar footer — role + back to app */
  .side-foot{margin-top:12px;padding-top:12px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:9px;}
  .side-role{display:flex;align-items:center;gap:8px;padding:2px 8px;font-size:12px;color:var(--t3);}
  .side-role b{color:var(--t1);font-weight:600;}
  .back{color:var(--t2);text-decoration:none;font-size:12.5px;font-weight:500;padding:8px 11px;border:none;
    border-radius:9px;transition:all .15s var(--ease);white-space:nowrap;text-align:center;}
  .back:hover{color:var(--t1);border-color:var(--b3);background:var(--s1);}
  /* Sign out — small red action pinned in the sidebar footer (bottom-left) */
  .side-logout{background:none;border:1px solid rgba(255,69,58,.28);color:var(--red);font-size:12.5px;font-weight:600;
    padding:8px 11px;border-radius:9px;cursor:pointer;text-align:center;white-space:nowrap;transition:all .15s var(--ease);font-family:inherit;}
  .side-logout:hover{background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.55);color:#fff;}

  /* Main column */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .main-inner{width:100%;max-width:1040px;margin:0 auto;
    padding:max(18px,env(safe-area-inset-top)) max(24px,env(safe-area-inset-right)) 48px max(24px,env(safe-area-inset-left));}
  .main-top{display:flex;align-items:center;gap:12px;min-height:40px;margin-bottom:20px;}
  .nav-toggle{display:none;background:var(--s1);border:none;border-radius:9px;
    width:38px;height:38px;align-items:center;justify-content:center;flex:0 0 auto;color:var(--t1);}
  .nav-toggle svg{width:19px;height:19px;stroke:currentColor;stroke-width:2;fill:none;}
  #viewTitle{font-size:21px;font-weight:800;letter-spacing:-.03em;}
  .nav-scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;}
  /* When signed out, the shell collapses to a centered login/gate */
  body:not(.authed) .sidebar,body:not(.authed) .main-top{display:none;}

  /* ── Stat cards ── */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
  .stat{background:var(--s1);border:none;border-radius:var(--r-md);padding:16px 18px;}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-.03em;}
  .stat .l{color:var(--t3);font-size:12px;font-weight:500;margin-top:2px;}

  /* ── Toolbar ── */
  .toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
  .toolbar input{flex:1;min-width:0;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);
    color:var(--t1);padding:11px 16px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .toolbar input:focus{border-color:var(--b3);}
  .toolbar input::placeholder{color:var(--t4);}
  .refresh{background:var(--s1);color:var(--t2);border:none;border-radius:var(--r-pill);
    padding:11px 16px;font-size:13px;font-weight:600;transition:all .15s var(--ease);white-space:nowrap;}
  .refresh:hover{color:var(--t1);border-color:var(--b3);}

  /* ── User list (cards) ── */
  .users{display:flex;flex-direction:column;gap:8px;}
  .u-card{display:flex;align-items:center;gap:13px;background:var(--s1);border:none;
    border-radius:var(--r-md);padding:13px 15px;cursor:pointer;transition:border-color .15s var(--ease),background .15s var(--ease);}
  .u-card:hover{border-color:var(--b3);background:var(--s2);}
  .avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;color:var(--accent-tint);background:var(--accent);}
  .avatar.has-img{background-size:cover;background-position:center;color:transparent;}
  /* AtChat activity */
  .ac-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 14px;}
  .ac-stat-card{background:var(--s1);border:none;border-radius:var(--r-md);padding:11px 8px;text-align:center;}
  .ac-stat-card .n{font-size:19px;font-weight:800;letter-spacing:-.02em;}
  .ac-stat-card .l{font-size:10.5px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .turn-box{display:flex;align-items:flex-start;gap:12px;background:var(--s1);border:none;border-radius:var(--r-md);padding:14px 16px;}
  .turn-dot{width:11px;height:11px;border-radius:50%;margin-top:4px;flex:0 0 auto;box-shadow:0 0 0 4px rgba(255,255,255,.04);}
  .turn-name{font-weight:700;font-size:14.5px;}
  .turn-sub{font-size:12.5px;color:var(--t3);margin-top:3px;line-height:1.4;}
  .turn-urls{font-size:11.5px;color:var(--t3);margin-top:5px;font-family:ui-monospace,SFMono-Regular,monospace;word-break:break-all;}
  .ac-apost{border:none;border-radius:var(--r-md);background:var(--s1);padding:11px 13px;margin-bottom:7px;}
  .ac-apost .b{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;color:var(--t1);}
  .ac-apost img{display:block;margin-top:7px;max-width:180px;max-height:180px;border-radius:10px;}
  .ac-apost .m{font-size:11.5px;color:var(--t3);margin-top:6px;}
  .u-main{flex:1;min-width:0;}
  .u-name{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-email{font-size:12.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-pills{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .u-meta{display:flex;gap:20px;flex-shrink:0;text-align:right;}
  .u-meta .mv{font-size:13px;font-weight:600;}
  .u-meta .mk{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;}
  .chev{color:var(--t4);flex-shrink:0;}
  .chev svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;}

  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:capitalize;}
  .pill.pro{background:var(--accent-dim);color:var(--accent);}
  .pill.free{background:var(--s3);color:var(--t3);}
  .pill.admin{background:var(--accent-dim);color:var(--accent);}
  .pill.sale{background:var(--accent-dim);color:var(--accent);text-transform:none;}

  .empty{text-align:center;padding:54px 20px;color:var(--t3);font-size:14px;}

  /* ── Overview ── */
  .ov-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .ov-title{font-size:20px;font-weight:800;letter-spacing:-.03em;}
  .ov-section{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin:4px 2px 11px;}
  .ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .ov-card{background:var(--s1);border:none;border-radius:var(--r-md);padding:15px 16px;
    display:flex;flex-direction:column;gap:12px;transition:border-color .15s var(--ease),background .15s var(--ease);}
  .ov-card:hover{border-color:var(--b3);background:var(--s2);}
  .ov-ic{width:34px;height:34px;border-radius:10px;background:var(--accent-dim);color:var(--accent);
    display:flex;align-items:center;justify-content:center;}
  .ov-ic svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;}
  
  .ov-card .n{font-size:25px;font-weight:800;letter-spacing:-.03em;line-height:1;}
  .ov-card .l{font-size:12px;color:var(--t3);font-weight:500;margin-top:5px;}

  /* ── Username locks ── */
  .lock-form{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .lock-form input{flex:1;min-width:130px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);
    color:var(--t1);padding:11px 16px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .lock-form input:focus{border-color:var(--b3);}
  .lock-form input::placeholder{color:var(--t4);}
  .lock-form .act{border-radius:var(--r-pill);}
  .lock-item{display:flex;align-items:center;gap:10px;background:var(--s1);border:none;
    border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;}
  .lock-main{flex:1;min-width:0;}
  .lock-name{font-size:14.5px;font-weight:600;}
  .lock-date{font-size:11.5px;color:var(--t3);white-space:nowrap;}
  .tiers{display:flex;flex-direction:column;gap:2px;margin:6px 0 4px;}
  .tier{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--b1);cursor:pointer;font-size:14px;}
  .tier:last-child{border-bottom:none;}
  .tier input{width:18px;height:18px;accent-color:var(--accent, var(--accent));flex:0 0 auto;cursor:pointer;}
  .tier > span:first-of-type{flex:1;min-width:0;}
  .tier .tc{font-size:12px;color:var(--t3);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .tier .tc.warn{color:var(--amber);font-weight:600;}
  #lockSearch,#lockBulk{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-md);color:var(--t1);padding:11px 14px;font-size:14px;outline:none;font-family:inherit;}
  #lockSearch:focus,#lockBulk:focus{border-color:var(--b3);}
  #lockSearch::placeholder,#lockBulk::placeholder{color:var(--t4);}
  .act.ghost{background:transparent;border:none;color:var(--t2);}

  /* ── Traffic analytics ── */
  .tf-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .tf-ranges{display:inline-flex;background:var(--s1);border:none;border-radius:var(--r-pill);padding:3px;}
  .tf-r{background:transparent;border:none;color:var(--t2);padding:8px 16px;font-size:13.5px;font-weight:600;border-radius:var(--r-pill);cursor:pointer;transition:.15s var(--ease);}
  .tf-r.on{background:var(--accent, var(--accent));color:#fff;}
  .tf-live{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--t2);font-weight:600;}
  .tf-dot{width:8px;height:8px;border-radius:50%;background:var(--green,var(--green));box-shadow:0 0 0 4px rgba(48,209,88,.16);animation:tfpulse 2s ease-in-out infinite;}
  @keyframes tfpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .tf-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .tf-card{background:var(--s1);border:none;border-radius:var(--r-md);padding:16px 18px;}
  .tf-cl{font-size:12.5px;color:var(--t3);margin-bottom:8px;}
  .tf-cv{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;}
  .tf-cd{font-size:12.5px;margin-top:8px;font-weight:600;}
  .tf-cd.up{color:var(--green,var(--green));} .tf-cd.down{color:var(--red,var(--red));} .tf-cd.flat,.tf-cd.muted{color:var(--t3);font-weight:500;}
  .tf-chart{display:flex;align-items:flex-end;gap:3px;height:160px;padding-top:8px;}
  .tf-bar{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;cursor:default;}
  .tf-barfill{width:100%;max-width:34px;background:linear-gradient(180deg,var(--accent,var(--accent)),color-mix(in srgb,var(--accent,var(--accent)) 55%,transparent));border-radius:5px 5px 2px 2px;transition:height .3s var(--ease),filter .15s;}
  .tf-bar:hover .tf-barfill{filter:brightness(1.25);}
  .tf-barlbl{font-size:10.5px;color:var(--t3);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .tf-locs{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
  .tf-loc{display:flex;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid var(--b1);font-size:13.5px;}
  .tf-loc:last-child{border-bottom:none;}
  .tf-loc-n{flex:0 0 auto;min-width:96px;font-weight:600;}
  .tf-loc-bar{flex:1;height:7px;background:var(--b1);border-radius:4px;overflow:hidden;}
  .tf-loc-bar > div{height:100%;background:var(--accent,var(--accent));border-radius:4px;}
  .tf-loc-v{flex:0 0 auto;color:var(--t2);font-variant-numeric:tabular-nums;font-weight:600;}
  /* Revenue hero + ads admin */
  .rev-hero{background:linear-gradient(135deg,var(--accent),var(--bg));border-radius:var(--r-md);padding:22px;margin-bottom:16px;color:var(--accent-tint);}
  .rev-hero .rl{font-size:13px;opacity:.85;}
  .rev-hero .rv{font-size:42px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-top:4px;font-variant-numeric:tabular-nums;}
  .rev-hero .rd{font-size:13px;margin-top:8px;opacity:.9;font-weight:600;}
  .rev-src{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--b1);}
  .rev-src:last-child{border-bottom:none;}
  .rev-src-n{flex:0 0 auto;min-width:120px;font-weight:600;}
  .rev-src-bar{flex:1;height:8px;background:var(--b1);border-radius:5px;overflow:hidden;}
  .rev-src-bar>div{height:100%;background:var(--accent,var(--accent));border-radius:5px;}
  .rev-src-v{flex:0 0 auto;font-variant-numeric:tabular-nums;font-weight:700;min-width:76px;text-align:right;}
  .rev-pay{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--b1);}
  .rev-pay:last-child{border-bottom:none;}
  .rev-pay-ic{flex:0 0 auto;width:34px;height:34px;border-radius:9px;background:var(--s2,rgba(127,127,127,.14));display:flex;align-items:center;justify-content:center;}
  .rev-pay-ic svg{width:17px;height:17px;stroke:var(--t1);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .rev-pay-main{flex:1;min-width:0;}
  .rev-pay-t{font-weight:600;font-size:14px;}
  .rev-pay-s{font-size:12px;color:var(--t3);margin-top:1px;}
  .rev-pay-v{flex:0 0 auto;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green,var(--green));}
  .aud-row{display:flex;gap:14px;align-items:flex-start;padding:12px 2px;border-bottom:1px solid var(--b1);}
  .aud-row:last-child{border-bottom:none;}
  .aud-main{flex:1;min-width:0;}
  .aud-act{font-weight:700;font-size:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
  .aud-tgt{font-size:12px;color:var(--t3);}
  .aud-meta{font-size:12px;color:var(--t3);margin-top:3px;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;opacity:.8;}
  .aud-side{flex:0 0 auto;text-align:right;}
  .aud-who{font-weight:600;font-size:13px;}
  .aud-when{font-size:11.5px;color:var(--t3);margin-top:2px;}
  .pill.ban{background:rgba(255,69,58,.16);color:var(--red);}
  .pill.susp{background:rgba(255,204,0,.16);color:var(--amber);}
  .act-filter{display:flex;gap:8px;flex-wrap:wrap;}
  .live-pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green,var(--green));margin-right:5px;vertical-align:middle;animation:livep 1.8s ease-in-out infinite;}
  @keyframes livep{0%,100%{opacity:.35;}50%{opacity:1;}}
  @media (prefers-reduced-motion: reduce){.live-pulse{animation:none;}}
  .act-row{display:flex;gap:13px;align-items:center;padding:11px 4px;border-bottom:1px solid var(--b1);}
  .act-row:last-child{border-bottom:none;}
  .act-ic{flex:0 0 auto;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--s3);}
  .act-ic svg{width:17px;height:17px;stroke:var(--t1);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .act-main{flex:1;min-width:0;}
  .act-txt{font-size:14px;line-height:1.4;}
  .act-txt b{font-weight:650;}
  .act-sub{font-size:11.5px;color:var(--t3);margin-top:2px;text-transform:capitalize;}

  .chat-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center;transition:background .15s var(--ease);}
  .chat-head:hover{background:var(--s2);}
  .chat-head .ct{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-body{display:none;padding:6px 14px 14px;border-top:1px solid var(--b1);}
  .chat-body.open{display:block;}
  .bubble{margin:10px 0;}
  .bubble .role{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:3px;font-weight:700;}
  .bubble .text{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
  .bubble.user .text{color:var(--t1);}
  .bubble.assistant .text{color:var(--t2);}
  .muted{color:var(--t3);font-size:12.5px;}

  /* ── Messages screen (Apple Messages-style, its own overlay) ── */
  .chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:none;align-items:center;justify-content:center;padding:max(20px,env(safe-area-inset-top)) 14px max(20px,env(safe-area-inset-bottom));
    z-index:60;animation:fade .2s var(--ease);}
  .chat-overlay.show{display:flex;}
  .chat-win{display:flex;flex-direction:column;width:100%;max-width:480px;height:100%;max-height:760px;
    background:var(--bg-1);border:none;border-radius:var(--r-lg);overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.7);animation:rise .28s var(--ease);}
  .chat-top{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--b1);
    background:rgba(20,20,22,.6);flex-shrink:0;}
  .chat-back{background:none;border:none;color:var(--accent);display:flex;align-items:center;gap:3px;
    font-size:15px;font-weight:500;padding:4px;margin:-4px;flex-shrink:0;}
  .chat-back svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;}
  .chat-who{display:flex;align-items:center;gap:10px;min-width:0;}
  .chat-who .avatar{width:34px;height:34px;font-size:13px;}
  .chat-who .ct-name{font-size:14.5px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-who .ct-email{font-size:11.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    display:flex;flex-direction:column;gap:3px;padding:18px 16px;}
  .chat-day{align-self:center;font-size:11px;color:var(--t3);margin:6px 0 10px;font-weight:600;}
  .dm-row{display:flex;margin-top:3px;}
  .dm-row.admin{justify-content:flex-end;}
  .dm-row.user{justify-content:flex-start;}
  .dm-row.gap{margin-top:11px;}
  .dm-msg{max-width:74%;padding:8px 14px;border-radius:19px;font-size:14.5px;line-height:1.4;
    white-space:pre-wrap;word-break:break-word;}
  .dm-row.admin .dm-msg{background:var(--accent);color:#fff;}
  .dm-row.user .dm-msg{background:var(--s3);color:var(--t1);}
  .dm-row.admin.tail .dm-msg{border-bottom-right-radius:6px;}
  .dm-row.user.tail .dm-msg{border-bottom-left-radius:6px;}
  .dm-msg.photo{padding:3px;background:transparent;}
  .dm-img{display:block;max-width:230px;width:100%;border-radius:14px;cursor:pointer;}
  .dm-msg.has-cap .dm-img{margin-bottom:6px;}
  /* Pending-photo preview above the composer */
  .chat-imgprev{display:none;align-items:center;gap:8px;padding:8px 14px 0;flex-shrink:0;}
  .chat-imgprev.show{display:flex;}
  .chat-imgprev img{height:54px;width:54px;object-fit:cover;border-radius:10px;border:none;}
  .chat-imgx{width:22px;height:22px;border-radius:50%;background:var(--s3);color:var(--t1);border:none;
    font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .chat-attach{width:38px;height:38px;border-radius:50%;background:var(--s2);border:none;color:var(--t2);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s var(--ease);}
  .chat-attach svg{width:20px;height:20px;stroke:currentColor;stroke-width:2.2;fill:none;}
  .chat-attach:hover{color:var(--t1);border-color:var(--b3);}
  .hidden-input{display:none;}
  .dm-time{align-self:center;font-size:10.5px;color:var(--t4);margin:8px 0 2px;}
  .chat-empty{margin:auto;text-align:center;color:var(--t3);font-size:14px;padding:30px;}
  .chat-compose{display:flex;gap:9px;align-items:flex-end;padding:12px 14px;border-top:1px solid var(--b1);
    background:rgba(20,20,22,.6);flex-shrink:0;}
  .chat-compose textarea{flex:1;min-width:0;background:var(--s2);border:1px solid var(--b2);border-radius:20px;
    color:var(--t1);padding:10px 16px;font-size:14.5px;font-family:inherit;line-height:1.4;outline:none;resize:none;
    min-height:42px;max-height:130px;transition:border-color .15s var(--ease);}
  .chat-compose textarea:focus{border-color:var(--accent);}
  .chat-compose textarea::placeholder{color:var(--t4);}
  .chat-send{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;transition:all .15s var(--ease);}
  .chat-send svg{width:20px;height:20px;stroke:#fff;stroke-width:2.4;fill:none;}
  .chat-send:hover{background:var(--accent);}
  .chat-send:disabled{opacity:.4;}

  /* Unread-reply badge on a user card */
  .u-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;
    border-radius:var(--r-pill);background:var(--red);color:var(--red-tint);font-size:11px;font-weight:700;flex-shrink:0;}

  /* ── Login ── */
  .login{max-width:380px;margin:6vh auto 0;background:rgba(18,18,20,.9);border:none;
    border-radius:var(--r-lg);padding:34px 28px;text-align:center;}
  .login img{width:46px;height:46px;object-fit:contain;margin:0 auto 18px;display:block;}
  .login h2{font-size:21px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;}
  .login p{color:var(--t3);font-size:14px;margin-bottom:24px;}
  .login label{display:block;text-align:left;font-size:12px;font-weight:600;color:var(--t2);margin:12px 0 6px;}
  .login input{width:100%;background:var(--s2);border:1px solid var(--divider);border-radius:var(--r-sm);color:var(--t1);
    padding:12px 14px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .login input:focus{border-color:var(--accent);}
  .login button{width:100%;margin-top:20px;background:var(--accent);color:var(--accent-tint);border:none;border-radius:var(--r-pill);
    padding:13px;font-size:14.5px;font-weight:700;transition:filter .15s var(--ease);}
  .login button:hover{filter:brightness(1.05);}
  .login button:disabled{opacity:.6;}
  /* Branded pre-sign-in gate (tap the mark to reveal the login form) */
  .gate{text-align:center;max-width:460px;margin:0 auto;padding:6vh 24px 40px;animation:gateIn .5s var(--ease);}
  .gate-mark{background:none;border:none;padding:0;cursor:pointer;display:inline-flex;border-radius:50%;
    transition:transform .28s var(--ease),filter .28s var(--ease);animation:gatePulse 3.4s var(--ease) infinite;}
  .gate-mark img{width:82px;height:82px;object-fit:contain;filter:drop-shadow(0 8px 34px rgba(255,255,255,.07));}
  .gate-mark:hover{transform:translateY(-2px) scale(1.04);}
  .gate-mark:active{transform:scale(.96);}
  .gate-mark:focus-visible{outline:2px solid var(--accent);outline-offset:6px;}
  .gate-title{font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1.2;margin:26px 0 9px;color:var(--t1);}
  .gate-sub{font-size:14px;line-height:1.6;color:var(--t3);margin:0;}
  .gate-hint{margin-top:22px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t4);}
  @keyframes gateIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes gatePulse{0%,100%{filter:none;}50%{filter:drop-shadow(0 0 2px rgba(255,255,255,.10));}}
  /* Admin device lock — 4-digit PIN pad. Native-passcode style: the Atwe mark up top,
     small round dots that fill in as you type (not boxes), and a full on-screen number
     pad with true-circle keys, like a phone's lock screen (Robinhood, iOS Passcode).
     The whole card is a centered flex column so it sits mid-screen with even breathing
     room above and below, not pinned to the bottom. Dots stay a neutral white when
     filled so the red "wrong" flash still reads as a distinct signal. */
  .pinpad{display:flex;flex-direction:column;align-items:center;text-align:center;
    max-width:400px;margin:0 auto;padding:4vh 24px 30px;animation:gateIn .4s var(--ease);}
  .pin-mark{width:52px;height:52px;object-fit:contain;margin:0 auto 38px;display:block;opacity:.96;
    filter:drop-shadow(0 6px 24px rgba(255,255,255,.06));}
  .pin-title{font-size:18px;font-weight:700;letter-spacing:-.01em;color:var(--t1);margin-bottom:4px;}
  .pin-sub{font-size:12.5px;color:var(--t3);min-height:16px;}
  .pin-sub:empty{display:none;}
  .pin-dots{display:flex;gap:18px;justify-content:center;align-items:center;margin:24px auto 0;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.32);background:transparent;
    transition:background .12s var(--ease),border-color .12s var(--ease),transform .12s var(--ease);}
  /* Correct PIN: dots simply stay solid white (no color change) — matches the plain,
     no-fanfare unlock of a real phone passcode screen. */
  .pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.05);}
  /* Wrong PIN: dots flash red and the row shakes, like an iPhone's incorrect-passcode. */
  .pin-dots.code-bad .pin-dot{background:rgba(255,69,58,.95);border-color:rgba(255,69,58,.95);}
  .pin-dots.shake{animation:pinShake .4s;}
  /* On-screen keypad: 1-9, then Cancel / 0 / backspace sharing the last row so the pad
     reads as an even 4x3 grid. Each key is a FIXED-SIZE circle (equal width+height,
     centered in its cell) with a thin always-on ring — a real circle at rest, not just
     an oval smear that appears on press. */
  .pin-keys{display:grid;grid-template-columns:repeat(3,1fr);row-gap:14px;max-width:352px;margin:44px auto 0;}
  .pin-key{width:84px;height:84px;margin:0 auto;background:none;border:none;
    color:var(--t1);font-size:32px;font-weight:500;font-family:inherit;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;
    transition:background .1s var(--ease);}
  .pin-key:hover{background:rgba(255,255,255,.06);}
  .pin-key:active{background:rgba(255,255,255,.13);}
  .pin-key.pin-key-back{color:var(--t2);}
  .pin-key.pin-key-back svg{width:23px;height:23px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  /* "⋯" trigger — opens a small Cancel menu instead of a permanent text button. */
  .pin-key.pin-key-more{color:var(--t3);}
  .pin-key.pin-key-more svg{width:24px;height:24px;fill:currentColor;}
  .pin-key.pin-key-more:hover{color:var(--t1);}
  .pin-key-empty{visibility:hidden;pointer-events:none;}
  .pin-hidden-input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;}
  .pin-more-scrim{position:fixed;inset:0;z-index:1190;background:transparent;}
  .pin-more-pop{position:fixed;z-index:1191;min-width:180px;background:rgba(28,28,30,.92);
    backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);
    border:none;border-radius:14px;padding:4px;box-shadow:0 14px 40px rgba(0,0,0,.5);}
  .pmp-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    color:var(--t1);font-size:14px;font-weight:600;font-family:inherit;padding:11px 12px;border-radius:10px;cursor:pointer;}
  .pmp-item:hover{background:rgba(255,255,255,.08);}
  .pmp-item svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  /* Plain text "Back" link used by the Device-lock management panel (Reset PIN /
     Remove lock / Back) — a different context from the passcode pad's grid Cancel. */
  .pin-cancel{margin:10px auto 0;background:none;border:none;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
  .pin-cancel:hover{color:var(--t1);}
  .lock-actions{display:flex;flex-direction:column;gap:11px;max-width:264px;margin:8px auto 0;}
  .lock-actions .btn{width:100%;}
  /* Destructive (red): solid fill + 0.5px lighter-edge hairline + tinted text, per the color law's semantic-button recipe. */
  .btn.danger{background:var(--red);color:var(--red-tint);box-shadow:0 0 0 .5px var(--red-edge) inset;}
  .btn.danger:hover{filter:brightness(1.1);}
  .btn.danger:active{filter:brightness(.85);}
  .side-lock{background:none;border:none;color:var(--t2);font-size:12.5px;font-weight:500;
    padding:8px 11px;border-radius:9px;cursor:pointer;text-align:center;white-space:nowrap;transition:all .15s var(--ease);font-family:inherit;}
  .side-lock:hover{color:var(--t1);border-color:var(--b3);background:var(--s1);}
  @keyframes pinShake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(3px);}30%,50%,70%{transform:translateX(-7px);}40%,60%{transform:translateX(7px);}}
  .login .err{color:var(--red);font-size:13px;margin-top:14px;min-height:16px;}

  /* ── Toast ── */
  .notif{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(38,38,42,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:none;color:var(--t1);padding:12px 20px;border-radius:var(--r-pill);font-size:13.5px;font-weight:500;
    opacity:0;transition:all .25s var(--ease);pointer-events:none;z-index:80;}
  .notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ── Responsive ── */
  @media (max-width:900px){
    /* Off-canvas sidebar: slides in over the content, toggled by the hamburger. */
    .sidebar{position:fixed;top:0;left:0;z-index:50;height:100dvh;
      transform:translateX(-100%);transition:transform .24s var(--ease);
      box-shadow:0 0 0 100vmax transparent;}
    body.nav-open .sidebar{transform:translateX(0);box-shadow:2px 0 24px rgba(0,0,0,.5);}
    .nav-toggle{display:flex;}
    .main-inner{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));}
  }
  @media (max-width:760px){
    .stat-row,.ov-grid{grid-template-columns:repeat(2,1fr);}
    .u-meta{display:none;}
    .modal{padding:20px;}
    .meta-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:380px){
    .u-pills .pill.free{display:none;}
  }
  /* Features tab: the checklist page embedded full-height. */
  .feat-frame{width:100%;height:calc(100vh - 108px);min-height:520px;border:none;border-radius:14px;
    background:#0b0c0e;display:block;}
  @media (max-width:900px){ .feat-frame{height:calc(100vh - 96px);} }
  /* Feature Controls */
  .fc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
  .fc-intro{font-size:13.5px;color:var(--t2);line-height:1.5;max-width:60ch;}
  .fc-stat{font-size:13px;color:var(--t3);white-space:nowrap;}
  .fc-num{font-size:16px;font-weight:800;color:var(--t1);}
  .fc-search{width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--line);border-radius:10px;
    color:var(--t1);font-size:14px;padding:10px 13px;outline:none;margin-bottom:16px;font-family:inherit;}
  .fc-search:focus{border-color:var(--accent);}
  .fc-cat{border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;background:var(--card);}
  .fc-cat-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;
    border-bottom:1px solid var(--line);background:var(--card2,rgba(255,255,255,.02));}
  .fc-cat-name{font-size:14.5px;font-weight:800;}
  .fc-cat-count{font-size:11.5px;font-weight:600;color:var(--t3);margin-left:6px;}
  .fc-catbtn{background:none;border:1px solid var(--line);border-radius:8px;color:var(--t2);font-size:12px;
    font-weight:600;padding:5px 11px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .fc-catbtn:hover{border-color:var(--accent);color:var(--t1);}
  .fc-row{padding:11px 16px;border-bottom:1px solid var(--line);}
  .fc-row:last-child{border-bottom:none;}
  /* Vault */
  .vt-note{font-size:12.5px;color:var(--t2);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-bottom:14px;line-height:1.5;}
  .vt-note code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:5px;font-size:11.5px;}
  .vt-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
  .vt-crumbs{font-size:14px;color:var(--t2);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .vt-crumb{cursor:pointer;color:var(--t1);font-weight:600;}
  .vt-crumb:hover{color:var(--accent);}
  .vt-sep{color:var(--t4);}
  .vt-tools{display:flex;gap:7px;flex-wrap:wrap;}
  .vt-tbtn{background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--t1);font-size:12.5px;font-weight:600;padding:7px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .vt-tbtn:hover{border-color:var(--accent);}
  .vt-progress{font-size:12.5px;color:var(--t2);padding:8px 4px;}
  .vt-list{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card);}
  .vt-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
  .vt-row:last-child{border-bottom:none;}
  .vt-row:hover{background:rgba(255,255,255,.03);}
  .vt-ic{width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:9px;background:rgba(255,255,255,.05);}
  .vt-ic svg{width:19px;height:19px;fill:none;stroke:var(--t2);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .vt-folder svg{fill:var(--accent);stroke:var(--accent);}
  .vt-secret svg{stroke:#e0a33e;}
  .vt-main{flex:1;min-width:0;}
  .vt-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .vt-sub{font-size:11.5px;color:var(--t3);margin-top:1px;}
  .vt-act{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:5px 7px;border-radius:7px;flex:none;}
  .vt-act svg{width:16px;height:16px;}
  .vt-act:hover{color:var(--t1);background:rgba(255,255,255,.06);}
  .vt-del:hover{color:var(--danger);}
  .vt-modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.6);}
  .vt-modal-card{background:var(--card2,#16181d);border:1px solid var(--line);border-radius:16px;padding:20px;width:min(520px,100%);}
  .vt-modal-h{font-size:16px;font-weight:800;margin-bottom:12px;}
  .vt-secret-val{width:100%;box-sizing:border-box;min-height:96px;resize:vertical;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--t1);background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px;}
  .vt-modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}

  /* ═══════════════════════════════════════════════════════════════════════
     ATWE APP DESIGN LANGUAGE — the admin re-skinned to read as the same
     product as the app. Same tokens, same laws:
       · "White acts, blue identifies" — the ONE primary CTA per surface is a
         WHITE pill (near-black label); blue is identity only (links, active,
         selected, toggles-on, the AI entry point).
       · Cards are borderless fills (s1) with a soft 20px radius; separation
         comes from space + hairlines, never outlines.
       · Rows are iOS-grouped: full-width page-bg hairlines, blue-tint icon
         discs, chevrons.
       · Pills for buttons/inputs; s3+white for a selected segment.
     This layer overrides the component styles above — the view logic and all
     class names are untouched, so every tool keeps working.
     ═══════════════════════════════════════════════════════════════════════ */
  :root{
    /* app tokens the admin was missing */
    --primary:#FFFFFF; --on-primary:#1D1D1F;
    --r-xl:24px; --card-r:20px; --feed-gutter:16px;
    --t-fast:120ms; --t-base:200ms;
    --accent-rgb:10,132,255;
    /* aliases used by the Feature Controls + Vault views (were undefined) */
    --card:var(--s1); --card2:var(--s2); --line:var(--b2); --danger:var(--red);
  }
  /* ── Buttons: white acts ── */
  .btn{border-radius:var(--r-pill);}

  .btn.primary:active,.send-btn:active,.ad-acts button.ok:active{filter:brightness(.88);transform:scale(.98);}
  .btn.danger{border-radius:var(--r-pill);}
  /* Secondary chips (user actions etc.): grey glass, pill — blue is not a button color */
  .act{background:var(--s2);color:var(--t1);border:none;box-shadow:0 0 0 .5px var(--b2) inset;border-radius:var(--r-pill);}
  .act:hover{background:var(--s3);}
  .act.danger{background:rgba(255,69,58,.10);color:var(--red);box-shadow:0 0 0 .5px rgba(255,69,58,.3) inset;}

  .copy{background:var(--s2);color:var(--t1);border:none;box-shadow:0 0 0 .5px var(--b2) inset;}

  /* Segmented ranges: selected = s3 fill + white bold (app tab law), not blue */

  /* Sign in = the ONE primary CTA on its screen → white acts (app law). */
  .login button{background:var(--primary);color:var(--on-primary);}

  /* Sign-in sits DIRECTLY on the black stage like the app's auth screens —

<script>
let token = localStorage.getItem('atwe_token');

// "Back to app" should leave the admin subdomain for the main app.
(function setBackLink(){
  const link = document.getElementById('backLink');
  if (location.hostname.startsWith('admin.')) {
    link.href = location.protocol + '//' + location.hostname.replace(/^admin\./, '') + '/';
  }
})();

function notify(msg){
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove('show'), 2600);
}

async function api(method, path, body){
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error(data.error || ('Request failed (' + res.status + ')'));
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

function esc(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#96;');
}
function initial(name){ return (String(name || '?').trim()[0] || '?').toUpperCase(); }
function avatarHtml(u, cls){
  cls = cls || 'avatar';
  if (u && u.avatar) return `<div class="${cls} has-img" style="background-image:url('${u.avatar}')"></div>`;
  return `<div class="${cls}">${esc(initial(u && u.name))}</div>`;
}

function fmtDate(d){
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
  catch (e) { return '—'; }
}
function fmtDateTime(d){
  if (!d) return '—';
  try { return new Date(d).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
  catch (e) { return '—'; }
}
function ago(d){
  if (!d) return 'never';
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 2592000) return Math.floor(s/86400) + 'd ago';
  return fmtDate(d);
}
// Messages store content as a string or an array of blocks (text + image).
function msgText(content){
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) return content.map(b => b.type === 'image' ? '🖼️ [image]' : (b.text || '')).join(' ').trim();
  return '';
}

function gate(html){
  document.getElementById('content').innerHTML = '<div class="empty">' + html + '</div>';
  document.getElementById('stats').innerHTML = '';
  document.body.classList.remove('authed');
}

// Branded gate shown on a fresh visit (before sign-in): the Atwe mark + a line
// that admin control isn't open to everyone. Tapping the mark reveals the login form.
function showGate(){
  document.getElementById('stats').innerHTML = '';
  document.body.classList.remove('authed');
  document.getElementById('content').innerHTML = `
    <div class="gate">
      <button class="gate-mark" onclick="gateTap()" aria-label="Atwe">
        <img src="/logo-mark.png" alt="Atwe"/>
      </button>
      <h2 class="gate-title">Not open to everyone.</h2>
      <p class="gate-sub">You've reached Atwe's control room — where the platform is run. Access is for the team only.</p>
    </div>`;
}

// Clear the session and return to the branded gate.
function doLogout(){
  token = null;
  localStorage.removeItem('atwe_token');
  document.title = 'Atwe Admin';
  showGate();
  notify('Signed out.');
}

// ── Admin device lock (4-digit PIN) — native-passcode style: dots + on-screen keypad,
//    like a phone lock screen, reusing the app's OTP-box green/red flash colors so
//    correct/wrong still reads as distinct signals. Stored as a device-local SHA-256
//    hash; a convenience/obscurity lock, NOT server auth (real security stays the
//    email+password sign-in). ──
const ADMIN_LOCK_KEY = 'atwe_admin_lock';
async function sha256Hex(s){
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, '0')).join('');
}
function hasAdminLock(){ return !!localStorage.getItem(ADMIN_LOCK_KEY); }
// Set once this PIN gate is passed for the current page load, so a correct entry
// leads straight into the dashboard on the very next load() call instead of load()
// re-showing the same PIN pad (a token check alone can't tell "just unlocked" apart
// from "freshly opened" — this flag is what makes that distinction).
let _adminSessionUnlocked = false;

// Gate logo tap → the PIN pad, but ONLY when this device already has a saved session
// (a real prior email+password login) — the PIN is a convenience shortcut back in,
// never a substitute for the first login. Without this `token` check, a device that
// (for any reason) has a lock hash saved but no session would be routed to a PIN
// prompt with no correct code to enter, and Cancel just returns to this same gate —
// an inescapable loop. No token → always straight to sign-in, regardless of the lock.
function gateTap(){ if (token && hasAdminLock()) showPin('unlock'); else showLogin(); }

// 'unlock' checks against the stored PIN. 'set' (no lock yet) and 'change' (replacing
// one — reachable straight from the dashboard, no need to know the old PIN, since
// being inside the dashboard already proves who you are) are the same 2-stage
// create-then-confirm flow; only the final notify() message differs.
let _pin = { mode: 'unlock', buf: '', stage: 0, first: '' };
let _pinBusy = false;
function showPin(mode){ _pin = { mode, buf: '', stage: 0, first: '' }; _pinBusy = false; renderPin(); }
function _pinCopy(){
  if (_pin.mode === 'unlock') return ['Admin Passcode', ''];
  return _pin.stage === 0 ? ['Create a PIN', 'Choose a 4-digit code'] : ['Confirm your PIN', 'Enter it once more'];
}
function renderPin(){
  // Every (re)draw of this screen starts a fresh entry — without this, advancing from
  // "create" to "confirm" would carry the OLD 4-digit buffer over, so pinKeyTap's
  // buf.length>=4 guard silently swallows every tap on the confirm step (the dots
  // look empty because they're freshly rendered, but the buffer underneath isn't).
  _pin.buf = '';
  const [t, s] = _pinCopy();
  document.getElementById('stats').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div class="pinpad">
      <img class="pin-mark" src="/logo-mark.png" alt="Atwe"/>
      <div class="pin-title" id="pinTitle">${esc(t)}</div>
      <div class="pin-sub" id="pinSub">${esc(s)}</div>
      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <input class="pin-hidden-input" id="pinHiddenInput" inputmode="numeric" maxlength="4" autocomplete="off" oninput="pinHiddenInput(this)"/>
      <div class="pin-keys">
        <button class="pin-key" onclick="pinKeyTap('1')">1</button>
        <button class="pin-key" onclick="pinKeyTap('2')">2</button>
        <button class="pin-key" onclick="pinKeyTap('3')">3</button>
        <button class="pin-key" onclick="pinKeyTap('4')">4</button>
        <button class="pin-key" onclick="pinKeyTap('5')">5</button>
        <button class="pin-key" onclick="pinKeyTap('6')">6</button>
        <button class="pin-key" onclick="pinKeyTap('7')">7</button>
        <button class="pin-key" onclick="pinKeyTap('8')">8</button>
        <button class="pin-key" onclick="pinKeyTap('9')">9</button>
        <button class="pin-key pin-key-more" id="pinMoreBtn" onclick="pinOpenMoreMenu(this)" aria-label="More options"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg></button>
        <button class="pin-key" onclick="pinKeyTap('0')">0</button>
        <button class="pin-key pin-key-back" onclick="pinBackspace()" aria-label="Backspace"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
      </div>
    </div>
    <div class="pin-more-scrim hidden" id="pinMoreScrim" onclick="pinCloseMoreMenu()"></div>
    <div class="pin-more-pop hidden" id="pinMorePop" role="menu" aria-label="Passcode options">
      <button class="pmp-item" role="menuitem" onclick="pinCloseMoreMenu();pinCancel()"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg><span>Cancel</span></button>
    </div>`;
  setTimeout(() => { const hi = document.getElementById('pinHiddenInput'); if (hi) hi.focus(); }, 60);
}
function pinOpenMoreMenu(btn) {
  const pop = document.getElementById('pinMorePop');
  const scrim = document.getElementById('pinMoreScrim');
  if (!pop || !scrim) return;
  if (!pop.classList.contains('hidden')) { pinCloseMoreMenu(); return; }
  scrim.classList.remove('hidden');
  pop.classList.remove('hidden');
  pop.style.visibility = 'hidden';
  const r = btn.getBoundingClientRect();
  requestAnimationFrame(() => {
    const pw = pop.offsetWidth, ph = pop.offsetHeight, M = 8;
    let left = r.left - (pw - r.width) / 2;
    left = Math.max(M, Math.min(left, window.innerWidth - pw - M));
    let top = r.top - ph - 8;
    top = Math.max(M, top);
    pop.style.left = Math.round(left) + 'px';
    pop.style.top = Math.round(top) + 'px';
    pop.style.visibility = '';
  });
}
function pinCloseMoreMenu(){
  document.getElementById('pinMorePop')?.classList.add('hidden');
  document.getElementById('pinMoreScrim')?.classList.add('hidden');
}
function pinRenderDots(){
  const filled = _pin.buf.length;
  document.querySelectorAll('#pinDots .pin-dot').forEach((d, i) => d.classList.toggle('filled', i < filled));
}
function pinClear(){
  _pin.buf = '';
  pinRenderDots();
  const dots = document.getElementById('pinDots'); if (dots) dots.classList.remove('code-bad');
  const hi = document.getElementById('pinHiddenInput'); if (hi) hi.value = '';
}
// On-screen keypad tap — same buffer + auto-submit-at-4 as typing into the hidden input.
function pinKeyTap(d){
  if (_pinBusy || _pin.buf.length >= 4) return;
  _pin.buf += d;
  pinRenderDots();
  const hi = document.getElementById('pinHiddenInput'); if (hi) hi.value = _pin.buf;
  if (_pin.buf.length === 4) pinSubmit(_pin.buf);
}
function pinBackspace(){
  if (_pinBusy) return;
  _pin.buf = _pin.buf.slice(0, -1);
  pinRenderDots();
  const hi = document.getElementById('pinHiddenInput'); if (hi) hi.value = _pin.buf;
}
// A physical keyboard (desktop admins) types into this off-screen field instead —
// same buffer, so mouse/touch taps and real typing stay in sync either way.
function pinHiddenInput(el){
  const v = (el.value || '').replace(/\D/g, '').slice(0, 4);
  el.value = v;
  _pin.buf = v;
  pinRenderDots();
  if (v.length === 4) pinSubmit(v);
}
// iPhone-style shake on a wrong PIN (re-triggerable without a full re-render).
function pinShake(el){ if (!el) return; el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake'); }
async function pinSubmit(code){
  if (_pinBusy) return;
  _pinBusy = true;
  const hash = await sha256Hex(code);
  const stored = localStorage.getItem(ADMIN_LOCK_KEY);
  const dots = document.getElementById('pinDots');
  // Correct → no color change, just a brief pause (the dots are already solid white)
  // before advancing — a plain, no-fanfare unlock like a real phone passcode.
  const pass = (next) => {
    dots.classList.remove('code-bad', 'shake');
    setTimeout(() => { _pinBusy = false; next(); }, 260);
  };
  // Wrong → red flash + shake, like an iPhone's incorrect-passcode, then retry.
  const fail = (msg) => {
    dots.classList.remove('code-bad');
    void dots.offsetWidth;
    dots.classList.add('code-bad');
    pinShake(dots);
    setTimeout(() => {
      pinClear();
      const titleEl = document.getElementById('pinTitle'); if (titleEl) titleEl.textContent = _pinCopy()[0];
      const sub = document.getElementById('pinSub'); if (sub) sub.textContent = msg;
      const hi = document.getElementById('pinHiddenInput'); if (hi) hi.focus();
      _pinBusy = false;
    }, 640);
  };

  if (_pin.mode === 'unlock') {
    if (hash === stored) pass(() => { _adminSessionUnlocked = true; load(); });
    else fail('Wrong PIN — try again');
    return;
  }
  // 'set' or 'change' — same create-then-confirm flow.
  if (_pin.stage === 0) { pass(() => { _pin.first = hash; _pin.stage = 1; renderPin(); }); return; }
  if (hash === _pin.first) {
    pass(() => {
      localStorage.setItem(ADMIN_LOCK_KEY, hash);
      notify(_pin.mode === 'set' ? 'Admin lock set.' : 'Admin lock updated.');
      renderView();
    });
  } else {
    _pin.stage = 0; _pin.first = '';
    fail("PINs didn't match — start again");
  }
}
function pinCancel(){ if (_pin.mode === 'unlock') showGate(); else renderView(); }

async function doAdminLogin(){

  err.textContent = '';

      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (!res.ok) throw new Error(data.error || 'Sign in failed.');
    if (!data.user || !data.user.adminAccess) throw new Error('This account does not have admin access.');
    token = data.token;
    localStorage.setItem('atwe_token', token);

    err.textContent = e.message;
    btn.disabled = false;
  }
}

const TAB_PERM = {
  overview: 'super', users: 'users', revenue: 'revenue', ads: 'ads', affiliations: 'ads',
  traffic: 'growth', site: 'super', usernames: 'handles', posts: 'moderation', support: 'support',
  reports: 'moderation', disputes: 'refunds', circles: 'moderation', feed: 'super',
  finance: 'revenue', growth: 'growth', audit: 'super', staff: 'super',
  refunds: 'refunds', appeals: 'users', datareq: 'users', activity: 'super', investigate: 'moderation', moderate: 'moderation',
  cards: 'revenue', features: 'super', featurecontrols: 'super', vault: 'super',
};
function canSee(tab){ const p = TAB_PERM[tab]; if (ME.superadmin) return true; return p !== 'super' && ME.perms.includes(p); }

async function load(){
  if (!token) { showGate(); return; }
  // A saved token means this device was already signed in — reopening the tab (or a
  // fresh boot) must not skip straight to the dashboard when a device lock is set.
  // Passing the PIN sets _adminSessionUnlocked before calling load() again, so this
  // only gates the FIRST load() of a page load, not the one right after unlocking.
  if (hasAdminLock() && !_adminSessionUnlocked) { showPin('unlock'); return; }
  try {
    // Establish who's signed in + their scopes BEFORE hitting any scoped route
    // (a scoped staffer without 'users' would 403 on the old users prefetch).
    const cfg = await api('GET', '/api/config').catch(() => ({}));
    const { user } = await api('GET', '/api/auth/me');
    if (!user || !user.adminAccess) { token = null; localStorage.removeItem('atwe_token'); showLogin('That account does not have admin access.'); return; }
    // Staff-2FA policy: when required, a staffer without 2FA is gated until they enable
    // it (in the normal app — so this can't create an unrecoverable lockout).
    if (cfg.requireAdmin2fa && !user.twoFactorEnabled) { show2faGate(); return; }
    ME = { perms: user.adminPerms === 'all' ? [] : (user.adminPerms || []), role: user.adminRole || null, superadmin: user.adminPerms === 'all', twoFa: !!user.twoFactorEnabled };
    applyTabPerms();
    if (!canSee(VIEW)) VIEW = firstVisibleTab();
    if (canSee('users')) { try { const { users } = await api('GET', '/api/admin/users'); USERS = users || []; } catch (_) {} }
    renderView();
  } catch (e) {
    if (e.data && e.data.needs2fa) { show2faGate(); return; }
    if (e.status === 401) { token = null; localStorage.removeItem('atwe_token'); showLogin('Your session has expired — please sign in.'); }
    else if (e.status === 403) { token = null; localStorage.removeItem('atwe_token'); showLogin('That account does not have admin access.'); }
    else gate(esc(e.message));
  }
}

/* ─── Features (product feature checklist, embedded) ─── */
function renderFeaturesView(){
  const stats = document.getElementById('stats'); if (stats) stats.style.display = 'none';
  const c = document.getElementById('content');
  // Hand the dashboard's own (known-good) session token to the embedded page in
  // THREE ways so it can never falsely lock: (1) in the frame's URL hash — the
  // most reliable, needs no cross-frame scripting and is never sent to the server;
  // (2) a postMessage on load; (3) a postMessage on request. iOS Safari restricts
  // localStorage inside iframes, which caused the false "sign in" lock.
  const src = '/features.html?embed=1&theme=dark#t=' + encodeURIComponent(token || '');
  c.innerHTML = '<iframe class="feat-frame" title="Feature checklist"></iframe>';
  const f = c.querySelector('.feat-frame');
  if (f) { f.addEventListener('load', () => { try { f.contentWindow.postMessage({ type: 'atwe-admin-token', token }, location.origin); } catch (e) {} }); f.src = src; }
}
window.addEventListener('message', (e) => {
  if (e.origin !== location.origin) return;
  if (e.data && e.data.type === 'atwe-admin-token-request' && token) {
    const f = document.querySelector('.feat-frame');
    if (f && f.contentWindow) { try { f.contentWindow.postMessage({ type: 'atwe-admin-token', token }, location.origin); } catch (err) {} }
  }
});

/* ─── Feature Controls (module-level kill switches) ─── */
let CONTROLS = { controls: {}, meta: [] };
let _fcSearch = '';
function renderFeatureControlsView(){
  document.getElementById('stats').innerHTML = '';
  document.getElementById('content').innerHTML = '<div class="empty">Loading…</div>';
  loadControls();
}
async function loadControls(){
  try { CONTROLS = await api('GET', '/api/admin/feature-controls'); renderControls(); }
  catch (e) { document.getElementById('content').innerHTML = '<div class="empty">' + esc(e.message) + '</div>'; }
}
function fcIsOn(key){ return (CONTROLS.controls || {})[key] !== false; }
function renderControls(){
  const meta = CONTROLS.meta || [];
  const total = meta.length;
  const off = meta.filter(f => !fcIsOn(f.key)).length;
  const q = _fcSearch.trim().toLowerCase();
  // group by category, preserving first-seen order
  const cats = []; const byCat = {};
  meta.forEach(f => { if (!byCat[f.cat]) { byCat[f.cat] = []; cats.push(f.cat); } byCat[f.cat].push(f); });
  let html = ''
    + '<div class="fc-head">'
    +   '<div class="fc-intro"><b>Feature Controls.</b> Turn any of your live features off across the whole app — the moment you do, anyone who opens it sees <b>“Unavailable.”</b> Everything defaults to <span style="color:var(--accent)">Active</span>. Money features are also blocked on the server when off.</div>'
    +   '<div class="fc-stat"><span class="fc-num">' + (total - off) + '</span> active · <span class="fc-num" style="color:var(--danger)">' + off + '</span> off · ' + total + ' total</div>'
    + '</div>'
    + '<input class="fc-search" id="fcSearch" placeholder="Search features…" value="' + esc(_fcSearch) + '" oninput="fcOnSearch(this.value)"/>';
  cats.forEach(cat => {
    const items = byCat[cat].filter(f => !q || (f.label + ' ' + f.cat).toLowerCase().includes(q));
    if (!items.length) return;
    const onCount = items.filter(f => fcIsOn(f.key)).length;
    const allOff = onCount === 0;
    html += '<div class="fc-cat">'
      + '<div class="fc-cat-head"><div class="fc-cat-name">' + esc(cat) + ' <span class="fc-cat-count">' + onCount + '/' + items.length + ' on</span></div>'
      + '<button class="fc-catbtn" onclick="toggleControlCategory(' + JSON.stringify(cat).replace(/"/g,'&quot;') + ',' + (allOff ? 'true' : 'false') + ')">' + (allOff ? 'Turn all on' : 'Turn all off') + '</button></div>';
    items.forEach(f => {
      const on = fcIsOn(f.key);
      html += '<div class="site-row fc-row">'
        + '<div><div class="srt">' + esc(f.label) + (on ? '' : ' <span class="pill ban">off</span>') + '</div><div class="srs">' + esc(f.key) + '</div></div>'
        + '<button class="switch flag ' + (on ? 'on' : '') + '" onclick="toggleControl(' + JSON.stringify(f.key).replace(/"/g,'&quot;') + ')" aria-label="' + esc(f.label) + '"><span></span></button></div>';
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}
function fcOnSearch(v){ _fcSearch = v; const el = document.activeElement; renderControls(); const s = document.getElementById('fcSearch'); if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); } }
async function toggleControl(key){
  const cur = fcIsOn(key); const want = !cur;
  if (!want && !confirm('Turn OFF "' + key + '"? Anyone who opens it will see “Unavailable” until you turn it back on.')) return;
  try {
    const r = await api('PUT', '/api/admin/feature-controls', { controls: { [key]: want } });
    CONTROLS.controls = r.controls; renderControls();
    notify(want ? 'Feature turned on.' : 'Feature turned off.');
  } catch (e) { notify(e.message); }
}
async function toggleControlCategory(cat, want){
  const keys = (CONTROLS.meta || []).filter(f => f.cat === cat).map(f => f.key);
  if (!want && !confirm('Turn OFF every feature in "' + cat + '"? Users will see “Unavailable” for all of them.')) return;
  const patch = {}; keys.forEach(k => patch[k] = want);
  try {
    const r = await api('PUT', '/api/admin/feature-controls', { controls: patch });
    CONTROLS.controls = r.controls; renderControls();
    notify(want ? 'Category turned on.' : 'Category turned off.');
  } catch (e) { notify(e.message); }
}

/* ─── Vault (private admin drive: encrypted files, folders, secrets) ─── */
let VAULT = { parent: null, items: [], path: [], encKey: false };
const VT_IC = {
  folder: '<svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
  file: '<svg viewBox="0 0 24 24"><path d="M6 2h8l6 6v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/><path d="M14 2v6h6"/></svg>',
  secret: '<svg viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>',
};
function renderVaultView(){ document.getElementById('stats').innerHTML=''; document.getElementById('content').innerHTML='<div class="empty">Loading…</div>'; loadVault(null); }
async function loadVault(parent){
  VAULT.parent = parent || null;
  try {
    const d = await api('GET', '/api/admin/drive' + (parent ? ('?parent=' + encodeURIComponent(parent)) : ''));
    VAULT.items = d.items || []; VAULT.path = d.path || []; VAULT.encKey = !!d.encryptedKey; renderVault();
  } catch (e) { document.getElementById('content').innerHTML = '<div class="empty">' + esc(e.message) + '</div>'; }
}
function vtSize(n){ n = +n || 0; if (n < 1024) return n + ' B'; if (n < 1048576) return (n/1024).toFixed(1) + ' KB'; return (n/1048576).toFixed(1) + ' MB'; }
function renderVault(){
  const crumbs = ['<span class="vt-crumb" onclick="loadVault(null)">Vault</span>']
    .concat(VAULT.path.map(p => `<span class="vt-sep">›</span><span class="vt-crumb" onclick="loadVault('${p.id}')">${esc(p.name)}</span>`)).join('');
  const folders = VAULT.items.filter(i => i.kind === 'folder');
  const files = VAULT.items.filter(i => i.kind === 'file');
  const secrets = VAULT.items.filter(i => i.kind === 'secret');
  const row = (it) => {
    const click = it.kind === 'folder' ? `loadVault('${it.id}')` : (it.kind === 'file' ? `vaultDownload('${it.id}')` : `vaultReveal('${it.id}')`);
    const sub = it.kind === 'file' ? vtSize(it.size_bytes) : (it.kind === 'secret' ? 'Secret · tap to reveal' : 'Folder');
    return `<div class="vt-row" onclick="${click}">
      <span class="vt-ic vt-${it.kind}">${VT_IC[it.kind]}</span>
      <div class="vt-main"><div class="vt-name">${esc(it.name)}</div><div class="vt-sub">${sub}${it.note ? ' · ' + esc(it.note) : ''}</div></div>
      <button class="vt-act" onclick="event.stopPropagation();vaultRename('${it.id}')" aria-label="Rename" title="Rename">✎</button>
      <button class="vt-act vt-del" onclick="event.stopPropagation();vaultDelete('${it.id}')" aria-label="Delete" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
    </div>`;
  };
  const empty = !VAULT.items.length ? '<div class="empty" style="padding:34px 0">This folder is empty. Upload files, create a folder, or add a secret.</div>' : '';
  document.getElementById('content').innerHTML = `
    <div class="vt-note">🔒 Private to you (admin only). Files and secrets are <b>encrypted at rest</b> (AES-256-GCM) and only ever sent over HTTPS. ${VAULT.encKey ? '' : 'Set a <code>DRIVE_KEY</code> env var for a dedicated encryption key.'}</div>
    <div class="vt-bar">
      <div class="vt-crumbs">${crumbs}</div>
      <div class="vt-tools">
        <button class="vt-tbtn" onclick="vaultNewFolder()">＋ Folder</button>
        <button class="vt-tbtn" onclick="document.getElementById('vtFiles').click()">⤒ Upload files</button>
        <button class="vt-tbtn" onclick="document.getElementById('vtFolder').click()">⤒ Upload folder</button>
        <button class="vt-tbtn" onclick="vaultAddSecret()">🔑 Add secret</button>
      </div>
    </div>
    <div id="vtProgress" class="vt-progress" style="display:none"></div>
    <div class="vt-list">${folders.map(row).join('')}${files.map(row).join('')}${secrets.map(row).join('')}${empty}</div>
    <input type="file" id="vtFiles" multiple style="display:none" onchange="vaultUploadFiles(this.files)"/>
    <input type="file" id="vtFolder" webkitdirectory style="display:none" onchange="vaultUploadFiles(this.files)"/>`;
}
function vaultNewFolder(){ const name = prompt('New folder name:'); if (!name) return; api('POST','/api/admin/drive/folder',{ name, parentId: VAULT.parent }).then(()=>loadVault(VAULT.parent)).catch(e=>notify(e.message)); }
function vaultAddSecret(){
  const name = prompt('Secret name (e.g. "Stripe API key"):'); if (!name) return;
  const value = prompt('Value (password / API key). It will be encrypted:'); if (!value) return;
  const note = prompt('Optional note (not secret):') || '';
  api('POST','/api/admin/drive/secret',{ name, value, note, parentId: VAULT.parent }).then(()=>{ notify('Secret saved (encrypted).'); loadVault(VAULT.parent); }).catch(e=>notify(e.message));
}
function readAsDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
async function vaultUploadFiles(files){
  files = [...files]; if (!files.length) return;
  const prog = document.getElementById('vtProgress'); if (prog) prog.style.display = 'block';
  let done = 0, failed = 0;
  for (const f of files) {
    if (prog) prog.textContent = `Uploading ${done + 1} of ${files.length}: ${f.name}…`;
    try {
      if (f.size > 18 * 1024 * 1024) { failed++; done++; continue; }
      const dataUrl = await readAsDataURL(f);
      await api('POST','/api/admin/drive/upload',{ name: f.name, parentId: VAULT.parent, mime: f.type, data: dataUrl, path: f.webkitRelativePath || '' });
    } catch (e) { failed++; }
    done++;
  }
  if (prog) prog.style.display = 'none';
  notify(failed ? (`Uploaded ${files.length - failed}, ${failed} failed (over 18 MB?).`) : `Uploaded ${files.length} file${files.length>1?'s':''}.`);
  loadVault(VAULT.parent);
}

function relTime(ms){
  if (ms == null) return 'never';
  const s = Math.round(ms/1000);
  if (s < 60) return s+'s ago';
  const m = Math.round(s/60); if (m < 60) return m+'m ago';
  const h = Math.round(m/60); if (h < 48) return h+'h ago';
  return Math.round(h/24)+'d ago';
}
function jobEvery(ms){
  if (ms < 60000) return Math.round(ms/1000)+' s';
  const m = Math.round(ms/60000);
  if (m < 60) return m+' min';
  const h = m/60; return (h % 1 === 0 ? h : h.toFixed(1))+' h';
}

function dollarsToCents(v){ const n = Math.round(Number(v) * 100); return (Number.isInteger(n) && n > 0) ? n : null; }
async function addLock(){
  const inp = document.getElementById('lockInput'), noteEl = document.getElementById('lockNote'), priceEl = document.getElementById('lockPrice');
  const username = (inp.value || '').trim().replace(/^@/, '');
  if (!username) { inp.focus(); return; }
  try {
    await api('POST', '/api/admin/username-locks', { username, note: noteEl.value, priceCents: dollarsToCents(priceEl.value) });
    inp.value = ''; noteEl.value = ''; priceEl.value = ''; inp.focus();
    notify('Locked @' + username.toLowerCase() + '.');
    loadLocks(true);
  } catch (e) { notify(e.message); }
}
async function setLockPrice(username, currentCents){
  const cur = currentCents != null ? (currentCents/100).toFixed(2) : '';
  const v = prompt('Sale price for @' + username + ' in dollars (blank = take off sale):', cur);
  if (v === null) return;
  const priceCents = v.trim() === '' ? null : dollarsToCents(v);
  if (v.trim() !== '' && priceCents == null) { notify('Enter a valid dollar amount.'); return; }
  try {
    await api('PATCH', '/api/admin/username-locks/' + encodeURIComponent(username), { priceCents });
    notify(priceCents ? ('@' + username + ' on sale for $' + (priceCents/100).toFixed(2) + '.') : ('@' + username + ' taken off sale.'));
    loadLocks(true);
  } catch (e) { notify(e.message); }
}
async function bulkLock(){

  const raw = (ta.value || '').trim();
  if (!raw) { ta.focus(); return; }
  try {
    const r = await api('POST', '/api/admin/username-locks/bulk', { usernames: raw, note: 'Bulk-locked' });
    ta.value = '';
    notify(`Locked ${r.added.toLocaleString()} new name${r.added === 1 ? '' : 's'} (of ${r.requested.toLocaleString()}).`);
    loadLocks(true);
  } catch (e) { notify(e.message); }
}
async function seedLocks(){
  const tiers = {
    curated: document.getElementById('tier-curated').checked,
    len1: document.getElementById('tier-len1').checked,
    len2: document.getElementById('tier-len2').checked,
    len3: document.getElementById('tier-len3').checked,
    len4: document.getElementById('tier-len4').checked,
  };
  if (!Object.values(tiers).some(Boolean)) { notify('Pick at least one tier.'); return; }
  const big = tiers.len3 || tiers.len4;
  const est = (tiers.curated ? 446 : 0) + (tiers.len1 ? 36 : 0) + (tiers.len2 ? 1296 : 0) + (tiers.len3 ? 46656 : 0) + (tiers.len4 ? 1679616 : 0);
  const warn = `Reserve ~${est.toLocaleString()} names?` + (big ? '\n\nThis includes short 3/4-character handles and will block ordinary short usernames too. You can unlock any of them later.' : '');
  if (!confirm(warn)) return;
  notify('Reserving names… the big tiers can take a moment.');
  try {
    const priceCents = dollarsToCents((document.getElementById('seedPrice')||{}).value);
    const r = await api('POST', '/api/admin/username-locks/seed', { ...tiers, priceCents });
    notify(`Reserved ${r.added.toLocaleString()} new name${r.added === 1 ? '' : 's'} (of ${r.requested.toLocaleString()}).`);
    loadLocks(true);
  } catch (e) { notify(e.message); }
}
async function assignLock(username){
  const to = prompt('Assign @' + username + ' to which account? Enter their current @username:');
  if (to === null) return;
  const toUsername = to.trim().replace(/^@/, '');
  if (!toUsername) return;
  if (!confirm(`Give @${username} to @${toUsername}? Their handle changes to @${username} and the reservation is removed.`)) return;
  try {
    const r = await api('POST', '/api/admin/username-locks/' + encodeURIComponent(username) + '/assign', { toUsername });

    loadLocks(true);
  } catch (e) { notify(e.message); }
}
async function removeLock(username){

}

function tfNum(n){ return (n||0).toLocaleString(); }
function tfChange(cur, prev){
  if (!prev) return cur > 0 ? { txt: '▲ new', cls: 'up' } : { txt: '—', cls: 'flat' };
  const d = Math.round((cur - prev) / prev * 100);
  if (d > 0) return { txt: '▲ ' + d + '%', cls: 'up' };
  if (d < 0) return { txt: '▼ ' + Math.abs(d) + '%', cls: 'down' };
  return { txt: 'no change', cls: 'flat' };
}
function tfBucketLabel(iso, bucket){
  const d = new Date(iso);
  if (bucket === 'hour') return String(d.getHours()).padStart(2,'0');
  if (bucket === 'day') return d.toLocaleDateString(undefined, { weekday: 'short' });
  if (bucket === 'month') return d.toLocaleDateString(undefined, { month: 'short' });
  return '';
}
function renderTraffic(){
  const t = TRAFFIC; if (!t) return;
  const live = document.getElementById('tfLive');

  const vc = tfChange(t.totals.views, t.previous.views), uc = tfChange(t.totals.visitors, t.previous.visitors);
  const rangeLabel = { today: 'today', week: 'the last 7 days', year: 'the last year' }[t.range];
  const max = Math.max(1, ...t.trend.map(b => b.views));
  const bars = t.trend.map(b => {
    const h = Math.max(2, Math.round(b.views / max * 100));
    return `<div class="tf-bar" title="${tfNum(b.views)} views · ${tfNum(b.visitors)} visitors"><div class="tf-barfill" style="height:${h}%"></div><span class="tf-barlbl">${tfBucketLabel(b.bucket, t.bucket)}</span></div>`;
  }).join('');
  const maxC = Math.max(1, ...t.countries.map(c => c.views));
  const countryRows = t.countries.length ? t.countries.map(c => `
    <div class="tf-loc"><span class="tf-loc-n">${esc(c.country)}</span>

      <span class="tf-loc-v">${tfNum(c.views)}</span></div>`).join('') : '<div class="empty">No location data yet.</div>';
  const cityRows = t.cities.length ? t.cities.map(c => `

      <div class="tf-card"><div class="tf-cl">All-time views</div><div class="tf-cv">${tfNum(t.allTime.views)}</div><div class="tf-cd muted">${tfNum(t.allTime.visitors)} visitors total</div></div>
    </div>
    <div class="panel"><h3>Views · ${rangeLabel}</h3><div class="tf-chart">${bars}</div></div>
    <div class="tf-locs">
      <div class="panel"><h3>Top countries</h3>${countryRows}${geoNote}</div>

    </div>`;

async function modStartScan(scope, opts){
  const btn = document.getElementById('modScanBtn'); if (btn) btn.disabled = true;

  if (prog) prog.innerHTML = '<div class="mod-prog"><span class="mod-spin"></span> Starting scan…</div>';

async function modPoll(){

    const prog = document.getElementById('modProgress');
    const aiTag = scan.ai ? '' : ' · heuristic only (set ANTHROPIC_API_KEY for full AI)';
    if (scan.status === 'running') {

}
function modFlagCard(f){
  const sev = f.severity||'medium';
  const owner = f.owner ? `@${esc(f.owner.username||('#'+f.owner.id))}` : 'unknown';
  const ownerStatus = f.owner && f.owner.status && f.owner.status!=='active' ? `<span class="mod-ustatus ${f.owner.status}">${f.owner.status}</span>` : '';
  const grp = f.group ? ` · in <b>${esc(f.group.name||('group #'+f.group.id))}</b>` : '';
  const actions = f.status==='open' ? `<div class="mod-acts">
      <button class="mod-act" onclick="modAction(${f.id},'warn')">Warn</button>
      <button class="mod-act warn" onclick="modAction(${f.id},'suspend')">Suspend</button>
      <button class="mod-act danger" onclick="modAction(${f.id},'ban')">Ban</button>
      <button class="mod-act" onclick="modAction(${f.id},'delete')">Delete content</button>
      <button class="mod-act ghost" onclick="modAction(${f.id},'dismiss')">Dismiss</button>
    </div>` : `<div class="mod-resolved">${f.status==='actioned'?'✓ Actioned':'Dismissed'}</div>`;
  return `<div class="mod-flag sev-${sev}">
    <div class="mod-flag-top">
      <span class="mod-sev ${sev}">${sev}</span>
      <span class="mod-cat">${esc(MOD_CAT_LABEL[f.category]||f.category||'other')}</span>
      <span class="mod-kind">${esc(f.kind.replace('_',' '))}</span>
      <span class="mod-owner"${f.owner?` onclick="openUser(${f.owner.id})" style="cursor:pointer;"`:''}>${owner}${ownerStatus}</span>${grp}
    </div>
    <div class="mod-reason">${esc(f.reason||'')}</div>
    <div class="mod-excerpt">${esc(f.excerpt||'')}</div>
    ${actions}</div>`;
}
async function modAction(id, action){
  let body = { action };
  if (action === 'ban') { if (!confirm('Permanently ban this account? They will be logged out and blocked from signing in.')) return; }
  else if (action === 'suspend') { const days = prompt('Suspend for how many days?', '7'); if (days===null) return; body.days = parseInt(days,10)||7; }
  else if (action === 'delete') { if (!confirm('Delete this content? This cannot be undone.')) return; }
  else if (action === 'warn') { const msg = prompt('Warning message to send the user:', 'Your content was flagged for violating our community guidelines. Please review and keep Atwe professional.'); if (msg===null) return; body.message = msg; }
  try {
    await api('POST', '/api/admin/moderation/flags/' + id + '/resolve', body);
    modLoadFlags();
  } catch (e) { alert(e.message || 'Could not apply the action.'); }
}

function staffPreset(name){
  const who = (document.getElementById('staffWho')||{}).value || '';
  STAFF_NEW.perms = new Set(STAFF_PRESETS[name] || []); STAFF_NEW.role = name;
  loadStaff();

}
function staffTogglePerm(s, on){ if (on) STAFF_NEW.perms.add(s); else STAFF_NEW.perms.delete(s); }
async function grantStaff(){
  const who = (document.getElementById('staffWho')||{}).value || '';
  const perms = [...STAFF_NEW.perms];
  if (!who.trim()) { notify('Enter a @username or email.'); return; }
  if (!perms.length) { notify('Pick at least one permission.'); return; }
  const ident = who.trim().replace(/^@/,'');
  try {
    await api('POST', '/api/admin/staff', { username: ident, email: ident, role: STAFF_NEW.role || null, perms });
    STAFF_NEW = { perms: new Set(), role: '' };
    notify('Access granted.'); loadStaff();
