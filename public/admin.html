<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<title>Atwe — Admin</title>
<link rel="icon" type="image/png" sizes="any" href="/favicon.png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#000000; --bg-1:#080808; --bg-2:#0d0d0d;
    --s1:#141414; --s2:#1a1a1a; --s3:#222222; --s4:#2c2c2c;
    --b1:rgba(255,255,255,.05); --b2:rgba(255,255,255,.08); --b3:rgba(255,255,255,.14);
    --t1:#ffffff; --t2:#a3a3a3; --t3:#6b6b6b; --t4:#474747;
    --accent:#0ea5e9; --accent-dim:rgba(14,165,233,.12); --accent-mid:rgba(14,165,233,.22);
    --green:#22c55e; --red:#ef4444;
    --r-sm:9px; --r-md:13px; --r-lg:18px; --r-pill:9999px;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  html,body{height:100%;}
  body{
    background:var(--bg); color:var(--t1);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased;
    padding:max(20px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(28px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));
  }
  button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;}
  input{font-family:inherit;}
  .wrap{max-width:1000px;margin:0 auto;}

  /* ── Header ── */
  header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img.mark{width:24px;height:24px;object-fit:contain;display:block;}
  .brand img.word{height:17px;width:auto;display:block;}
  .brand .tag{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);
    background:var(--accent-dim);border:1px solid var(--accent-mid);padding:3px 9px;border-radius:var(--r-pill);}
  .back{color:var(--t2);text-decoration:none;font-size:13px;font-weight:500;padding:8px 15px;border:1px solid var(--b2);
    border-radius:var(--r-pill);transition:all .15s var(--ease);white-space:nowrap;}
  .back:hover{color:var(--t1);border-color:var(--b3);background:var(--s1);}

  /* ── Stat cards ── */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
  .stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:16px 18px;}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-.03em;}
  .stat .l{color:var(--t3);font-size:12px;font-weight:500;margin-top:2px;}

  /* ── Toolbar ── */
  .toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
  .toolbar input{flex:1;min-width:0;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-pill);
    color:var(--t1);padding:11px 16px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .toolbar input:focus{border-color:var(--b3);}
  .toolbar input::placeholder{color:var(--t4);}
  .refresh{background:var(--s1);color:var(--t2);border:1px solid var(--b2);border-radius:var(--r-pill);
    padding:11px 16px;font-size:13px;font-weight:600;transition:all .15s var(--ease);white-space:nowrap;}
  .refresh:hover{color:var(--t1);border-color:var(--b3);}

  /* ── User list (cards) ── */
  .users{display:flex;flex-direction:column;gap:8px;}
  .u-card{display:flex;align-items:center;gap:13px;background:var(--s1);border:1px solid var(--b1);
    border-radius:var(--r-md);padding:13px 15px;cursor:pointer;transition:border-color .15s var(--ease),background .15s var(--ease);}
  .u-card:hover{border-color:var(--b3);background:var(--s2);}
  .avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,#0ea5e9,#06b6d4);}
  .avatar.has-img{background-size:cover;background-position:center;color:transparent;}
  /* AtChat activity */
  .ac-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 14px;}
  .ac-stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-md);padding:11px 8px;text-align:center;}
  .ac-stat-card .n{font-size:19px;font-weight:800;letter-spacing:-.02em;}
  .ac-stat-card .l{font-size:10.5px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
  .ac-apost{border:1px solid var(--b1);border-radius:var(--r-md);background:var(--s1);padding:11px 13px;margin-bottom:7px;}
  .ac-apost .b{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;color:var(--t1);}
  .ac-apost img{display:block;margin-top:7px;max-width:180px;max-height:180px;border-radius:10px;}
  .ac-apost .m{font-size:11.5px;color:var(--t3);margin-top:6px;}
  .u-main{flex:1;min-width:0;}
  .u-name{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-email{font-size:12.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .u-pills{display:flex;gap:6px;align-items:center;flex-shrink:0;}
  .u-meta{display:flex;gap:20px;flex-shrink:0;text-align:right;}
  .u-meta .mv{font-size:13px;font-weight:600;}
  .u-meta .mk{font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;}
  .chev{color:var(--t4);flex-shrink:0;}
  .chev svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;}

  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:capitalize;}
  .pill.pro{background:var(--accent-dim);color:var(--accent);}
  .pill.free{background:var(--s3);color:var(--t3);}
  .pill.admin{background:rgba(34,197,94,.14);color:var(--green);}

  .empty{text-align:center;padding:54px 20px;color:var(--t3);font-size:14px;}

  /* ── Modal ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:none;align-items:flex-start;justify-content:center;padding:max(28px,env(safe-area-inset-top)) 16px 28px;
    overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;z-index:50;animation:fade .2s var(--ease);}
  .overlay.show{display:flex;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{background:rgba(18,18,20,.97);border:1px solid var(--b2);border-radius:var(--r-lg);width:100%;max-width:640px;
    padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.7);animation:rise .28s var(--ease);}
  @keyframes rise{from{opacity:0;transform:translateY(20px) scale(.98);}to{opacity:1;transform:none;}}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px;}
  .modal-head h2{font-size:19px;font-weight:700;letter-spacing:-.02em;}
  .modal-head .u-email{font-size:13px;}
  .close-x{background:var(--s2);border:none;color:var(--t2);border-radius:50%;width:32px;height:32px;
    display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .15s var(--ease);}
  .close-x:hover{background:var(--s3);color:var(--t1);}
  .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;padding:16px;background:var(--s1);border-radius:var(--r-md);}
  .meta-grid .m .k{color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
  .meta-grid .m .v{font-size:13.5px;font-weight:500;}
  .acts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .act{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-mid);border-radius:var(--r-pill);
    padding:10px 16px;font-size:13px;font-weight:600;transition:all .15s var(--ease);}
  .act:hover{background:var(--accent-mid);}
  .act.danger{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.3);}
  .act.danger:hover{background:rgba(239,68,68,.2);}
  .section-h{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin:8px 0 12px;}
  .chat-item{border:1px solid var(--b1);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;background:var(--s1);}
  .chat-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center;transition:background .15s var(--ease);}
  .chat-head:hover{background:var(--s2);}
  .chat-head .ct{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-body{display:none;padding:6px 14px 14px;border-top:1px solid var(--b1);}
  .chat-body.open{display:block;}
  .bubble{margin:10px 0;}
  .bubble .role{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);margin-bottom:3px;font-weight:700;}
  .bubble .text{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
  .bubble.user .text{color:var(--t1);}
  .bubble.assistant .text{color:var(--t2);}
  .muted{color:var(--t3);font-size:12.5px;}

  /* ── Messages screen (Apple Messages-style, its own overlay) ── */
  .chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:none;align-items:center;justify-content:center;padding:max(20px,env(safe-area-inset-top)) 14px max(20px,env(safe-area-inset-bottom));
    z-index:60;animation:fade .2s var(--ease);}
  .chat-overlay.show{display:flex;}
  .chat-win{display:flex;flex-direction:column;width:100%;max-width:480px;height:100%;max-height:760px;
    background:var(--bg-1);border:1px solid var(--b2);border-radius:var(--r-lg);overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,.7);animation:rise .28s var(--ease);}
  .chat-top{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--b1);
    background:rgba(20,20,22,.6);flex-shrink:0;}
  .chat-back{background:none;border:none;color:var(--accent);display:flex;align-items:center;gap:3px;
    font-size:15px;font-weight:500;padding:4px;margin:-4px;flex-shrink:0;}
  .chat-back svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;}
  .chat-who{display:flex;align-items:center;gap:10px;min-width:0;}
  .chat-who .avatar{width:34px;height:34px;font-size:13px;}
  .chat-who .ct-name{font-size:14.5px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-who .ct-email{font-size:11.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chat-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
    display:flex;flex-direction:column;gap:3px;padding:18px 16px;}
  .chat-day{align-self:center;font-size:11px;color:var(--t3);margin:6px 0 10px;font-weight:600;}
  .dm-row{display:flex;margin-top:3px;}
  .dm-row.admin{justify-content:flex-end;}
  .dm-row.user{justify-content:flex-start;}
  .dm-row.gap{margin-top:11px;}
  .dm-msg{max-width:74%;padding:8px 14px;border-radius:19px;font-size:14.5px;line-height:1.4;
    white-space:pre-wrap;word-break:break-word;}
  .dm-row.admin .dm-msg{background:var(--accent);color:#fff;}
  .dm-row.user .dm-msg{background:var(--s3);color:var(--t1);}
  .dm-row.admin.tail .dm-msg{border-bottom-right-radius:6px;}
  .dm-row.user.tail .dm-msg{border-bottom-left-radius:6px;}
  .dm-msg.photo{padding:3px;background:transparent;}
  .dm-img{display:block;max-width:230px;width:100%;border-radius:14px;cursor:pointer;}
  .dm-msg.has-cap .dm-img{margin-bottom:6px;}
  /* Pending-photo preview above the composer */
  .chat-imgprev{display:none;align-items:center;gap:8px;padding:8px 14px 0;flex-shrink:0;}
  .chat-imgprev.show{display:flex;}
  .chat-imgprev img{height:54px;width:54px;object-fit:cover;border-radius:10px;border:1px solid var(--b2);}
  .chat-imgx{width:22px;height:22px;border-radius:50%;background:var(--s3);color:var(--t1);border:none;
    font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .chat-attach{width:38px;height:38px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);color:var(--t2);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s var(--ease);}
  .chat-attach svg{width:20px;height:20px;stroke:currentColor;stroke-width:2.2;fill:none;}
  .chat-attach:hover{color:var(--t1);border-color:var(--b3);}
  .hidden-input{display:none;}
  .dm-time{align-self:center;font-size:10.5px;color:var(--t4);margin:8px 0 2px;}
  .chat-empty{margin:auto;text-align:center;color:var(--t3);font-size:14px;padding:30px;}
  .chat-compose{display:flex;gap:9px;align-items:flex-end;padding:12px 14px;border-top:1px solid var(--b1);
    background:rgba(20,20,22,.6);flex-shrink:0;}
  .chat-compose textarea{flex:1;min-width:0;background:var(--s2);border:1px solid var(--b2);border-radius:20px;
    color:var(--t1);padding:10px 16px;font-size:14.5px;font-family:inherit;line-height:1.4;outline:none;resize:none;
    min-height:42px;max-height:130px;transition:border-color .15s var(--ease);}
  .chat-compose textarea:focus{border-color:var(--accent);}
  .chat-compose textarea::placeholder{color:var(--t4);}
  .chat-send{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;transition:all .15s var(--ease);}
  .chat-send svg{width:20px;height:20px;stroke:#fff;stroke-width:2.4;fill:none;}
  .chat-send:hover{background:#0284c7;}
  .chat-send:disabled{opacity:.4;}

  /* Unread-reply badge on a user card */
  .u-badge{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;
    border-radius:var(--r-pill);background:var(--red);color:#fff;font-size:11px;font-weight:700;flex-shrink:0;}

  /* ── Login ── */
  .login{max-width:380px;margin:6vh auto 0;background:rgba(18,18,20,.9);border:1px solid var(--b2);
    border-radius:var(--r-lg);padding:34px 28px;text-align:center;}
  .login img{width:46px;height:46px;object-fit:contain;margin:0 auto 18px;display:block;}
  .login h2{font-size:21px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;}
  .login p{color:var(--t3);font-size:14px;margin-bottom:24px;}
  .login label{display:block;text-align:left;font-size:12px;font-weight:600;color:var(--t2);margin:12px 0 6px;}
  .login input{width:100%;background:var(--bg-2);border:1px solid var(--b2);border-radius:var(--r-sm);color:var(--t1);
    padding:12px 14px;font-size:14px;outline:none;transition:border-color .15s var(--ease);}
  .login input:focus{border-color:var(--accent);}
  .login button{width:100%;margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-pill);
    padding:13px;font-size:14.5px;font-weight:700;transition:all .15s var(--ease);}
  .login button:hover{background:#0284c7;}
  .login button:disabled{opacity:.6;}
  .login .err{color:var(--red);font-size:13px;margin-top:14px;min-height:16px;}

  /* ── Toast ── */
  .notif{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(38,38,42,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--b3);color:var(--t1);padding:12px 20px;border-radius:var(--r-pill);font-size:13.5px;font-weight:500;
    opacity:0;transition:all .25s var(--ease);pointer-events:none;z-index:80;}
  .notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ── Responsive ── */
  @media (max-width:760px){
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .u-meta{display:none;}
    .modal{padding:20px;}
    .meta-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:380px){
    .u-pills .pill.free{display:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img class="mark" src="/logo-mark.png" alt="Atwe"/>
      <img class="word" src="/logo-word.png" alt="Atwe"/>
      <span class="tag">Admin</span>
    </div>
    <a class="back" id="backLink" href="/">← Back to app</a>
  </header>

  <div class="stat-row" id="stats"></div>
  <div id="content"><div class="empty">Loading…</div></div>
</div>
<div class="notif" id="notif"></div>
<div class="overlay" id="modal"><div class="modal" id="modalCard"></div></div>

<div class="chat-overlay" id="chatOverlay">
  <div class="chat-win">
    <div class="chat-top">
      <button class="chat-back" onclick="closeChat()" aria-label="Back">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="chat-who">
        <div class="avatar" id="chatAvatar">?</div>
        <div style="min-width:0;">
          <div class="ct-name" id="chatName">—</div>
          <div class="ct-email" id="chatEmail"></div>
        </div>
      </div>
    </div>
    <div class="chat-scroll" id="chatScroll"></div>
    <div class="chat-imgprev" id="chatImgPrev">
      <img id="chatImgThumb" alt=""/>
      <button class="chat-imgx" onclick="clearChatImage()" aria-label="Remove photo">&times;</button>
    </div>
    <div class="chat-compose">
      <button class="chat-attach" onclick="document.getElementById('chatFile').click()" aria-label="Add photo">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <input type="file" id="chatFile" accept="image/*" class="hidden-input" onchange="onChatFile(event)"/>
      <textarea id="chatInput" rows="1" placeholder="Message"></textarea>
      <button class="chat-send" id="chatSend" onclick="sendChat()" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('atwe_token');

// "Back to app" should leave the admin subdomain for the main app.
(function setBackLink(){
  const link = document.getElementById('backLink');
  if (location.hostname.startsWith('admin.')) {
    link.href = location.protocol + '//' + location.hostname.replace(/^admin\./, '') + '/';
  }
})();

function notify(msg){
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove('show'), 2600);
}

async function api(method, path, body){
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error(data.error || ('Request failed (' + res.status + ')'));
    err.status = res.status;
    throw err;
  }
  return data;
}

function esc(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function initial(name){ return (String(name || '?').trim()[0] || '?').toUpperCase(); }
function avatarHtml(u, cls){
  cls = cls || 'avatar';
  if (u && u.avatar) return `<div class="${cls} has-img" style="background-image:url('${u.avatar}')"></div>`;
  return `<div class="${cls}">${esc(initial(u && u.name))}</div>`;
}

function fmtDate(d){
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); }
  catch (e) { return '—'; }
}
function fmtDateTime(d){
  if (!d) return '—';
  try { return new Date(d).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
  catch (e) { return '—'; }
}
function ago(d){
  if (!d) return 'never';
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 2592000) return Math.floor(s/86400) + 'd ago';
  return fmtDate(d);
}
// Messages store content as a string or an array of blocks (text + image).
function msgText(content){
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) return content.map(b => b.type === 'image' ? '🖼️ [image]' : (b.text || '')).join(' ').trim();
  return '';
}

function gate(html){
  document.getElementById('content').innerHTML = '<div class="empty">' + html + '</div>';
  document.getElementById('stats').innerHTML = '';
}

// The admin subdomain is its own origin, so it has its own sign-in.
function showLogin(msg){
  document.getElementById('stats').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div class="login">
      <img src="/logo-mark.png" alt="Atwe"/>
      <h2>Admin sign in</h2>
      <p>Sign in with an account that has admin access.</p>
      <label for="le">Email</label>
      <input id="le" type="email" autocomplete="email" placeholder="you@company.com"/>
      <label for="lp">Password</label>
      <input id="lp" type="password" autocomplete="current-password" placeholder="••••••••"/>
      <div class="err" id="lerr">${msg ? esc(msg) : ''}</div>
      <button id="lbtn">Sign in</button>
    </div>`;
  const submit = () => doAdminLogin();
  document.getElementById('lbtn').onclick = submit;
  document.getElementById('lp').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  document.getElementById('le').focus();
}

async function doAdminLogin(){
  const email = document.getElementById('le').value.trim();
  const password = document.getElementById('lp').value;
  const err = document.getElementById('lerr');
  const btn = document.getElementById('lbtn');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Enter your email and password.'; return; }
  btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign in failed.');
    if (!data.user || !data.user.is_admin) throw new Error('This account does not have admin access.');
    token = data.token;
    localStorage.setItem('atwe_token', token);
    load();
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
  }
}

let USERS = [];
let FILTER = '';

async function load(){
  if (!token) { showLogin(); return; }
  try {
    const { users } = await api('GET', '/api/admin/users');
    USERS = users || [];
    render();
  } catch (e) {
    if (e.status === 403) { token = null; localStorage.removeItem('atwe_token'); showLogin('That account does not have admin access.'); }
    else if (e.status === 401) { token = null; localStorage.removeItem('atwe_token'); showLogin('Your session has expired — please sign in.'); }
    else gate(esc(e.message));
  }
}

function render(){
  const total = USERS.length;
  const pro = USERS.filter(u => u.plan === 'pro').length;
  const admins = USERS.filter(u => u.is_admin).length;
  const chats = USERS.reduce((s, u) => s + (u.chat_count || 0), 0);
  document.getElementById('stats').innerHTML = [
    ['Users', total], ['Pro', pro], ['Admins', admins], ['Chats', chats],
  ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <input id="search" placeholder="Search by name or email…" value="${esc(FILTER)}"/>
      <button class="refresh" onclick="load()">↻ Refresh</button>
    </div>
    <div class="users" id="userList"></div>`;

  // Re-render only the list on keystroke so the input keeps focus (important on iOS).
  document.getElementById('search').oninput = (e) => { FILTER = e.target.value; renderList(); };
  renderList();
}

function renderList() {
  const q = FILTER.trim().toLowerCase();
  const list = q
    ? USERS.filter(u => (u.name || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q))
    : USERS;

  const cards = list.map(u => `
    <div class="u-card" onclick="openUser(${u.id})">
      ${avatarHtml(u)}
      <div class="u-main">
        <div class="u-name">${esc(u.name)}${u.username ? ` <span style="color:var(--t3);font-weight:500;font-size:12.5px;">@${esc(u.username)}</span>` : ''}</div>
        <div class="u-email">${esc(u.email)}</div>
      </div>
      <div class="u-pills">
        ${u.unread_msgs ? `<span class="u-badge" title="${u.unread_msgs} unread repl${u.unread_msgs === 1 ? 'y' : 'ies'}">${u.unread_msgs}</span>` : ''}
        <span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${esc(u.plan)}</span>
        ${u.is_admin ? '<span class="pill admin">admin</span>' : ''}
      </div>
      <div class="u-meta">
        <div><div class="mv">${u.chat_count || 0}</div><div class="mk">Chats</div></div>
        <div><div class="mv">${u.last_login_at ? ago(u.last_login_at) : 'never'}</div><div class="mk">Last seen</div></div>
      </div>
      <div class="chev"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`).join('');

  const el = document.getElementById('userList');
  if (el) el.innerHTML = cards || `<div class="empty">${q ? 'No matches.' : 'No users yet.'}</div>`;
}

/* ─── User detail modal (info + their chats) ─── */
function closeModal(){ document.getElementById('modal').classList.remove('show'); document.body.style.overflow = ''; }
const modalOpen = () => document.getElementById('modal').classList.contains('show');

document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.getElementById('chatOverlay').addEventListener('click', e => { if (e.target.id === 'chatOverlay') closeChat(); });
// Esc closes the message screen first (it sits on top), then the user modal.
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (chatOpen()) closeChat();
  else if (modalOpen()) closeModal();
});

async function openUser(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const card = document.getElementById('modalCard');
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  card.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>${esc(u.name)}</h2>
        <div class="u-email">${esc(u.email)}</div>
      </div>
      <button class="close-x" onclick="closeModal()">&times;</button>
    </div>
    <div class="meta-grid">
      <div class="m"><span class="k">Plan</span><span class="v"><span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${esc(u.plan)}</span></span></div>
      <div class="m"><span class="k">Role</span><span class="v">${u.is_admin ? '<span class="pill admin">admin</span>' : 'User'}</span></div>
      <div class="m"><span class="k">Email verified</span><span class="v">${u.email_verified ? 'Yes' : 'No'}</span></div>
      <div class="m"><span class="k">Chats</span><span class="v">${u.chat_count || 0}</span></div>
      <div class="m"><span class="k">Joined</span><span class="v">${fmtDate(u.created_at)}</span></div>
      <div class="m"><span class="k">Last login</span><span class="v">${u.last_login_at ? fmtDateTime(u.last_login_at) : 'never'}</span></div>
    </div>
    <div class="acts">
      <button class="act" onclick="togglePlan(${u.id})">${u.plan === 'pro' ? 'Downgrade to Free' : 'Upgrade to Pro'}</button>
      <button class="act" onclick="openChat(${u.id})">Message${u.unread_msgs ? ` <span class="u-badge" style="margin-left:4px;">${u.unread_msgs}</span>` : ''}</button>
      <button class="act" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Revoke admin' : 'Make admin'}</button>
      <button class="act danger" onclick="removeUser(${u.id})">Delete user</button>
    </div>
    <div class="section-h">AtChat${u.username ? ` · <span style="color:var(--accent);">@${esc(u.username)}</span>` : ''}</div>
    <div id="userAtchat"><div class="muted" style="padding:6px 0;">Loading activity…</div></div>
    <div class="section-h" style="margin-top:20px;">Conversations</div>
    <div id="userChats"><div class="muted" style="padding:6px 0;">Loading chats…</div></div>`;

  loadAtchatActivity(id);
  try {
    const { chats } = await api('GET', '/api/admin/users/' + id + '/chats');
    renderUserChats(chats || []);
  } catch (e) {
    const el = document.getElementById('userChats');
    if (el) el.innerHTML = '<div class="muted">Could not load chats: ' + esc(e.message) + '</div>';
  }
}

async function loadAtchatActivity(id){
  const el = document.getElementById('userAtchat');
  try {
    const d = await api('GET', '/api/admin/users/' + id + '/atchat');
    if (!d.user.username) { el.innerHTML = '<div class="muted" style="padding:6px 0;">This user has not set up AtChat yet.</div>'; return; }
    const s = d.stats;
    const cards = [
      ['Followers', s.followers], ['Following', s.following], ['Posts', s.posts], ['Groups', s.groups],
      ['DM people', s.dm_people], ['DMs sent', s.dm_sent], ['Group msgs', s.group_sent],
    ].map(([l, n]) => `<div class="ac-stat-card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
    const posts = d.posts.length
      ? d.posts.map(p => `<div class="ac-apost">${p.body ? `<div class="b">${esc(p.body)}</div>` : ''}${p.image ? `<img src="${p.image}" alt="" onclick="window.open(this.src,'_blank')"/>` : ''}<div class="m">${fmtDateTime(p.created_at)} · ♥ ${p.likes}</div></div>`).join('')
      : '<div class="muted" style="padding:4px 0;">No posts yet.</div>';
    el.innerHTML = `<div class="ac-stats">${cards}</div>
      <div class="section-h" style="padding-top:2px;">Public posts</div>${posts}
      <div class="muted" style="margin-top:6px;font-size:11.5px;">Private DMs and group messages are not shown.</div>`;
  } catch (e) {
    el.innerHTML = '<div class="muted">Could not load AtChat activity: ' + esc(e.message) + '</div>';
  }
}

/* ─── Messages screen (Apple Messages-style, its own overlay) ─── */
let DM = { id: null, messages: [] };

const chatOpen = () => document.getElementById('chatOverlay').classList.contains('show');

async function openChat(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  DM = { id, messages: [] };
  clearChatImage();
  document.getElementById('chatInput').value = '';
  document.getElementById('chatAvatar').textContent = initial(u.name);
  document.getElementById('chatName').textContent = u.name;
  document.getElementById('chatEmail').textContent = u.email;
  document.getElementById('chatScroll').innerHTML = '<div class="chat-empty">Loading…</div>';
  document.getElementById('chatOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('chatInput')?.focus(), 250);
  try {
    const { messages } = await api('GET', '/api/admin/users/' + id + '/messages');
    DM.messages = messages || [];
    renderChat();
    // Opening the thread clears the unread reply badge for this user.
    if (u.unread_msgs) { u.unread_msgs = 0; renderList(); }
  } catch (e) {
    document.getElementById('chatScroll').innerHTML = '<div class="chat-empty">Could not load messages: ' + esc(e.message) + '</div>';
  }
}

function closeChat(){
  document.getElementById('chatOverlay').classList.remove('show');
  // The user modal is still open underneath; restore its scroll lock state.
  document.body.style.overflow = modalOpen() ? 'hidden' : '';
}

function renderChat(){
  const el = document.getElementById('chatScroll');
  if (!el) return;
  if (!DM.messages.length) {
    el.innerHTML = '<div class="chat-empty">No messages yet.<br/>Say hello below.</div>';
    return;
  }
  const SIX_MIN = 6 * 60 * 1000;
  let html = '';
  let lastT = 0, lastDay = '';
  DM.messages.forEach((m, i) => {
    const t = new Date(m.created_at).getTime();
    const day = fmtDate(m.created_at);
    if (day !== lastDay) { html += `<div class="chat-day">${esc(day)}</div>`; lastDay = day; }
    // A bigger gap (or sender switch) starts a fresh group; the last bubble of a
    // group gets the rounded "tail" corner, iMessage-style.
    const prev = DM.messages[i - 1];
    const next = DM.messages[i + 1];
    const grouped = prev && prev.sender === m.sender && (t - lastT) < SIX_MIN;
    const endsGroup = !next || next.sender !== m.sender || (new Date(next.created_at).getTime() - t) >= SIX_MIN;
    const cls = (m.sender === 'admin' ? 'admin' : 'user') + (grouped ? '' : ' gap') + (endsGroup ? ' tail' : '');
    const img = m.image ? `<img class="dm-img" src="${m.image}" alt="" onclick="window.open(this.src,'_blank')"/>` : '';
    const txt = m.body ? esc(m.body) : '';
    const bcls = 'dm-msg' + (m.image && !m.body ? ' photo' : '') + (m.image && m.body ? ' has-cap' : '');
    html += `<div class="dm-row ${cls}"><div class="${bcls}">${img}${txt}</div></div>`;
    lastT = t;
  });
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

/* Pending photo attachment for the admin composer. */
let _chatImg = null;
function onChatFile(e){
  const file = e.target.files[0];
  e.target.value = '';
  if (!file || !file.type.startsWith('image/')) return;
  if (file.size > 18 * 1024 * 1024) { notify('That image is too large (max 18 MB).'); return; }
  downscaleImage(file, dataUrl => {
    _chatImg = dataUrl;
    document.getElementById('chatImgThumb').src = dataUrl;
    document.getElementById('chatImgPrev').classList.add('show');
  });
}
function clearChatImage(){
  _chatImg = null;
  document.getElementById('chatImgPrev').classList.remove('show');
  document.getElementById('chatImgThumb').src = '';
}
// Read + downscale an image file to a compact JPEG data URL.
function downscaleImage(file, cb){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const max = 1400;
      let w = img.width, h = img.height;
      if (w > max || h > max){ const r = Math.min(max / w, max / h); w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { cb(c.toDataURL('image/jpeg', 0.82)); }
      catch (e) { cb(ev.target.result); }
    };
    img.onerror = () => cb(ev.target.result);
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function sendChat(){
  const inp = document.getElementById('chatInput');
  const btn = document.getElementById('chatSend');
  if (!inp || !DM.id) return;
  const body = inp.value.trim();
  if (!body && !_chatImg) { inp.focus(); return; }
  btn.disabled = true;
  try {
    const { message } = await api('POST', '/api/admin/users/' + DM.id + '/messages', { body, image: _chatImg });
    DM.messages.push(message);
    inp.value = ''; autosizeChat(); clearChatImage();
    renderChat();
  } catch (e) {
    notify(e.message);
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

// Auto-grow the composer; Enter sends, Shift+Enter makes a new line.
function autosizeChat(){
  const inp = document.getElementById('chatInput');
  if (!inp) return;
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
}
document.addEventListener('input', e => { if (e.target && e.target.id === 'chatInput') autosizeChat(); });
document.addEventListener('keydown', e => {
  if (!(e.target && e.target.id === 'chatInput')) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

function renderUserChats(chats){
  const el = document.getElementById('userChats');
  if (!el) return;
  if (!chats.length) { el.innerHTML = '<div class="muted" style="padding:6px 0;">No conversations yet.</div>'; return; }
  el.innerHTML = chats.map(c => `
    <div class="chat-item">
      <div class="chat-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="ct">${esc(c.title || 'Untitled chat')}</span>
        <span class="muted">${(c.messages || []).length} msgs · ${ago(c.updated_at)}</span>
      </div>
      <div class="chat-body">
        ${(c.messages || []).map(m => `
          <div class="bubble ${m.role === 'assistant' ? 'assistant' : 'user'}">
            <div class="role">${m.role === 'assistant' ? 'Atwe' : 'User'}</div>
            <div class="text">${esc(msgText(m.content)) || '[empty]'}</div>
          </div>`).join('') || '<div class="muted">No messages.</div>'}
      </div>
    </div>`).join('');
}

async function togglePlan(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  const plan = u.plan === 'pro' ? 'free' : 'pro';
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { plan }); merge(user); notify('Plan updated to ' + plan + '.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function toggleAdmin(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { is_admin: !u.is_admin }); merge(user); notify('Access updated.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}
async function removeUser(id){
  const u = USERS.find(x => x.id === id); if (!u) return;
  if (!confirm('Delete ' + u.email + '? This permanently removes their account, chats and projects.')) return;
  try { await api('DELETE', '/api/admin/users/' + id); USERS = USERS.filter(x => x.id !== id); closeModal(); render(); notify('User deleted.'); }
  catch (e) { notify(e.message); }
}

function merge(user){
  const i = USERS.findIndex(x => x.id === user.id);
  if (i >= 0) USERS[i] = { ...USERS[i], ...user };
  render();
}

load();
</script>
