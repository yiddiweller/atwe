<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atwe — Admin</title>
<style>
  :root {
    --bg: #0a0a0b; --panel: #141416; --panel2: #1c1c1f;
    --border: #2a2a2e; --t1: #f5f5f7; --t2: #a0a0a8; --t3: #6a6a72;
    --accent: #6d8bff; --danger: #ff5d5d; --green: #46d18a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--t1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding: 32px 20px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; flex-wrap: wrap; gap: 12px; }
  .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .brand span { color: var(--accent); }
  .sub { color: var(--t3); font-size: 13px; margin-top: 2px; }
  .back { color: var(--t2); text-decoration: none; font-size: 13px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 9px; }
  .back:hover { color: var(--t1); border-color: var(--t3); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .stat-row { display: flex; gap: 14px; margin-bottom: 22px; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; flex: 1; min-width: 120px; }
  .stat .n { font-size: 24px; font-weight: 700; }
  .stat .l { color: var(--t3); font-size: 12px; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  th { color: var(--t3); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:last-child td { border-bottom: none; }
  .email { color: var(--t2); font-size: 12.5px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.pro { background: rgba(109,139,255,0.16); color: var(--accent); }
  .pill.free { background: var(--panel2); color: var(--t3); }
  .pill.admin { background: rgba(70,209,138,0.16); color: var(--green); }
  .acts { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  button.act { background: var(--panel2); color: var(--t1); border: 1px solid var(--border); border-radius: 8px; padding: 6px 11px; font-size: 12px; cursor: pointer; }
  button.act:hover { border-color: var(--t3); }
  button.act.danger:hover { border-color: var(--danger); color: var(--danger); }
  .msg { text-align: center; padding: 60px 20px; color: var(--t2); }
  .msg a { color: var(--accent); }
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .toolbar input { flex: 1; min-width: 180px; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; color: var(--t1); padding: 10px 13px; font-size: 13.5px; }
  .toolbar input:focus { outline: none; border-color: var(--accent); }
  .toolbar .refresh { background: var(--panel2); color: var(--t1); border: 1px solid var(--border); border-radius: 9px; padding: 10px 14px; font-size: 13px; cursor: pointer; }
  tr.urow { cursor: pointer; }
  tr.urow:hover td { background: var(--panel2); }
  .muted { color: var(--t3); font-size: 12px; }
  .chip-open { color: var(--accent); font-size: 12px; white-space: nowrap; }
  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-start; justify-content: center; padding: 28px 16px; overflow-y: auto; z-index: 50; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 680px; padding: 22px; }
  .modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
  .modal-head h2 { font-size: 18px; }
  .modal-head .email { font-size: 13px; }
  .close-x { background: var(--panel2); border: 1px solid var(--border); color: var(--t2); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; flex-shrink: 0; }
  .close-x:hover { color: var(--t1); }
  .meta { display: flex; flex-wrap: wrap; gap: 14px; margin: 14px 0 18px; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .meta .m { font-size: 12.5px; }
  .meta .m .k { color: var(--t3); display: block; margin-bottom: 2px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  .modal .acts { justify-content: flex-start; margin-bottom: 16px; }
  .section-h { font-size: 12px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.5px; margin: 6px 0 10px; }
  .chat-item { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .chat-head { padding: 11px 13px; cursor: pointer; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
  .chat-head:hover { background: var(--panel2); }
  .chat-head .ct { font-size: 13.5px; font-weight: 500; }
  .chat-body { display: none; padding: 4px 13px 13px; border-top: 1px solid var(--border); }
  .chat-body.open { display: block; }
  .bubble { margin: 10px 0; }
  .bubble .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--t3); margin-bottom: 3px; }
  .bubble .text { font-size: 13.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .bubble.user .text { color: var(--t1); }
  .bubble.assistant .text { color: var(--t2); }
  .login { max-width: 360px; margin: 40px auto; padding: 8px 4px 16px; }
  .login h2 { font-size: 18px; margin-bottom: 6px; }
  .login p { color: var(--t3); font-size: 13px; margin-bottom: 18px; }
  .login label { display: block; font-size: 12px; color: var(--t2); margin: 12px 0 6px; }
  .login input { width: 100%; background: var(--panel2); border: 1px solid var(--border); border-radius: 9px; color: var(--t1); padding: 11px 13px; font-size: 14px; }
  .login input:focus { outline: none; border-color: var(--accent); }
  .login button { width: 100%; margin-top: 18px; background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .login button:disabled { opacity: 0.6; cursor: default; }
  .login .err { color: var(--danger); font-size: 12.5px; margin-top: 12px; min-height: 16px; }
  .notif { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--panel2); border: 1px solid var(--border); color: var(--t1); padding: 11px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all .25s; pointer-events: none; }
  .notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 640px) {
    th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">atwe<span>.ai</span> admin</div>
      <div class="sub">User &amp; access management</div>
    </div>
    <a class="back" id="backLink" href="/">← Back to app</a>
  </header>

  <div class="stat-row" id="stats"></div>
  <div class="card"><div id="content"><div class="msg">Loading…</div></div></div>
</div>
<div class="notif" id="notif"></div>

<div class="overlay" id="modal"><div class="modal" id="modalCard"></div></div>

<script>
let token = localStorage.getItem('atwe_token');

// "Back to app" should leave the admin subdomain for the main app.
(function setBackLink() {
  const link = document.getElementById('backLink');
  if (location.hostname.startsWith('admin.')) {
    link.href = location.protocol + '//' + location.hostname.replace(/^admin\./, '') + '/';
  }
})();

function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove('show'), 2600);
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  let data = {};
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
  return data;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
  catch { return ''; }
}

function fmtDateTime(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); }
  catch { return ''; }
}

// Short relative time, e.g. "3h ago", "2d ago".
function ago(d) {
  if (!d) return 'never';
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 2592000) return Math.floor(s / 86400) + 'd ago';
  return fmtDate(d);
}

// Messages store content as a string or an array of blocks (text + image).
function msgText(content) {
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    return content.map(b => b.type === 'image' ? '🖼️ [image]' : (b.text || '')).join(' ').trim();
  }
  return '';
}

function gate(html) {
  document.getElementById('content').innerHTML = '<div class="msg">' + html + '</div>';
  document.getElementById('stats').innerHTML = '';
}

// The admin subdomain is its own origin, so it has its own sign-in.
function showLogin(msg) {
  document.getElementById('stats').innerHTML = '';
  document.getElementById('content').innerHTML = `
    <div class="login">
      <h2>Admin sign in</h2>
      <p>Sign in with an account that has admin access.</p>
      <label for="le">Email</label>
      <input id="le" type="email" autocomplete="email" placeholder="you@company.com"/>
      <label for="lp">Password</label>
      <input id="lp" type="password" autocomplete="current-password" placeholder="••••••••"/>
      <div class="err" id="lerr">${msg ? esc(msg) : ''}</div>
      <button id="lbtn">Sign in</button>
    </div>`;
  const btn = document.getElementById('lbtn');
  const submit = () => doAdminLogin();
  btn.onclick = submit;
  document.getElementById('lp').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  document.getElementById('le').focus();
}

async function doAdminLogin() {
  const email = document.getElementById('le').value.trim();
  const password = document.getElementById('lp').value;
  const err = document.getElementById('lerr');
  const btn = document.getElementById('lbtn');
  err.textContent = '';
  if (!email || !password) { err.textContent = 'Enter your email and password.'; return; }
  btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign in failed.');
    if (!data.user || !data.user.is_admin) throw new Error('This account does not have admin access.');
    token = data.token;
    localStorage.setItem('atwe_token', token);
    load();
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
  }
}

let USERS = [];

async function load() {
  if (!token) { showLogin(); return; }
  try {
    const { users } = await api('GET', '/api/admin/users');
    USERS = users || [];
    render();
  } catch (e) {
    if (/admin access/i.test(e.message)) showLogin('That account does not have admin access.');
    else if (/authentication/i.test(e.message)) { token = null; localStorage.removeItem('atwe_token'); showLogin('Your session has expired — please sign in.'); }
    else gate(esc(e.message));
  }
}

let FILTER = '';

function render() {
  const total = USERS.length;
  const pro = USERS.filter(u => u.plan === 'pro').length;
  const admins = USERS.filter(u => u.is_admin).length;
  const chats = USERS.reduce((s, u) => s + (u.chat_count || 0), 0);
  document.getElementById('stats').innerHTML = [
    ['Users', total], ['Pro', pro], ['Admins', admins], ['Chats', chats],
  ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

  const q = FILTER.trim().toLowerCase();
  const list = q
    ? USERS.filter(u => (u.name || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q))
    : USERS;

  const rows = list.map(u => `
    <tr class="urow" onclick="openUser(${u.id})">
      <td>
        <div>${esc(u.name)}</div>
        <div class="email">${esc(u.email)}</div>
      </td>
      <td>
        <span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${u.plan}</span>
        ${u.is_admin ? '<span class="pill admin">admin</span>' : ''}
      </td>
      <td>${u.chat_count || 0}</td>
      <td>${u.last_login_at ? ago(u.last_login_at) : '<span class="muted">never</span>'}</td>
      <td>${fmtDate(u.created_at)}</td>
      <td><span class="chip-open">View →</span></td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="toolbar" style="padding:14px 16px 0;">
      <input id="search" placeholder="Search by name or email…" value="${esc(FILTER)}"/>
      <button class="refresh" onclick="load()">↻ Refresh</button>
    </div>
    <table>
      <thead><tr><th>User</th><th>Plan</th><th>Chats</th><th>Last login</th><th>Joined</th><th></th></tr></thead>
      <tbody>${rows || `<tr><td colspan="6" class="msg">${q ? 'No matches.' : 'No users yet.'}</td></tr>`}</tbody>
    </table>`;

  const s = document.getElementById('search');
  s.oninput = () => { FILTER = s.value; const pos = s.selectionStart; render(); const ns = document.getElementById('search'); ns.focus(); ns.setSelectionRange(pos, pos); };
}

/* ─── User detail modal (info + their chats) ─── */
function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

async function openUser(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  const card = document.getElementById('modalCard');
  document.getElementById('modal').classList.add('show');
  card.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>${esc(u.name)}</h2>
        <div class="email">${esc(u.email)}</div>
      </div>
      <button class="close-x" onclick="closeModal()">×</button>
    </div>
    <div class="meta">
      <div class="m"><span class="k">Plan</span><span class="pill ${u.plan === 'pro' ? 'pro' : 'free'}">${u.plan}</span></div>
      <div class="m"><span class="k">Role</span>${u.is_admin ? '<span class="pill admin">admin</span>' : 'user'}</div>
      <div class="m"><span class="k">Email verified</span>${u.email_verified ? 'yes' : 'no'}</div>
      <div class="m"><span class="k">Chats</span>${u.chat_count || 0}</div>
      <div class="m"><span class="k">Joined</span>${fmtDate(u.created_at)}</div>
      <div class="m"><span class="k">Last login</span>${u.last_login_at ? fmtDateTime(u.last_login_at) : 'never'}</div>
    </div>
    <div class="acts">
      <button class="act" onclick="togglePlan(${u.id})">${u.plan === 'pro' ? 'Downgrade to Free' : 'Upgrade to Pro'}</button>
      <button class="act" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Revoke admin' : 'Make admin'}</button>
      <button class="act danger" onclick="removeUser(${u.id})">Delete user</button>
    </div>
    <div class="section-h">Conversations</div>
    <div id="userChats"><div class="muted" style="padding:6px 0;">Loading chats…</div></div>`;

  try {
    const { chats } = await api('GET', '/api/admin/users/' + id + '/chats');
    renderUserChats(chats || []);
  } catch (e) {
    document.getElementById('userChats').innerHTML = '<div class="muted">Could not load chats: ' + esc(e.message) + '</div>';
  }
}

function renderUserChats(chats) {
  const el = document.getElementById('userChats');
  if (!el) return;
  if (!chats.length) { el.innerHTML = '<div class="muted" style="padding:6px 0;">No conversations yet.</div>'; return; }
  el.innerHTML = chats.map((c, i) => `
    <div class="chat-item">
      <div class="chat-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="ct">${esc(c.title || 'Untitled chat')}</span>
        <span class="muted">${(c.messages || []).length} msgs · ${ago(c.updated_at)}</span>
      </div>
      <div class="chat-body">
        ${(c.messages || []).map(m => `
          <div class="bubble ${m.role === 'assistant' ? 'assistant' : 'user'}">
            <div class="role">${m.role === 'assistant' ? 'Atwe' : 'User'}</div>
            <div class="text">${esc(msgText(m.content)) || '<span class="muted">[empty]</span>'}</div>
          </div>`).join('') || '<div class="muted">No messages.</div>'}
      </div>
    </div>`).join('');
}

const modalOpen = () => document.getElementById('modal').classList.contains('show');

async function togglePlan(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  const plan = u.plan === 'pro' ? 'free' : 'pro';
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { plan }); merge(user); notify('Plan updated to ' + plan + '.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}

async function toggleAdmin(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  try { const { user } = await api('PATCH', '/api/admin/users/' + id, { is_admin: !u.is_admin }); merge(user); notify('Access updated.'); if (modalOpen()) openUser(id); }
  catch (e) { notify(e.message); }
}

async function removeUser(id) {
  const u = USERS.find(x => x.id === id); if (!u) return;
  if (!confirm('Delete ' + u.email + '? This permanently removes their account, chats and projects.')) return;
  try { await api('DELETE', '/api/admin/users/' + id); USERS = USERS.filter(x => x.id !== id); closeModal(); render(); notify('User deleted.'); }
  catch (e) { notify(e.message); }
}

function merge(user) {
  const i = USERS.findIndex(x => x.id === user.id);
  if (i >= 0) USERS[i] = { ...USERS[i], ...user };
  render();
}

load();
</script>
</body>
</html>
